  .website-btn:hover {

  .list-grid {
    display: grid; gap: 12px;
    grid-template-columns: 1fr;

  .list-card {
    padding: 14px 18px;
    display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center;
    flex-direction: row;

  .list-card h4 {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    line-height: 1.3; color: var(--vu-blanco); margin-bottom: 4px;

  .list-card .list-meta {

    color: var(--vu-gris-light); text-transform: uppercase;

  .list-card .list-side {
    display: flex; flex-direction: column; gap: 4px; align-items: flex-end; min-width: 100px;

    font-family: var(--font-mono); font-size: 10px; font-weight: 700;

    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;

    border-radius: 50%; border: none; cursor: pointer;

    margin-top: 80px;

  .footer-inner strong { color: var(--vu-crema); font-weight: 700; }
  .footer-inner .pip { color: var(--vu-gris-dark); }

  @media (max-width: 900px) {
    .feat-grid { grid-template-columns: 1fr; }
    .feat-card { min-height: 0; }
  }
  @media (max-width: 768px) {
    .masthead-inner { grid-template-columns: 1fr; gap: 14px; }

    .list-card { grid-template-columns: 1fr; }
    .list-card .list-side { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
    .view-head h1 { font-size: 22px; }
  }
</style>

/* =========================================================================
   HELPERS
   ========================================================================= */

const FRESH_DAYS = 7;
const TODAY_ISO  = '2026-05-22';

function fmtDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}
function daysAgo(iso) {
  const t  = new Date(TODAY_ISO + 'T00:00:00Z').getTime();
  const d  = new Date(iso + 'T00:00:00Z').getTime();
  return Math.round((t - d) / 86400000);
}
function isFresh(it) { return daysAgo(it.date) <= FRESH_DAYS; }
function isOld(it)   { return daysAgo(it.date) >  FRESH_DAYS; }
function isPinned(it) { return it.pinUntil && it.pinUntil >= TODAY_ISO; }
function byDateDesc(a,b) {
  const ap = isPinned(a) ? 1 : 0;
  const bp = isPinned(b) ? 1 : 0;
  if (ap !== bp) return bp - ap;
  if (b.date !== a.date) return b.date.localeCompare(a.date);
  if (a.highRelevance !== b.highRelevance) return a.highRelevance ? -1 : 1;
  return 0;
}

function collectAll() {
  const out = [];
  briefing.sections.global.forEach(it      => out.push({...it, section: 'global'}));
  briefing.sections.competencia.forEach(it => out.push({...it, section: 'competencia'}));
  briefing.sections.vu.forEach(it          => out.push({...it, section: 'vu'}));
  Object.entries(briefing.sections.latam).forEach(([country, items]) => {
    items.forEach(it => out.push({...it, section: 'latam', country}));
  });
  return out;
}
function itemsBySection(section) {
  return collectAll().filter(it => it.section === section);
}

const SECTION_LABEL = {
  global:      'Global',
  latam:       'LATAM',
  competencia: 'Competencia',
  vu:          'VU',
  archivo:     'Archivo'
};

/* =========================================================================
   RENDER — building blocks
   ========================================================================= */

function pillsHTML(it) {
  const parts = [];
  parts.push(`<span class="pill-section">${SECTION_LABEL[it.section] || ''}</span>`);
  parts.push(`<span class="pill-marker ${it.highRelevance ? 'high' : 'std'}">${it.highRelevance ? '🔴' : '▸'}</span>`);
  if (it.country && COUNTRIES[it.country]) {
    parts.push(`<span class="pill-country"><span>${COUNTRIES[it.country].flag}</span>${COUNTRIES[it.country].name}</span>`);
  }
  if (it.competitor) parts.push(`<span class="pill-comp">${it.competitor}</span>`);
  return parts.join(' ');
}

function metaHTML(it) {
  return `
    <div class="meta">
      <span class="date-badge">${fmtDate(it.date)}</span>
      <span class="lang-badge">${(it.language||'es').toUpperCase()}</span>
      ${it.vertical ? `<span class="pip">·</span><span>${it.vertical}</span>` : ''}
      ${it.topic ? `<span class="pip">·</span><span>${it.topic}</span>` : ''}
      <span class="pip">·</span>
      <span>Fuente:</span>
      <a href="${it.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation();">${it.sourceName} ↗</a>
    </div>
  `;
}

function featCardHTML(it) {
  const hasImage = !!it.image;
  const imageHTML = hasImage
    ? `<div class="feat-image" role="img" aria-label="${(it.title||'').replace(/"/g,'&quot;')}" style="background-image:url('${it.image}');"></div>`
    : '';
  return `
    <article class="feat-card card-${it.section} ${it.highRelevance ? 'high' : ''} ${hasImage ? 'has-image' : ''}" onclick="window.open('${it.sourceUrl}','_blank','noopener')">
      ${imageHTML}
      <div class="feat-content">
        <div class="feat-top">${pillsHTML(it)}</div>
        <h2>${it.title}</h2>
        <p class="feat-summary">${it.summary}</p>
        ${metaHTML(it)}
      </div>
    </article>
  `;
}

function sideCardHTML(it) {
  return `
    <article class="side-card card-${it.section} ${it.highRelevance ? 'high' : ''}" onclick="window.open('${it.sourceUrl}','_blank','noopener')">
      <div class="side-top">${pillsHTML(it)}</div>
      <h3>${it.title}</h3>
      <p class="side-summary">${it.summary}</p>
      <div class="meta" style="font-size:10px;">
        <span class="date-badge">${fmtDate(it.date)}</span>
        <span class="lang-badge">${(it.language||'es').toUpperCase()}</span>
        <a href="${it.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation();">${it.sourceName} ↗</a>
      </div>
    </article>
  `;
}

function listCardHTML(it) {
  return `
    <article class="list-card card-${it.section} ${it.highRelevance ? 'high' : ''}" onclick="window.open('${it.sourceUrl}','_blank','noopener')">
      <div>
        <div class="side-top">${pillsHTML(it)}</div>
        <h4>${it.title}</h4>
        <div class="meta">
          <a href="${it.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation();">${it.sourceName} ↗</a>
          ${it.topic ? `<span class="pip">·</span><span>${it.topic}</span>` : ''}
        </div>
      </div>
      <div class="list-side">
        <span class="date-badge">${fmtDate(it.date)}</span>
        <span class="lang-badge">${(it.language||'es').toUpperCase()}</span>
      </div>
    </article>
  `;
}

function renderFeatured(items, emptyMsg) {
  if (!items.length) return `<div class="empty-msg">${emptyMsg}</div>`;
  const featured = items[0];
  const sides    = items.slice(1, 4);
  const list     = items.slice(4);
  return `
    <div class="feat-grid">
      ${featCardHTML(featured)}
      <div class="sides">
        ${sides.map(sideCardHTML).join('') || '<div class="empty-msg" style="padding:14px;text-align:left;">Sin notas adicionales en esta vista.</div>'}
      </div>
    </div>
    ${list.length ? `<div class="list-grid">${list.map(listCardHTML).join('')}</div>` : ''}
  `;
}

function renderListOnly(items, emptyMsg) {
  if (!items.length) return `<div class="empty-msg">${emptyMsg}</div>`;
  return `<div class="list-grid">${items.map(listCardHTML).join('')}</div>`;
}

/* =========================================================================
   VIEWS
   ========================================================================= */

const VIEW_CONFIG = {
  home: {
    label:      'Home',
    title:      `Últimos ${FRESH_DAYS} días`,
    subtitle:   `Lo más reciente de Global, LATAM, Competencia y VU.`,
    items:      () => collectAll().filter(isFresh).sort(byDateDesc),
    empty:      `Sin novedades en los últimos ${FRESH_DAYS} días.`,
    render:     'featured'
  },
  global: {
    label:      'Global',
    title:      'Global',
    items:      () => itemsBySection('global').filter(isFresh).sort(byDateDesc),
    empty:      `Sin novedades de Global en los últimos ${FRESH_DAYS} días.`,
    render:     'featured'
  },
  latam: {
    label:      'LATAM',
    title:      'LATAM',
    items:      () => itemsBySection('latam').filter(isFresh).sort(byDateDesc),
    empty:      `Sin novedades de LATAM en los últimos ${FRESH_DAYS} días.`,
    render:     'featured'
  },
  competencia: {
    label:      'Competencia',
    title:      'Competencia',
    items:      () => itemsBySection('competencia').filter(isFresh).sort(byDateDesc),
    empty:      `Sin novedades de Competencia en los últimos ${FRESH_DAYS} días.`,
    render:     'featured'
  },
  vu: {
    label:      'VU',
    title:      'VU Security · Stranieri · VU ONE',
    items:      () => itemsBySection('vu').filter(isFresh).sort(byDateDesc),
    empty:      `Sin novedades de VU en los últimos ${FRESH_DAYS} días.`,
    render:     'featured'
  },
  archivo: {
    label:      'Archivo',
    title:      `Archivo — más de ${FRESH_DAYS} días`,
    items:      () => collectAll().filter(isOld).sort(byDateDesc),
    empty:      `Aún no hay notas en el archivo.`,
    render:     'list'
  }
};

function renderView(viewKey) {
  const cfg = VIEW_CONFIG[viewKey];
  if (!cfg) return renderView('home');

  const items = cfg.items();
  const view  = document.getElementById('view');
  view.dataset.view = viewKey;

  const headHTML = `
    <header class="view-head">
      <span class="view-tag">${cfg.label}</span>
      <h1>${cfg.title}</h1>
      <span class="view-meta">${items.length} ${items.length === 1 ? 'nota' : 'notas'}</span>
    </header>
  `;

  const bodyHTML = (cfg.render === 'list')
    ? renderListOnly(items, cfg.empty)
    : renderFeatured(items, cfg.empty);

  view.innerHTML = headHTML + bodyHTML;
  window.scrollTo({ top: 0, behavior: 'auto' });
}

/* =========================================================================
   TOC NAV
   ========================================================================= */

function buildTOC() {
  const order = ['home','global','latam','competencia','vu','archivo'];
  const counts = {
    home:        VIEW_CONFIG.home.items().length,
    global:      VIEW_CONFIG.global.items().length,
    latam:       VIEW_CONFIG.latam.items().length,
    competencia: VIEW_CONFIG.competencia.items().length,
    vu:          VIEW_CONFIG.vu.items().length,
    archivo:     VIEW_CONFIG.archivo.items().length
  };
  const colors = {
    home:        'var(--vu-naranja)',
    global:      'var(--sec-global)',
    latam:       'var(--sec-latam)',
    competencia: 'var(--sec-competencia)',
    vu:          'var(--sec-vu)',
    archivo:     'var(--sec-archivo)'
  };
  const nav = document.getElementById('tocNav');
  nav.innerHTML = order.map(k => `
    <a class="toc-link ${k === 'archivo' ? 'archivo' : ''}" data-view="${k}" href="#${k}">
      <span class="dot" style="background:${colors[k]};"></span>
      <span>${VIEW_CONFIG[k].label}</span>
      <span class="count">${counts[k]}</span>
    </a>
  `).join('');
}

function setActiveTOC(viewKey) {
  document.querySelectorAll('.toc-link').forEach(a => {
    a.classList.toggle('active', a.dataset.view === viewKey);
  });
}

/* =========================================================================
   ROUTER
   ========================================================================= */

function currentView() {
  const k = (window.location.hash || '#home').replace('#','');
  return VIEW_CONFIG[k] ? k : 'home';
}
function route() {
  const v = currentView();
  setActiveTOC(v);
  renderView(v);
}
window.addEventListener('hashchange', route);

/* =========================================================================
   BACK TO TOP
   ========================================================================= */

const backTopBtn = document.getElementById('backTopBtn');
backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
window.addEventListener('scroll', () => {
  backTopBtn.classList.toggle('visible', window.scrollY > 360);
}, { passive: true });

/* =========================================================================
   INIT
   ========================================================================= */

document.addEventListener('DOMContentLoaded', () => {
  buildTOC();
  route();
});
</script>

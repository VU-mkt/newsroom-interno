<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VU Newsroom — Identidad digital, fraude, CIAM y regulación</title>
<meta name="description" content="Newsroom interno de VU Security. Curaduría diaria de cobertura externa: identidad digital, fraude, deepfakes, KYC/AML y regulación, segmentada en Global, LATAM, Competencia y VU." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --vu-naranja: #F15E37;
    --vu-naranja-soft: #FBD7CC;
    --vu-naranja-deep: #C44826;
    --vu-negro: #1C1D1E;
    --vu-negro-elev: #25262A;
    --vu-negro-soft: #2F3034;
    --vu-crema: #EBE4CA;
    --vu-gris: #666666;
    --vu-gris-light: #B8B8B5;
    --vu-gris-dark: #3A3B3E;
    --vu-blanco: #FFFFFF;

    --sec-global: #3A86FF;
    --sec-latam: #F15E37;
    --sec-regulation: #9B59B6;
    --sec-competencia: #C44826;
    --sec-vu: #06A77D;
    --sec-archivo: #888888;

    --font-display: 'Roobert', 'Space Grotesk', 'Roboto', Arial, sans-serif;
    --font-body: 'Roboto', Arial, sans-serif;
    --font-mono: 'JetBrains Mono', 'Aptos Mono', 'Courier New', monospace;
  }

  @font-face { font-family: 'Roobert'; src: url('fonts/Roobert-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Roobert'; src: url('fonts/Roobert-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'Roobert'; src: url('fonts/Roobert-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    background: var(--vu-negro);
    color: var(--vu-crema);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse at top right, rgba(241,94,55,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(58,134,255,0.04) 0%, transparent 50%);
  }

  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--vu-naranja); }

  /* =================== MASTHEAD =================== */
  .masthead { border-bottom: 1px solid var(--vu-gris-dark); background: var(--vu-negro); }
  .masthead-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 22px 32px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 24px;
  }
  .masthead-left { display: flex; align-items: center; justify-content: flex-start; }
  .masthead-center {
    display: flex; flex-direction: row;
    align-items: center; gap: 16px;
  }
  .masthead-brand-link {
    display: flex; align-items: center; gap: 14px;
    text-decoration: none;
  }
  .brand-newsroom {
    font-family: var(--font-display); font-weight: 700;
    font-size: 44px; letter-spacing: -0.02em; line-height: 1;
    color: var(--vu-naranja);
  }
  .newsroom-label { display: none; }
  .newsroom-sublabel { display: none; }
  .masthead-right {
    display: flex; align-items: center; justify-content: flex-end;
  }

  /* Mini website-link button */
  .website-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    background: #EBE4CA; color: #1C1D1E;
    border-radius: 12px; border: none;
    transition: all 0.15s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .website-btn svg { width: 22px; height: 22px; display: block; }
  .website-btn:hover {
    background: #F0EAD5; color: #1C1D1E;
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.22);
  }
  .website-btn:active { background: #1C1D1E; color: #EBE4CA; transform: translateY(0); box-shadow: none; }

  /* =================== TOC / SECTIONS NAV =================== */
  .sections-nav {
    background: var(--vu-negro-elev);
    border-bottom: 1px solid var(--vu-gris-dark);
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }
  .sections-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 32px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .toc-link {
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--vu-gris-dark);
    background: var(--vu-negro);
    color: var(--vu-crema);
    transition: all 0.15s ease;
  }
  .toc-link:hover { border-color: var(--vu-naranja); color: var(--vu-naranja); }
  .toc-link.active {
    background: var(--vu-naranja); color: var(--vu-blanco);
    border-color: var(--vu-naranja);
  }
  .toc-link.active .count { background: rgba(0,0,0,0.18); color: var(--vu-negro); border-color: transparent; }
  .toc-link .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .toc-link .count {
    font-size: 10px; padding: 2px 8px;
    border-radius: 999px; font-weight: 600;
    background: var(--vu-negro-soft);
    color: var(--vu-gris-light);
    border: 1px solid var(--vu-gris-dark);
    transition: background 0.15s, color 0.15s;
  }
  .toc-link .count.has-items {
    background: var(--badge-color, var(--vu-naranja));
    color: #fff; border-color: transparent;
  }
  .toc-link.active .count { background: rgba(0,0,0,0.22); color: #fff; border-color: transparent; }
  .toc-link.archivo { margin-left: auto; opacity: 0.85; }
  .toc-link.archivo:hover { opacity: 1; }

  /* =================== TICKER BLOOMBERG =================== */
  .ticker-bar {
    background: var(--vu-negro-elev);
    border-bottom: 1px solid var(--vu-gris-dark);
    height: 40px;
    display: flex;
    align-items: center;
    overflow: visible;
    position: relative;
    user-select: none;
  }
  .ticker-search-wrap {
    flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 12px;
    position: relative;
  }
  .ticker-label {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 16px;
    height: 100%;
    background: var(--vu-naranja);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
    z-index: 2;
  }
  .ticker-live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #fff;
    animation: tickerPulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes tickerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }
  .ticker-vline {
    flex-shrink: 0;
    width: 1px; height: 22px;
    background: var(--vu-gris-dark);
  }
  .ticker-track-wrap {
    flex: 1;
    overflow: hidden;
    height: 100%;
    display: flex;
    align-items: center;
    mask-image: linear-gradient(to right, transparent 0%, #000 2.5%, #000 97.5%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 2.5%, #000 97.5%, transparent 100%);
  }
  .ticker-track-wrap:hover .ticker-track { animation-play-state: paused; }
  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: tickerScroll 80s linear infinite;
    will-change: transform;
  }
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 0 4px;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--vu-crema);
    cursor: pointer;
    transition: color 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }
  .ticker-item:hover { color: var(--vu-naranja); }
  .ticker-tag {
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1.5;
  }
  .ticker-source {
    font-size: 11.5px;
    color: var(--vu-gris-light);
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .ticker-item:hover .ticker-source { color: var(--vu-gris-light); }
  .ticker-sep {
    display: inline-block;
    color: var(--vu-gris-dark);
    font-size: 12px;
    padding: 0 18px;
    flex-shrink: 0;
    line-height: 1;
  }

  /* =================== LEGEND =================== */
  .legend {
    max-width: 1400px; margin: 22px auto 0;
    padding: 0 32px;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 8px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .legend-sep { color: var(--vu-gris-dark); }

  /* =================== MAIN =================== */
  main { max-width: 1400px; margin: 0 auto; padding: 32px; }

  /* =================== VIEW HEADER =================== */
  .view-head {
    display: flex; align-items: center; gap: 16px;
    padding-bottom: 18px; margin-bottom: 28px;
    border-bottom: 2px solid var(--view-color, var(--vu-naranja));
  }
  .view-head h1 {
    font-family: var(--font-display); font-weight: 700;
    font-size: 32px; line-height: 1.1;
    color: var(--view-color, var(--vu-naranja));
    letter-spacing: -0.01em;
  }
  .view-head .view-meta {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .view-tag {
    background: var(--view-color, var(--vu-naranja));
    color: var(--vu-negro);
    padding: 6px 12px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }

  #view[data-view="home"]        { --view-color: var(--vu-naranja); }
  #view[data-view="global"]      { --view-color: var(--sec-global); }
  #view[data-view="latam"]       { --view-color: var(--sec-latam); }
  #view[data-view="regulation"]  { --view-color: var(--sec-regulation); }
  #view[data-view="competencia"] { --view-color: var(--sec-competencia); }
  #view[data-view="vu"]          { --view-color: var(--sec-vu); }
  #view[data-view="archivo"]     { --view-color: var(--sec-archivo); }

  /* =================== FEATURED LAYOUT =================== */
  .feat-grid {
    display: grid; grid-template-columns: 2fr 1fr;
    gap: 20px; margin-bottom: 28px;
  }

  .feat-card, .side-card, .list-card {
    background: var(--vu-negro-elev);
    border: 1px solid var(--vu-gris-dark);
    border-left: 4px solid var(--card-color, var(--vu-naranja));
    border-radius: 12px;
    transition: all 0.15s ease;
    cursor: pointer;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .feat-card:hover, .side-card:hover, .list-card:hover {
    border-color: var(--card-color, var(--vu-naranja));
    background: var(--vu-negro-soft);
    transform: translateY(-1px);
  }
  .feat-card.high, .side-card.high, .list-card.high {
    box-shadow: inset 0 0 0 1px rgba(255, 80, 80, 0.25);
  }

  /* Card section colors */
  .card-global       { --card-color: var(--sec-global); }
  .card-latam        { --card-color: var(--sec-latam); }
  .card-regulation   { --card-color: var(--sec-regulation); }
  .card-competencia  { --card-color: var(--sec-competencia); }
  .card-vu           { --card-color: var(--sec-vu); }
  .card-archivo      { --card-color: var(--sec-archivo); }

  /* Featured (big) */
  .feat-card { padding: 0; min-height: 320px; }
  .feat-card.has-image .feat-image {
    width: 100%; height: 240px;
    overflow: hidden;
    border-bottom: 1px solid var(--vu-gris-dark);
    position: relative;
  }
  .feat-card.has-image .feat-image svg,
  .feat-card.has-image .feat-image img {
    width: 100%; height: 100%; display: block; object-fit: cover;
  }
  .feat-card.has-image .feat-image::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(28,29,30,0.72) 100%);
    pointer-events: none;
  }
  .feat-card .feat-content {
    padding: 26px 28px 24px;
    display: flex; flex-direction: column;
    flex: 1; gap: 12px;
  }
  .feat-card .feat-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .feat-card h2 {
    font-family: var(--font-display); font-size: 28px; font-weight: 700;
    line-height: 1.18; color: var(--vu-blanco);
    letter-spacing: -0.01em;
  }
  .feat-card .feat-summary {
    font-size: 15.5px; color: var(--vu-crema); line-height: 1.55;
  }
  .feat-card .meta { margin-top: auto; }
  @media (max-width: 900px) {
    .feat-card.has-image .feat-image { height: 180px; }
  }

  /* Side cards */
  .feat-grid .sides { display: flex; flex-direction: column; gap: 14px; }
  .side-card { padding: 16px 18px; min-height: 0; }
  .side-card .side-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .side-card h3 {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    line-height: 1.3; color: var(--vu-blanco); margin-bottom: 6px;
  }
  .side-card .side-summary {
    font-size: 13px; color: var(--vu-crema); line-height: 1.45;
    margin-bottom: 8px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* List cards (below the featured grid) */
  .list-grid {
    display: grid; gap: 12px;
    grid-template-columns: 1fr;
  }
  .list-card {
    padding: 14px 18px;
    display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: start;
    flex-direction: row;
  }
  .list-card .list-summary {
    font-family: var(--font-body); font-size: 12.5px; line-height: 1.55;
    color: var(--vu-gris-light); margin: 5px 0 6px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .list-card h4 {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    line-height: 1.3; color: var(--vu-blanco); margin-bottom: 4px;
  }
  .list-card .list-meta {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .list-card .list-side {
    display: flex; flex-direction: column; gap: 4px; align-items: flex-end; min-width: 100px;
  }

  /* Pills / badges shared */
  .pill-section {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--card-color, var(--vu-naranja));
    color: var(--vu-negro);
    padding: 3px 8px; border-radius: 4px;
  }
  .pill-marker {
    font-size: 14px; user-select: none; line-height: 1;
  }
  .pill-marker.high { color: #FF4D4D; font-size: 14px; }
  .pill-marker.std  { color: var(--card-color, var(--vu-naranja)); font-size: 18px; }
  .pill-country {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--vu-crema); background: var(--vu-negro);
    border: 1px solid var(--vu-gris-dark);
    padding: 3px 8px; border-radius: 4px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .pill-comp {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sec-competencia); border: 1px solid var(--sec-competencia);
    padding: 3px 8px; border-radius: 4px;
  }
  .date-badge {
    background: var(--vu-negro); border: 1px solid var(--vu-gris-dark);
    border-radius: 5px; padding: 3px 7px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.06em; color: var(--vu-crema);
  }
  .lang-badge {
    font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--vu-negro-soft); color: var(--vu-gris-light);
    padding: 3px 6px; border-radius: 4px;
  }
  .meta {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .meta a { color: var(--card-color, var(--vu-naranja)); }
  .meta a:hover { text-decoration: underline; }
  .pip { color: var(--vu-gris-dark); }

  /* =================== EMPTY STATE =================== */
  .empty-msg {
    padding: 24px 22px; border-radius: 12px;
    background: rgba(255,255,255,0.02);
    border: 1px dashed var(--vu-gris-dark);
    color: var(--vu-gris-light);
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.04em;
    text-align: center;
  }

  /* =================== BACK TO TOP =================== */
  .back-top-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.92); color: #1C1D1E;
    border-radius: 50%; border: none; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 100;
    transition: all 0.15s ease;
  }
  .back-top-btn.visible { display: inline-flex; }
  .back-top-btn:hover { background: #ffffff; color: #1C1D1E; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.28); }
  .back-top-btn:active { background: #1C1D1E; color: #ffffff; transform: translateY(0); box-shadow: none; }
  .back-top-btn svg { width: 22px; height: 22px; display: block; }

  /* =================== FOOTER =================== */
  footer {
    border-top: 1px solid var(--vu-gris-dark);
    background: var(--vu-negro);
    padding: 32px;
    margin-top: 80px;
  }
  .footer-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; flex-wrap: wrap; gap: 8px 32px; align-items: center; justify-content: center;
    color: var(--vu-gris-light);
    font-family: var(--font-mono); font-size: 11.5px;
    letter-spacing: 0.06em; text-transform: uppercase;
    text-align: center;
  }
  .footer-inner strong { color: var(--vu-crema); font-weight: 700; }
  .footer-inner .pip { color: var(--vu-gris-dark); }

  /* =================== CARD FLIP ACCIONABLES =================== */

  /* Wrapper — replaces the <article> as perspective container */
  .flip-card {
    perspective: 1200px;
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    overflow: visible !important;
    cursor: default;
  }
  .flip-card:hover { transform: none !important; }

  /* Inner — rotates the whole card */
  .flip-card-inner {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.52s cubic-bezier(0.4, 0, 0.2, 1);
    width: 100%;
    height: 100%;
    border-radius: 12px;
  }
  .flip-card:hover .flip-card-inner,
  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  /* Both faces: hardware acceleration + correct visibility */
  .flip-front,
  .flip-back {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 12px;
  }

  /* Front face — the original card */
  .flip-front {
    position: relative;
    width: 100%;
    /* Normal flow — its height determines .flip-card-inner height */
    display: flex;
    flex-direction: column;
    background: var(--vu-negro-elev);
    border: 1px solid var(--vu-gris-dark);
    border-left: 4px solid var(--card-color, var(--vu-naranja));
    overflow: hidden;
    border-radius: 12px;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
  }
  .flip-card:hover .flip-front {
    border-color: var(--card-color, var(--vu-naranja));
    background: var(--vu-negro-soft);
  }
  .flip-card.high .flip-front {
    box-shadow: inset 0 0 0 1px rgba(255, 80, 80, 0.25);
  }

  /* Back face — the actionable */
  .flip-back {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    transform: rotateY(180deg);
    background: var(--vu-negro-elev);
    border: 1px solid var(--card-color, var(--vu-naranja));
    border-left: 4px solid var(--card-color, var(--vu-naranja));
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 22px 22px 18px;
    gap: 12px;
    overflow: hidden;
  }
  .flip-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(var(--card-color-rgb, 241,94,55), 0.1) 0%, transparent 60%);
    pointer-events: none;
  }
  .flip-back-header {
    display: flex; align-items: center; gap: 10px;
  }
  .flip-back-icon {
    font-size: 24px; line-height: 1; flex-shrink: 0;
  }
  .flip-back-type {
    display: inline-flex; align-items: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--card-color, var(--vu-naranja));
    color: var(--vu-negro);
    padding: 4px 10px; border-radius: 4px;
  }
  .flip-back-body {
    flex: 1; display: flex; flex-direction: column; gap: 8px;
  }
  .flip-back-label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--card-color, var(--vu-naranja));
  }
  .flip-back-text {
    font-size: 14px; color: var(--vu-crema); line-height: 1.6;
  }
  .flip-back-footer {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding-top: 10px;
    border-top: 1px solid var(--vu-gris-dark);
  }
  .flip-back-source {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--vu-gris-light); letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 50%;
  }
  .flip-btn-read {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--card-color, var(--vu-naranja));
    color: var(--vu-negro);
    padding: 7px 14px; border-radius: 8px; border: none;
    cursor: pointer; text-decoration: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    flex-shrink: 0;

  .flip-btn-read:hover { opacity: 0.85; transform: translateY(-1px); color: var(--vu-negro); }

  /* Mobile flip toggle button (visible only on touch) */
  .flip-toggle-btn {
    display: none;
    position: absolute; bottom: 10px; right: 10px;
    z-index: 10;
    background: var(--card-color, var(--vu-naranja));

  @media (hover: none) {

    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
  }

  /* Actionable indicator dot on desktop — subtle hint that card is flippable */
  .flip-hint {
    position: absolute; top: 10px; right: 10px; z-index: 5;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--card-color, var(--vu-naranja));

  @keyframes flipHintPulse {

  }
  @media (hover: none) { .flip-hint { display: none; } }

  /* Card-type specific overrides for the flip-front face */
  .flip-card { display: flex; flex-direction: column; }

  .flip-front { flex: 1; }

  .feat-card.flip-card .flip-front { padding: 0; min-height: 320px; }

  /* =================== LATAM BY COUNTRY =================== */

/* =========================================================================
   LATAM MAP — D3 + Natural Earth (world-atlas 110m)
   ========================================================================= */

// ISO 3166-1 numeric → country key (tracked countries in LATAM section)
const LATAM_ISO = {
  32:  'argentina', 68:  'bolivia',    76:  'brasil',    152: 'chile',
  170: 'colombia',  188: 'costa_rica', 218: 'ecuador',   222: 'el_salvador',
  484: 'mexico',    591: 'panama',     600: 'paraguay',  604: 'peru',
  858: 'uruguay',   862: 'venezuela'
};
// Background countries (geographic fill, not tracked)
const LATAM_BG_ISO = new Set([320, 340, 558, 192, 332, 214, 630, 659, 388]);
// (Guatemala, Honduras, Nicaragua, Cuba, Haiti, Dominican Republic, Puerto Rico, Antigua, Jamaica)

let _worldDataCache = null;

function fetchWorldAtlas() {
  if (_worldDataCache) return Promise.resolve(_worldDataCache);
  return fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(d => { _worldDataCache = d; return d; });
}

function mapCountryColor(count) {
  if (!count) return '#252525';
  if (count === 1) return 'rgba(241,94,55,0.38)';
  if (count <= 3) return 'rgba(241,94,55,0.68)';
  return '#F15E37';
}

function renderD3LatamMap(byCountry, container) {
  container.innerHTML = '<div class="map-loading">Cargando mapa…</div>';

  fetchWorldAtlas().then(world => {
    const allFeatures = topojson.feature(world, world.objects.countries).features;
    const bgFeatures      = allFeatures.filter(f => LATAM_BG_ISO.has(+f.id));
    const trackedFeatures = allFeatures.filter(f => LATAM_ISO[+f.id]);
    const allLatam        = [...bgFeatures, ...trackedFeatures];

    container.innerHTML = '';
    const W = Math.min(container.clientWidth || 480, 520);
    const H = Math.round(W * 1.55);

    const projection = d3.geoNaturalEarth1();
    const path       = d3.geoPath().projection(projection);
    projection.fitSize([W, H], { type: 'FeatureCollection', features: allLatam });

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('width', '100%')
      .attr('role', 'img')
      .attr('aria-label', 'Mapa LATAM interactivo');

    // Background (non-tracked)
    svg.selectAll('.map-bg')
      .data(bgFeatures).join('path')
      .attr('class', 'map-bg')
      .attr('d', path);

    // Tracked countries
    const tip = document.getElementById('latamTip');
    svg.selectAll('.map-country')
      .data(trackedFeatures).join('path')
      .attr('class', d => {
        const count = (byCountry[LATAM_ISO[+d.id]] || []).length;
        return 'map-country' + (count > 0 ? ' has-news' : '');
      })
      .attr('fill', d => mapCountryColor((byCountry[LATAM_ISO[+d.id]] || []).length))
      .attr('d', path)
      .on('mouseover', function(event, d) {
        const id    = LATAM_ISO[+d.id];
        const info  = COUNTRIES[id] || { flag: '', name: id };
        const count = (byCountry[id] || []).length;
        tip.textContent = count > 0
          ? `${info.flag} ${info.name} · ${t().nota(count)}`
          : `${info.flag} ${info.name} · ${t().mapSinNotas}`;
        tip.style.display = 'block';
      })
      .on('mousemove', function(event) {
        tip.style.left = (event.clientX + 14) + 'px';
        tip.style.top  = (event.clientY - 32) + 'px';
      })
      .on('mouseout', function() {
        tip.style.display = 'none';
      })
      .on('click', function(event, d) {
        const id    = LATAM_ISO[+d.id];
        const count = (byCountry[id] || []).length;
        if (!count) return;
        tip.style.display = 'none';
        // Switch to list tab then scroll to country
        const listBtn = document.querySelector('.latam-toggle-btn[data-tab="list"]');
        if (listBtn && !listBtn.classList.contains('active')) listBtn.click();
        setTimeout(() => {
          const det = document.querySelector(`.country-section[data-country="${id}"]`);
          if (!det) return;
          det.open = true;
          det.scrollIntoView({ behavior: 'smooth', block: 'start' });
          det.style.outline = '2px solid #F15E37';
          setTimeout(() => { det.style.outline = ''; }, 1400);
        }, 80);
      });

    // Legend
    const leg = d3.select(container).append('div').attr('class', 'latam-map-legend');
    t().mapLegend.forEach(({ color, label }) => {
      const item = leg.append('span').attr('class', 'map-legend-item');
      item.append('span').attr('class', 'map-legend-swatch').style('background', color);
      item.append('span').text(label);
    });

  }).catch(err => {
    container.innerHTML = `<div class="map-loading" style="color:#F15E37">Error al cargar el mapa. Verificá conexión.</div>`;
    console.error('[LatamMap]', err);
  });
}

}
function isFresh(it) { return daysAgo(it.date) <= FRESH_DAYS; }
function isOld(it)   { return daysAgo(it.date) >  FRESH_DAYS; }
function isPinned(it) { return it.pinUntil && it.pinUntil >= TODAY_ISO; }
function byDateDesc(a,b) {
  const ap = isPinned(a) ? 1 : 0;
  const bp = isPinned(b) ? 1 : 0;
  if (ap !== bp) return bp - ap;
  if (b.date !== a.date) return b.date.localeCompare(a.date);
  if (a.highRelevance !== b.highRelevance) return a.highRelevance ? -1 : 1;
  return 0;
}

function collectAll() {
  const out = [];
  briefing.sections.global.forEach(it      => out.push({...it, section: 'global'}));
  briefing.sections.regulation.forEach(it  => out.push({...it, section: 'regulation'}));
  briefing.sections.competencia.forEach(it => out.push({...it, section: 'competencia'}));
  briefing.sections.vu.forEach(it          => out.push({...it, section: 'vu'}));
  Object.entries(briefing.sections.latam).forEach(([country, items]) => {
    items.forEach(it => out.push({...it, section: 'latam', country}));
  });
  return out;
}
function itemsBySection(section) {
  return collectAll().filter(it => it.section === section);
}

function pillsHTML(it) {
  const parts = [];
  parts.push(`<span class="pill-section">${SECTION_LABEL[it.section] || ''}</span>`);
  parts.push(`<span class="pill-marker ${it.highRelevance ? 'high' : 'std'}">${it.highRelevance ? '🔴' : '▸'}</span>`);

    parts.push(`<span class="pill-country"><span>${COUNTRIES[it.country].flag}</span>${COUNTRIES[it.country].name}</span>`);
  }
  if (it.competitor) parts.push(`<span class="pill-comp">${it.competitor}</span>`);
  return parts.join(' ');
}

function escAttr(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sumData(it) {

/* =========================================================================
   HEATMAP DE ACTIVIDAD
   ========================================================================= */

function getHmapLevel(n) {
  if (!n) return 0;
  if (n <= 3) return 1;
  if (n <= 7) return 2;
  if (n <= 12) return 3;
  return 4;
}

function buildHeatmapHTML() {
  const counts = {};
  collectAll().forEach(it => {
    if (it.date) counts[it.date] = (counts[it.date] || 0) + 1;
  });

  const WEEKS = 20;
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const toStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const todayStr = toStr(now);

  // Align to Monday of current week, then go back WEEKS-1 more weeks
  const dow = (now.getDay() + 6) % 7; // Mon=0 … Sun=6
  const startDate = new Date(now);
  startDate.setDate(now.getDate() - dow - (WEEKS - 1) * 7);

  const columns = [];
  const cursor = new Date(startDate);
  for (let w = 0; w < WEEKS; w++) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      week.push(toStr(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    columns.push(week);
  }

  const DAY_LABELS = t().dayLabels;
  const MONTH_NAMES = t().monthNames;

  let prevM = -1;
  const monthsRow = columns.map(week => {
    const d = new Date(week[0] + 'T12:00:00');
    const m = d.getMonth();
    const label = m !== prevM ? MONTH_NAMES[m] : '';
    prevM = m;
    return `<div class="hmap-month">${label}</div>`;
  }).join('');

  const gridCols = columns.map(week => {
    const cells = week.map(ds => {
      const n = counts[ds] || 0;
      const cls = ds > todayStr ? 'future' : `l${getHmapLevel(n)}`;
      return `<div class="hmap-cell ${cls}" data-date="${ds}" data-count="${n}"></div>`;
    }).join('');
    return `<div class="hmap-col">${cells}</div>`;
  }).join('');

  const totalNotes = Object.values(counts).reduce((a,b) => a+b, 0);
  const activeDays = Object.keys(counts).filter(k => counts[k] > 0).length;

  const dayLabelsHTML = DAY_LABELS.map(l => `<div class="hmap-day-lbl">${l}</div>`).join('');
  const legendCells = [0,1,2,3,4].map(l => `<div class="hmap-cell l${l}"></div>`).join('');

  return `
    <div class="heatmap-panel">
      <div class="hmap-header">
        <span class="hmap-title">${t().actividadCobertura}</span>
        <span class="hmap-stats">${t().nota(totalNotes)} · ${t().diasActivos(activeDays)}</span>
      </div>
      <div class="hmap-wrap">
        <div class="hmap-day-col">${dayLabelsHTML}</div>
        <div class="hmap-right">
          <div class="hmap-months-row">${monthsRow}</div>
          <div class="hmap-grid">${gridCols}</div>
        </div>
      </div>
      <div class="hmap-footer">
        <div class="hmap-legend">
          <span class="hmap-leg-txt">${t().menos}</span>${legendCells}<span class="hmap-leg-txt">${t().mas}</span>
        </div>
      </div>
    </div>
    <div class="hmap-tip" id="hmapTip"></div>
  `;
}

function initHeatmap() {
  const tip = document.getElementById('hmapTip');
  if (!tip) return;
  const DAY_ES  = t().dayNames;
  const MON_ES  = t().monthNamesLong;
  document.querySelectorAll('.hmap-cell[data-date]').forEach(cell => {
    cell.addEventListener('mouseenter', () => {
      const n = parseInt(cell.dataset.count) || 0;
      const ds = cell.dataset.date;
      const d  = new Date(ds + 'T12:00:00');
      const label = `${DAY_ES[d.getDay()]} ${d.getDate()} ${MON_ES[d.getMonth()]} ${d.getFullYear()}`;
      tip.textContent = n ? `${t().nota(n)} · ${label}` : `${t().sinCobertura} · ${label}`;
      tip.style.opacity = '1';
    });
    cell.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 34) + 'px';
    });
    cell.addEventListener('mouseleave', () => { tip.style.opacity = '0'; });
  });
}

function renderView(viewKey) {
  const cfg = VIEW_CONFIG[viewKey];
  if (!cfg) return renderView('home');

  const items = cfg.items();
  const view  = document.getElementById('view');
  view.dataset.view = viewKey;

  const headHTML = `
    <header class="view-head">
      <span class="view-tag">${cfg.label}</span>
      <h1>${cfg.title}</h1>
      <span class="view-meta">${t().nota(items.length)}</span>
    </header>
  `;

  const bodyHTML = cfg.render === 'list'
    ? renderListOnly(items, cfg.empty)
    : cfg.render === 'latam'
      ? renderLatam(items, cfg.empty)
      : renderFeatured(items, cfg.empty);

  const extraHTML = viewKey === 'home' ? buildHeatmapHTML() : '';
  view.innerHTML = headHTML + bodyHTML + extraHTML;
  if (viewKey === 'latam') initLatamToggle();
  if (viewKey === 'home') initHeatmap();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function renderSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) { route(); return; }
  const results = collectAll()
    .filter(it =>
      (it.title     || '').toLowerCase().includes(q) ||
      (it.summary   || '').toLowerCase().includes(q) ||
      (it.sourceName|| '').toLowerCase().includes(q) ||
      (it.topic     || '').toLowerCase().includes(q) ||
      (it.competitor|| '').toLowerCase().includes(q)
    )
    .sort(byDateDesc);
  const view = document.getElementById('view');
  view.dataset.view = 'search';
  view.innerHTML = `
    <header class="view-head">
      <span class="view-tag">${t().busqueda}</span>
      <h1>"${query}"</h1>
      <span class="view-meta">${t().resultado(results.length)}</span>
    </header>
    ${renderListOnly(results, t().sinResultados)}`;
  window.scrollTo({ top: 0, behavior: 'auto' });
  document.querySelectorAll('.toc-link').forEach(a => a.classList.remove('active'));
}

function initTicker() {
  const SMETA = {
    global:      { label: 'GLOBAL',  color: '#3A86FF' },
    latam:       { label: 'LATAM',   color: '#F15E37' },
    regulation:  { label: 'REG.',    color: '#9B59B6' },
    competencia: { label: 'COMP.',   color: '#C44826' },
    vu:          { label: 'VU',      color: '#06A77D' },
  };

  const all = [];
  Object.entries(briefing.sections).forEach(([key, items]) => {
    if (!SMETA[key]) return;
    items.forEach(item => all.push({ ...item, _sec: key }));
  });

  // Prioridad: highRelevance primero, luego por sección
  const ORDER = ['latam','global','regulation','competencia','vu'];
  all.sort((a, b) => {
    if (b.highRelevance !== a.highRelevance) return (b.highRelevance ? 1 : 0) - (a.highRelevance ? 1 : 0);
    return ORDER.indexOf(a._sec) - ORDER.indexOf(b._sec);
  });

  const items = all.slice(0, 24);

  const makeItem = (item) => {
    const m = SMETA[item._sec];
    const bg = m.color + '28';
    return `<a class="ticker-item" href="#${item._sec}">` +
      `<span class="ticker-tag" style="color:${m.color};background:${bg};">${m.label}</span>` +
      `<span>${item.title}</span>` +
      `<span class="ticker-source">— ${item.sourceName}</span>` +
      `</a><span class="ticker-sep" aria-hidden="true">◆</span>`;
  };

  const html = items.map(makeItem).join('');
  const track = document.getElementById('tickerTrack');
  if (!track) return;
  track.innerHTML = html + html; // duplicado para loop sin corte

  // Duración proporcional al contenido
  const totalLen = items.reduce((s, i) => s + i.title.length + i.sourceName.length, 0);
  const dur = Math.max(50, Math.min(120, Math.round(totalLen * 0.13)));
  track.style.animationDuration = dur + 's';
}

/* =========================================================================
   COMMAND PALETTE
   ========================================================================= */

const CMD_SECTIONS = [
  { id: 'home',        label: 'Inicio',      color: '#F15E37' },
  { id: 'global',      label: 'Global',      color: '#3A86FF' },
  { id: 'latam',       label: 'LATAM',       color: '#F15E37' },
  { id: 'regulation',  label: 'Regulación',  color: '#9B59B6' },
  { id: 'competencia', label: 'Competencia', color: '#C44826' },
  { id: 'vu',          label: 'VU',          color: '#06A77D' },
  { id: 'archivo',     label: 'Archivo',     color: '#888888' },
];

const SEC_COLOR = {
  global: '#3A86FF', latam: '#F15E37', regulation: '#9B59B6',
  competencia: '#C44826', vu: '#06A77D', archivo: '#888888'
};

let cmdOpen = false;
let cmdActiveIdx = -1;
let cmdItemsData = [];

function openCmd() {
  const backdrop = document.getElementById('cmdBackdrop');
  const input    = document.getElementById('cmdInput');
  backdrop.classList.add('open');
  cmdOpen = true;
  cmdActiveIdx = -1;
  input.value = '';
  renderCmdResults('');
  requestAnimationFrame(() => input.focus());
  document.body.style.overflow = 'hidden';
}

function closeCmd() {
  document.getElementById('cmdBackdrop').classList.remove('open');
  cmdOpen = false;
  document.body.style.overflow = '';
}

function activateCmd(item) {
  closeCmd();
  if (item.type === 'section') {
    window.location.hash = '#' + item.id;
    route();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (item.type === 'article') {
    window.open(item.url, '_blank', 'noopener');
  }
}

function setCmdActive(idx) {
  cmdActiveIdx = idx;
  document.querySelectorAll('#cmdResults .cmd-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function cmdMoveSelection(dir) {
  const items = document.querySelectorAll('#cmdResults .cmd-item');
  if (!items.length) return;
  let next = cmdActiveIdx + dir;
  if (next < 0) next = items.length - 1;
  if (next >= items.length) next = 0;
  setCmdActive(next);
  items[next].scrollIntoView({ block: 'nearest' });
}

function renderCmdResults(q) {
  const resultsEl = document.getElementById('cmdResults');
  const query = q.trim().toLowerCase();
  cmdItemsData = [];
  let html = '';

  const iconNav = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
  const iconDoc = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;

  if (!query) {
    html += `<div class="cmd-group-label">Navegar</div>`;
    CMD_SECTIONS.forEach(sec => {
      const idx = cmdItemsData.length;
      cmdItemsData.push({ type: 'section', id: sec.id });
      html += `<div class="cmd-item" data-idx="${idx}">
        <div class="cmd-item-icon" style="background:${sec.color}1a;color:${sec.color};">${iconNav}</div>
        <div class="cmd-item-body">
          <div class="cmd-item-title">${sec.label}</div>
          <div class="cmd-item-meta">Sección del newsroom</div>
        </div>
        <span class="cmd-item-badge" style="color:${sec.color};background:${sec.color}1a;">${sec.label.toUpperCase()}</span>
      </div>`;
    });
  } else {
    const results = collectAll()
      .filter(it =>
        (it.title      || '').toLowerCase().includes(query) ||
        (it.summary    || '').toLowerCase().includes(query) ||
        (it.sourceName || '').toLowerCase().includes(query) ||
        (it.topic      || '').toLowerCase().includes(query) ||
        (it.competitor || '').toLowerCase().includes(query)
      )
      .sort(byDateDesc)
      .slice(0, 15);

    if (!results.length) {
      html += `<div class="cmd-empty">Sin resultados para "<strong>${q}</strong>"</div>`;
    } else {
      html += `<div class="cmd-group-label">${results.length} resultado${results.length !== 1 ? 's' : ''}</div>`;
      results.forEach(it => {
        const color = SEC_COLOR[it.section] || '#888';
        const label = SECTION_LABEL[it.section] || it.section;
        const idx = cmdItemsData.length;
        cmdItemsData.push({ type: 'article', url: it.sourceUrl });
        html += `<div class="cmd-item" data-idx="${idx}">
          <div class="cmd-item-icon" style="background:${color}1a;color:${color};">${iconDoc}</div>
          <div class="cmd-item-body">
            <div class="cmd-item-title">${it.title}</div>
            <div class="cmd-item-meta">${it.sourceName} · ${it.date}</div>
          </div>
          <span class="cmd-item-badge" style="color:${color};background:${color}1a;">${label}</span>
        </div>`;
      });
    }
  }

  resultsEl.innerHTML = html;
  cmdActiveIdx = -1;

  resultsEl.querySelectorAll('.cmd-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      if (cmdItemsData[idx]) activateCmd(cmdItemsData[idx]);
    });
    el.addEventListener('mouseenter', () => {
      setCmdActive(parseInt(el.dataset.idx, 10));
    });
  });
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    cmdOpen ? closeCmd() : openCmd();
    return;
  }
  if (!cmdOpen) return;
  if (e.key === 'Escape')    { e.preventDefault(); closeCmd(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdMoveSelection(1); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); cmdMoveSelection(-1); return; }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (cmdActiveIdx >= 0 && cmdItemsData[cmdActiveIdx]) activateCmd(cmdItemsData[cmdActiveIdx]);
    return;
  }
});

document.addEventListener('DOMContentLoaded', () => {
  buildTOC();
  route();
  initTicker();

  const cmdInput = document.getElementById('cmdInput');
  if (cmdInput) {
    cmdInput.addEventListener('input', e => renderCmdResults(e.target.value));
  }

  document.getElementById('cmdBackdrop')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) closeCmd();
  });

  document.getElementById('cmdTriggerBtn')?.addEventListener('click', openCmd);

  let searchTimer;
  const searchBox = document.getElementById('searchBox');
  if (searchBox) {
    searchBox.addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => renderSearch(e.target.value), 220);
    });
    searchBox.addEventListener('keydown', e => {
      if (e.key === 'Escape') { searchBox.value = ''; route(); searchBox.blur(); }
    });
  }
});
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VU Newsroom — Identidad digital, fraude, CIAM y regulación</title>
<meta name="description" content="Newsroom interno de VU Security. Curaduría diaria de cobertura externa: identidad digital, fraude, deepfakes, KYC/AML y regulación, segmentada en Global, LATAM, Competencia y VU." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --vu-naranja: #F15E37;
    --vu-naranja-soft: #FBD7CC;
    --vu-naranja-deep: #C44826;
    --vu-negro: #1C1D1E;
    --vu-negro-elev: #25262A;
    --vu-negro-soft: #2F3034;
    --vu-crema: #EBE4CA;
    --vu-gris: #666666;
    --vu-gris-light: #B8B8B5;
    --vu-gris-dark: #3A3B3E;
    --vu-blanco: #FFFFFF;

    --sec-global: #3A86FF;
    --sec-latam: #F15E37;
    --sec-regulation: #9B59B6;
    --sec-competencia: #C44826;
    --sec-vu: #06A77D;
    --sec-archivo: #888888;

    --font-display: 'Roobert', 'Space Grotesk', 'Roboto', Arial, sans-serif;
    --font-body: 'Roboto', Arial, sans-serif;
    --font-mono: 'JetBrains Mono', 'Aptos Mono', 'Courier New', monospace;
  }

  @font-face { font-family: 'Roobert'; src: url('fonts/Roobert-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Roobert'; src: url('fonts/Roobert-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'Roobert'; src: url('fonts/Roobert-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    background: var(--vu-negro);
    color: var(--vu-crema);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse at top right, rgba(241,94,55,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(58,134,255,0.04) 0%, transparent 50%);
  }

  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--vu-naranja); }

  /* =================== MASTHEAD =================== */
  .masthead { border-bottom: 1px solid var(--vu-gris-dark); background: var(--vu-negro); }
  .masthead-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 22px 32px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 24px;
  }
  .masthead-left { display: flex; align-items: center; justify-content: flex-start; }
  .masthead-center {
    display: flex; flex-direction: row;
    align-items: center; gap: 16px;
  }
  .masthead-brand-link {
    display: flex; align-items: center; gap: 14px;
    text-decoration: none;
  }
  .brand-newsroom {
    font-family: var(--font-display); font-weight: 700;
    font-size: 44px; letter-spacing: -0.02em; line-height: 1;
    color: var(--vu-naranja);
  }
  .newsroom-label { display: none; }
  .newsroom-sublabel { display: none; }
  .masthead-right {
    display: flex; align-items: center; justify-content: flex-end;
  }

  /* Mini website-link button */
  .website-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    background: #EBE4CA; color: #1C1D1E;
    border-radius: 12px; border: none;
    transition: all 0.15s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .website-btn svg { width: 22px; height: 22px; display: block; }
  .website-btn:hover {
    background: #F0EAD5; color: #1C1D1E;
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.22);
  }
  .website-btn:active { background: #1C1D1E; color: #EBE4CA; transform: translateY(0); box-shadow: none; }

  /* =================== TOC / SECTIONS NAV =================== */
  .sections-nav {
    background: var(--vu-negro-elev);
    border-bottom: 1px solid var(--vu-gris-dark);
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }
  .sections-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 32px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .toc-link {
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 8px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--vu-gris-dark);
    background: var(--vu-negro);
    color: var(--vu-crema);
    transition: all 0.15s ease;
  }
  .toc-link:hover { border-color: var(--vu-naranja); color: var(--vu-naranja); }
  .toc-link.active {
    background: var(--vu-naranja); color: var(--vu-blanco);
    border-color: var(--vu-naranja);
  }
  .toc-link.active .count { background: rgba(0,0,0,0.18); color: var(--vu-negro); border-color: transparent; }
  .toc-link .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .toc-link .count {
    font-size: 10px; padding: 2px 8px;
    border-radius: 999px; font-weight: 600;
    background: var(--vu-negro-soft);
    color: var(--vu-gris-light);
    border: 1px solid var(--vu-gris-dark);
    transition: background 0.15s, color 0.15s;
  }
  .toc-link .count.has-items {
    background: var(--badge-color, var(--vu-naranja));
    color: #fff; border-color: transparent;
  }
  .toc-link.active .count { background: rgba(0,0,0,0.22); color: #fff; border-color: transparent; }
  .toc-link.archivo { margin-left: auto; opacity: 0.85; }
  .toc-link.archivo:hover { opacity: 1; }

  /* =================== TICKER BLOOMBERG =================== */
  .ticker-bar {
    background: var(--vu-negro-elev);
    border-bottom: 1px solid var(--vu-gris-dark);
    height: 40px;
    display: flex;
    align-items: center;
    overflow: visible;
    position: relative;
    user-select: none;
  }
  .ticker-search-wrap {
    flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 12px;
    position: relative;
  }
  .ticker-label {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 16px;
    height: 100%;
    background: var(--vu-naranja);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
    z-index: 2;
  }
  .ticker-live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #fff;
    animation: tickerPulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes tickerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }
  .ticker-vline {
    flex-shrink: 0;
    width: 1px; height: 22px;
    background: var(--vu-gris-dark);
  }
  .ticker-track-wrap {
    flex: 1;
    overflow: hidden;
    height: 100%;
    display: flex;
    align-items: center;
    mask-image: linear-gradient(to right, transparent 0%, #000 2.5%, #000 97.5%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 2.5%, #000 97.5%, transparent 100%);
  }
  .ticker-track-wrap:hover .ticker-track { animation-play-state: paused; }
  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: tickerScroll 80s linear infinite;
    will-change: transform;
  }
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 0 4px;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--vu-crema);
    cursor: pointer;
    transition: color 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }
  .ticker-item:hover { color: var(--vu-naranja); }
  .ticker-tag {
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1.5;
  }
  .ticker-source {
    font-size: 11.5px;
    color: var(--vu-gris-light);
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .ticker-item:hover .ticker-source { color: var(--vu-gris-light); }
  .ticker-sep {
    display: inline-block;
    color: var(--vu-gris-dark);
    font-size: 12px;
    padding: 0 18px;
    flex-shrink: 0;
    line-height: 1;
  }

  /* =================== LEGEND =================== */
  .legend {
    max-width: 1400px; margin: 22px auto 0;
    padding: 0 32px;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 8px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .legend-sep { color: var(--vu-gris-dark); }

  /* =================== MAIN =================== */
  main { max-width: 1400px; margin: 0 auto; padding: 32px; }

  /* =================== VIEW HEADER =================== */
  .view-head {
    display: flex; align-items: center; gap: 16px;
    padding-bottom: 18px; margin-bottom: 28px;
    border-bottom: 2px solid var(--view-color, var(--vu-naranja));
  }
  .view-head h1 {
    font-family: var(--font-display); font-weight: 700;
    font-size: 32px; line-height: 1.1;
    color: var(--view-color, var(--vu-naranja));
    letter-spacing: -0.01em;
  }
  .view-head .view-meta {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .view-tag {
    background: var(--view-color, var(--vu-naranja));
    color: var(--vu-negro);
    padding: 6px 12px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }

  #view[data-view="home"]        { --view-color: var(--vu-naranja); }
  #view[data-view="global"]      { --view-color: var(--sec-global); }
  #view[data-view="latam"]       { --view-color: var(--sec-latam); }
  #view[data-view="regulation"]  { --view-color: var(--sec-regulation); }
  #view[data-view="competencia"] { --view-color: var(--sec-competencia); }
  #view[data-view="vu"]          { --view-color: var(--sec-vu); }
  #view[data-view="archivo"]     { --view-color: var(--sec-archivo); }

  /* =================== FEATURED LAYOUT =================== */
  .feat-grid {
    display: grid; grid-template-columns: 2fr 1fr;
    gap: 20px; margin-bottom: 28px;
  }

  .feat-card, .side-card, .list-card {
    background: var(--vu-negro-elev);
    border: 1px solid var(--vu-gris-dark);
    border-left: 4px solid var(--card-color, var(--vu-naranja));
    border-radius: 12px;
    transition: all 0.15s ease;
    cursor: pointer;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .feat-card:hover, .side-card:hover, .list-card:hover {
    border-color: var(--card-color, var(--vu-naranja));
    background: var(--vu-negro-soft);
    transform: translateY(-1px);
  }
  .feat-card.high, .side-card.high, .list-card.high {
    box-shadow: inset 0 0 0 1px rgba(255, 80, 80, 0.25);
  }

  /* Card section colors */
  .card-global       { --card-color: var(--sec-global); }
  .card-latam        { --card-color: var(--sec-latam); }
  .card-regulation   { --card-color: var(--sec-regulation); }
  .card-competencia  { --card-color: var(--sec-competencia); }
  .card-vu           { --card-color: var(--sec-vu); }
  .card-archivo      { --card-color: var(--sec-archivo); }

  /* Featured (big) */
  .feat-card { padding: 0; min-height: 320px; }
  .feat-card.has-image .feat-image {
    width: 100%; height: 240px;
    overflow: hidden;
    border-bottom: 1px solid var(--vu-gris-dark);
    position: relative;
  }
  .feat-card.has-image .feat-image svg,
  .feat-card.has-image .feat-image img {
    width: 100%; height: 100%; display: block; object-fit: cover;
  }
  .feat-card.has-image .feat-image::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(28,29,30,0.72) 100%);
    pointer-events: none;
  }
  .feat-card .feat-content {
    padding: 26px 28px 24px;
    display: flex; flex-direction: column;
    flex: 1; gap: 12px;
  }
  .feat-card .feat-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .feat-card h2 {
    font-family: var(--font-display); font-size: 28px; font-weight: 700;
    line-height: 1.18; color: var(--vu-blanco);
    letter-spacing: -0.01em;
  }
  .feat-card .feat-summary {
    font-size: 15.5px; color: var(--vu-crema); line-height: 1.55;
  }
  .feat-card .meta { margin-top: auto; }
  @media (max-width: 900px) {
    .feat-card.has-image .feat-image { height: 180px; }
  }

  /* Side cards */
  .feat-grid .sides { display: flex; flex-direction: column; gap: 14px; }
  .side-card { padding: 16px 18px; min-height: 0; }
  .side-card .side-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .side-card h3 {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    line-height: 1.3; color: var(--vu-blanco); margin-bottom: 6px;
  }
  .side-card .side-summary {
    font-size: 13px; color: var(--vu-crema); line-height: 1.45;
    margin-bottom: 8px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* List cards (below the featured grid) */
  .list-grid {
    display: grid; gap: 12px;
    grid-template-columns: 1fr;
  }
  .list-card {
    padding: 14px 18px;
    display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: start;
    flex-direction: row;
  }
  .list-card .list-summary {
    font-family: var(--font-body); font-size: 12.5px; line-height: 1.55;
    color: var(--vu-gris-light); margin: 5px 0 6px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .list-card h4 {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    line-height: 1.3; color: var(--vu-blanco); margin-bottom: 4px;
  }
  .list-card .list-meta {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .list-card .list-side {
    display: flex; flex-direction: column; gap: 4px; align-items: flex-end; min-width: 100px;
  }

  /* Pills / badges shared */
  .pill-section {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--card-color, var(--vu-naranja));
    color: var(--vu-negro);
    padding: 3px 8px; border-radius: 4px;
  }
  .pill-marker {
    font-size: 14px; user-select: none; line-height: 1;
  }
  .pill-marker.high { color: #FF4D4D; font-size: 14px; }
  .pill-marker.std  { color: var(--card-color, var(--vu-naranja)); font-size: 18px; }
  .pill-country {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--vu-crema); background: var(--vu-negro);
    border: 1px solid var(--vu-gris-dark);
    padding: 3px 8px; border-radius: 4px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .pill-comp {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sec-competencia); border: 1px solid var(--sec-competencia);
    padding: 3px 8px; border-radius: 4px;
  }
  .date-badge {
    background: var(--vu-negro); border: 1px solid var(--vu-gris-dark);
    border-radius: 5px; padding: 3px 7px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.06em; color: var(--vu-crema);
  }
  .lang-badge {
    font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--vu-negro-soft); color: var(--vu-gris-light);
    padding: 3px 6px; border-radius: 4px;
  }
  .lang-switcher { display: inline-flex; gap: 2px; align-items: center; }
  .lang-btn {
    font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--vu-negro-soft); color: var(--vu-gris-light);
    padding: 3px 5px; border-radius: 3px;
    border: 1px solid transparent; cursor: pointer; line-height: 1;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .lang-btn:hover { border-color: var(--vu-gris-dark); color: var(--vu-crema); }
  .lang-btn.active { background: var(--card-color, var(--vu-naranja)); color: var(--vu-negro); }
  .lang-btn.loading { opacity: 0.4; pointer-events: none; }

  .meta {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
    color: var(--vu-gris-light); text-transform: uppercase;
  }
  .newsroom-sublabel {
    font-family: var(--font-body); font-size: 12px;
    color: var(--vu-gris-light); font-style: italic;
    margin-top: 2px;
  }
  .meta a { color: var(--card-color, var(--vu-naranja)); }
  .meta a:hover { text-decoration: underline; }
  .pip { color: var(--vu-gris-dark); }

  /* =================== EMPTY STATE =================== */
  .empty-msg {
    padding: 24px 22px; border-radius: 12px;
    background: rgba(255,255,255,0.02);
    border: 1px dashed var(--vu-gris-dark);
    color: var(--vu-gris-light);
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.04em;
    text-align: center;
  }

  /* =================== BACK TO TOP =================== */
  .back-top-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.92); color: #1C1D1E;
    border-radius: 50%; border: none; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 100;
    transition: all 0.15s ease;
  }
  .back-top-btn.visible { display: inline-flex; }
  .back-top-btn:hover { background: #ffffff; color: #1C1D1E; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.28); }
  .back-top-btn:active { background: #1C1D1E; color: #ffffff; transform: translateY(0); box-shadow: none; }
  .back-top-btn svg { width: 22px; height: 22px; display: block; }

  /* =================== FOOTER =================== */
  footer {
    border-top: 1px solid var(--vu-gris-dark);
    background: var(--vu-negro);
    padding: 32px;
    margin-top: 80px;
  }
  .footer-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; flex-wrap: wrap; gap: 8px 32px; align-items: center; justify-content: center;
    color: var(--vu-gris-light);
    font-family: var(--font-mono); font-size: 11.5px;
    letter-spacing: 0.06em; text-transform: uppercase;
    text-align: center;
  }
  .footer-inner strong { color: var(--vu-crema); font-weight: 700; }
  .footer-inner .pip { color: var(--vu-gris-dark); }

  /* =================== CARD FLIP ACCIONABLES =================== */

  /* Wrapper — replaces the <article> as perspective container */
  .flip-card {
    perspective: 1200px;
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    overflow: visible !important;
    cursor: default;
  }
  .flip-card:hover { transform: none !important; }

  /* Inner — rotates the whole card */
  .flip-card-inner {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.52s cubic-bezier(0.4, 0, 0.2, 1);
    width: 100%;
    height: 100%;
    border-radius: 12px;
  }
  .flip-card:hover .flip-card-inner,
  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  /* Both faces: hardware acceleration + correct visibility */
  .flip-front,
  .flip-back {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 12px;
  }

  /* Front face — the original card */
  .flip-front {
    position: relative;
    width: 100%;
    /* Normal flow — its height determines .flip-card-inner height */
    display: flex;
    flex-direction: column;
    background: var(--vu-negro-elev);
    border: 1px solid var(--vu-gris-dark);
    border-left: 4px solid var(--card-color, var(--vu-naranja));
    overflow: hidden;
    border-radius: 12px;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
  }
  .flip-card:hover .flip-front {
    border-color: var(--card-color, var(--vu-naranja));
    background: var(--vu-negro-soft);
  }
  .flip-card.high .flip-front {
    box-shadow: inset 0 0 0 1px rgba(255, 80, 80, 0.25);
  }

  /* Back face — the actionable */
  .flip-back {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    transform: rotateY(180deg);
    background: var(--vu-negro-elev);
    border: 1px solid var(--card-color, var(--vu-naranja));
    border-left: 4px solid var(--card-color, var(--vu-naranja));

    flex-direction: column;
    justify-content: space-between;
    padding: 22px 22px 18px;
    gap: 12px;
    overflow: hidden;
  }
  .flip-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(var(--card-color-rgb, 241,94,55), 0.1) 0%, transparent 60%);
    pointer-events: none;

  .flip-back-header {

  argentina:    { name: 'Argentina',    flag: '🇦🇷' },

/* =========================================================================
   LATAM MAP — D3 + Natural Earth (world-atlas 110m)
   ========================================================================= */

// ISO 3166-1 numeric → country key (tracked countries in LATAM section)
const LATAM_ISO = {
  32:  'argentina', 68:  'bolivia',    76:  'brasil',    152: 'chile',
  170: 'colombia',  188: 'costa_rica', 218: 'ecuador',   222: 'el_salvador',
  484: 'mexico',    591: 'panama',     600: 'paraguay',  604: 'peru',
  858: 'uruguay',   862: 'venezuela'
};
// Background countries (geographic fill, not tracked)
const LATAM_BG_ISO = new Set([320, 340, 558, 192, 332, 214, 630, 659, 388]);
// (Guatemala, Honduras, Nicaragua, Cuba, Haiti, Dominican Republic, Puerto Rico, Antigua, Jamaica)

let _worldDataCache = null;

function fetchWorldAtlas() {
  if (_worldDataCache) return Promise.resolve(_worldDataCache);
  return fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(d => { _worldDataCache = d; return d; });
}

function mapCountryColor(count) {
  if (!count) return '#252525';
  if (count === 1) return 'rgba(241,94,55,0.38)';
  if (count <= 3) return 'rgba(241,94,55,0.68)';
  return '#F15E37';
}

function renderD3LatamMap(byCountry, container) {
  container.innerHTML = '<div class="map-loading">Cargando mapa…</div>';

  fetchWorldAtlas().then(world => {
    const allFeatures = topojson.feature(world, world.objects.countries).features;
    const bgFeatures      = allFeatures.filter(f => LATAM_BG_ISO.has(+f.id));
    const trackedFeatures = allFeatures.filter(f => LATAM_ISO[+f.id]);
    const allLatam        = [...bgFeatures, ...trackedFeatures];

    container.innerHTML = '';
    const W = Math.min(container.clientWidth || 480, 520);
    const H = Math.round(W * 1.55);

    const projection = d3.geoNaturalEarth1();
    const path       = d3.geoPath().projection(projection);
    projection.fitSize([W, H], { type: 'FeatureCollection', features: allLatam });

    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('width', '100%')
      .attr('role', 'img')
      .attr('aria-label', 'Mapa LATAM interactivo');

    // Background (non-tracked)
    svg.selectAll('.map-bg')
      .data(bgFeatures).join('path')
      .attr('class', 'map-bg')
      .attr('d', path);

    // Tracked countries
    const tip = document.getElementById('latamTip');
    svg.selectAll('.map-country')
      .data(trackedFeatures).join('path')
      .attr('class', d => {
        const count = (byCountry[LATAM_ISO[+d.id]] || []).length;
        return 'map-country' + (count > 0 ? ' has-news' : '');
      })
      .attr('fill', d => mapCountryColor((byCountry[LATAM_ISO[+d.id]] || []).length))
      .attr('d', path)
      .on('mouseover', function(event, d) {
        const id    = LATAM_ISO[+d.id];
        const info  = COUNTRIES[id] || { flag: '', name: id };
        const count = (byCountry[id] || []).length;
        tip.textContent = count > 0
          ? `${info.flag} ${info.name} · ${count} nota${count !== 1 ? 's' : ''}`
          : `${info.flag} ${info.name} · sin notas`;
        tip.style.display = 'block';
      })
      .on('mousemove', function(event) {
        tip.style.left = (event.clientX + 14) + 'px';
        tip.style.top  = (event.clientY - 32) + 'px';
      })
      .on('mouseout', function() {
        tip.style.display = 'none';
      })
      .on('click', function(event, d) {
        const id    = LATAM_ISO[+d.id];
        const count = (byCountry[id] || []).length;
        if (!count) return;
        tip.style.display = 'none';
        // Switch to list tab then scroll to country
        const listBtn = document.querySelector('.latam-toggle-btn[data-tab="list"]');
        if (listBtn && !listBtn.classList.contains('active')) listBtn.click();
        setTimeout(() => {
          const det = document.querySelector(`.country-section[data-country="${id}"]`);
          if (!det) return;
          det.open = true;
          det.scrollIntoView({ behavior: 'smooth', block: 'start' });
          det.style.outline = '2px solid #F15E37';
          setTimeout(() => { det.style.outline = ''; }, 1400);
        }, 80);
      });

    // Legend
    const leg = d3.select(container).append('div').attr('class', 'latam-map-legend');
    [
      { color: '#252525',              label: 'Sin notas' },
      { color: 'rgba(241,94,55,0.38)', label: '1 nota'   },
      { color: 'rgba(241,94,55,0.68)', label: '2-3 notas'},
      { color: '#F15E37',              label: '4+ notas'  }
    ].forEach(({ color, label }) => {
      const item = leg.append('span').attr('class', 'map-legend-item');
      item.append('span').attr('class', 'map-legend-swatch').style('background', color);
      item.append('span').text(label);
    });

  }).catch(err => {
    container.innerHTML = `<div class="map-loading" style="color:#F15E37">Error al cargar el mapa. Verificá conexión.</div>`;
    console.error('[LatamMap]', err);
  });
}

/* =========================================================================
   HELPERS
   ========================================================================= */

const FRESH_DAYS = 7;
const TODAY_ISO = '2026-06-04';

function fmtDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}
function daysAgo(iso) {
  const t  = new Date(TODAY_ISO + 'T00:00:00Z').getTime();
  const d  = new Date(iso + 'T00:00:00Z').getTime();
  return Math.round((t - d) / 86400000);
}
function isFresh(it) { return daysAgo(it.date) <= FRESH_DAYS; }
function isOld(it)   { return daysAgo(it.date) >  FRESH_DAYS; }
function isPinned(it) { return it.pinUntil && it.pinUntil >= TODAY_ISO; }
function byDateDesc(a,b) {
  const ap = isPinned(a) ? 1 : 0;
  const bp = isPinned(b) ? 1 : 0;
  if (ap !== bp) return bp - ap;
  if (b.date !== a.date) return b.date.localeCompare(a.date);
  if (a.highRelevance !== b.highRelevance) return a.highRelevance ? -1 : 1;
  return 0;
}

function collectAll() {
  const out = [];
  briefing.sections.global.forEach(it      => out.push({...it, section: 'global'}));
  briefing.sections.regulation.forEach(it  => out.push({...it, section: 'regulation'}));
  briefing.sections.competencia.forEach(it => out.push({...it, section: 'competencia'}));
  briefing.sections.vu.forEach(it          => out.push({...it, section: 'vu'}));
  Object.entries(briefing.sections.latam).forEach(([country, items]) => {
    items.forEach(it => out.push({...it, section: 'latam', country}));
  });
  return out;
}
function itemsBySection(section) {
  return collectAll().filter(it => it.section === section);
}

const SECTION_LABEL = {
  global:      'Global',
  latam:       'LATAM',
  regulation:  'Regulación',
  competencia: 'Competencia',
  vu:          'VU',
  archivo:     'Archivo'
};

/* =========================================================================
   RENDER — building blocks
   ========================================================================= */

function pillsHTML(it) {
  const parts = [];
  parts.push(`<span class="pill-section">${SECTION_LABEL[it.section] || ''}</span>`);
  parts.push(`<span class="pill-marker ${it.highRelevance ? 'high' : 'std'}">${it.highRelevance ? '🔴' : '▸'}</span>`);
  if (it.country && COUNTRIES[it.country]) {
    parts.push(`<span class="pill-country"><span>${COUNTRIES[it.country].flag}</span>${COUNTRIES[it.country].name}</span>`);
  }
  if (it.competitor) parts.push(`<span class="pill-comp">${it.competitor}</span>`);
  return parts.join(' ');
}

  "sumsub-travel-rule-thailand-may19": { es: "Sumsub organizó \"The Thai Gateway\" en Bangkok junto a la Asociación Digital de Activos de Tailandia y Cryptomind Group, convocando al Banco de Tailandia (BOT), la Oficina AML (AMLO) y la SEC para avanzar la implementación de la Travel Rule y la Recomendación 16 del GAFI, que entra en vigencia en julio de 2026. El reporte State of the Crypto Industry de Sumsub indica que el 51% de las plataformas cripto ya están en plena implementación o activamente avanzando en el cumplimiento del Travel Rule; Sumsub opera un ecosistema con más de 2.100 proveedores de activos virtuales conectados. El movimiento refuerza el posicionamiento de Sumsub como plataforma de compliance AML/KYC cripto de referencia global, en competencia directa con la oferta de onboarding y compliance de VU ONE en mercados financieros.", en: "Sumsub organized \"The Thai Gateway\" in Bangkok alongside the Thailand Digital Asset Association and Cryptomind Group, bringing together the Bank of Thailand (BOT), the AML Office (AMLO), and the SEC to advance implementation of the Travel Rule and FATF Recommendation 16, which takes effect in July 2026. Sumsub's State of the Crypto Industry report indicates that 51% of crypto platforms are already in full implementation or actively advancing Travel Rule compliance; Sumsub operates an ecosystem with over 2,100 connected virtual asset providers. The move reinforces Sumsub's positioning as a global reference crypto AML/KYC compliance platform, in direct competition with VU ONE's onboarding and compliance offering in financial markets.", pt: "A Sumsub organizou o \"The Thai Gateway\" em Bangkok junto à Thailand Digital Asset Association e ao Cryptomind Group, reunindo o Banco da Tailândia (BOT), o Escritório AML (AMLO) e a SEC para avançar na implementação da Travel Rule e da Recomendação 16 do GAFI, que entra em vigor em julho de 2026. O relatório State of the Crypto Industry da Sumsub indica que 51% das plataformas cripto já estão em plena implementação ou avançando ativamente no cumprimento da Travel Rule; a Sumsub opera um ecossistema com mais de 2.100 provedores de ativos virtuais conectados. O movimento reforça o posicionamento da Sumsub como plataforma global de referência em compliance AML/KYC cripto, em concorrência direta com a oferta de onboarding e compliance do VU ONE em mercados financeiros." , titles: { es: "Sumsub avanza la Travel Rule en Tailandia: reguladores del banco central, AMLO y SEC listos para julio 2026", en: "Sumsub Advances Travel Rule in Thailand: Central Bank, AMLO and SEC Ready for July 2026", pt: "Sumsub avanca a Travel Rule na Tailandia: reguladores do banco central, AMLO e SEC prontos para julho de 2026" } },
  "eu-ai-act-biometria-alto-riesgo-2027": { es: "El Parlamento Europeo y el Consejo sellaron un acuerdo provisional que extiende el plazo de cumplimiento de la IA Act para sistemas de alto riesgo — incluyendo biometría, control fronterizo y aplicación de la ley — hasta el 2 de diciembre de 2027 (antes agosto de 2026). En paralelo, suma la prohibición de herramientas de deepfake sexual no consentido con entrada en vigor diciembre de 2026. Para LATAM, el marco europeo es la referencia técnica que moldea los estándares de KYC biométrico en la región.", en: "The European Parliament and Council reached a provisional agreement extending the AI Act compliance deadline for high-risk systems — including biometrics, border control, and law enforcement — to December 2, 2027 (previously August 2026). In parallel, it adds a ban on non-consensual sexual deepfake tools, effective December 2026. For LATAM, the European framework is the technical reference shaping biometric KYC standards across the region.", pt: "O Parlamento Europeu e o Conselho firmaram um acordo provisório que estende o prazo de conformidade do AI Act para sistemas de alto risco — incluindo biometria, controle de fronteiras e aplicação da lei — até 2 de dezembro de 2027 (antes agosto de 2026). Em paralelo, acrescenta a proibição de ferramentas de deepfake sexual não consentido com entrada em vigor em dezembro de 2026. Para a LATAM, o marco europeu é a referência técnica que molda os padrões de KYC biométrico na região." , titles: { es: "UE posterga hasta 2027 la IA biométrica de alto riesgo — y prohíbe deepfakes no consentidos para diciembre de 2026", en: "EU Delays High-Risk Biometric AI Until 2027 — and Bans Non-Consensual Deepfakes by December 2026", pt: "UE adia até 2027 a IA biométrica de alto risco — e proíbe deepfakes não consentidos para dezembro de 2026" } },
  "moroni-dni-digital-evidencia": { es: "En LinkedIn, la líder de Producto de VU plantea que miDNI funciona en presencial pero su efectividad remota es limitada — y eso no es un defecto del documento sino del sistema en el que se inserta. La propuesta: integrarlo en un sistema continuo, multicanal, con controles de riesgo unificados. \"El DNI digital no resuelve el problema de identidad — lo evidencia.\"", en: "In a LinkedIn post, VU's Product lead argues that miDNI works in person but its remote effectiveness is limited — and that is not a flaw of the document itself, but of the system it operates within. The proposal: integrate it into a continuous, multichannel system with unified risk controls. \"The digital ID doesn't solve the identity problem — it makes it visible.\"", pt: "No LinkedIn, a líder de Produto da VU argumenta que o miDNI funciona presencialmente, mas sua efetividade remota é limitada — e isso não é uma falha do documento em si, mas do sistema no qual está inserido. A proposta: integrá-lo em um sistema contínuo, multicanal, com controles de risco unificados. \"O DNI digital não resolve o problema de identidade — ele o evidencia.\"" , titles: { es: "Carla Moroni (VU): el DNI digital no resuelve la identidad — la evidencia", en: "Carla Moroni (VU): Digital National ID Does Not Solve Identity — The Evidence", pt: "Carla Moroni (VU): o RG digital não resolve a identidade — as evidências" } },
  "jinkusu-cam-deepfake-kyc": { es: "Una herramienta vendida en darknet usa face-swap acelerado por GPU para evadir el liveness en bancos y plataformas cripto. Los ataques de inyección de deepfake crecieron un 783% en el último período medido. Biometric Update: \"El rostro, por sí solo, ya no es prueba de identidad\".", en: "A darknet-sold tool uses GPU-accelerated face-swap to bypass liveness checks at banks and crypto platforms. Deepfake injection attacks grew 783% in the last measured period. Biometric Update: \"The face, by itself, is no longer proof of identity\".", pt: "Uma ferramenta vendida na darknet usa face-swap acelerado por GPU para burlar o liveness em bancos e plataformas cripto. Os ataques de injeção de deepfake cresceram 783% no último período medido. Biometric Update: \"O rosto, por si só, não é mais prova de identidade\"." , titles: { es: "JINKUSU CAM: la herramienta de deepfake en tiempo real que ya está bypaseando KYC bancario", en: "JINKUSU CAM: The Real-Time Deepfake Tool Already Bypassing Banking KYC", pt: "JINKUSU CAM: a ferramenta de deepfake em tempo real que já está burlando o KYC bancário" } },
  "au10tix-anydoc-authentication-jun01": { es: "AU10TIX presentó AnyDoc Authentication, herramienta que aplica más de 150 tests de detección de falsificaciones sobre documentos no-ID —facturas, extractos bancarios, declaraciones impositivas y licencias comerciales— en 5-20 segundos con precisión de hasta 99,99% y 90% de reducción en revisiones manuales. Apunta a KYC, KYB y AML en finanzas, cripto, salud y educación. El CEO Yair Tal señaló que la prevención de fraude efectiva exige autenticar cada documento de soporte, no solo el documento de identidad primario.", en: "AU10TIX launched AnyDoc Authentication, a tool that applies over 150 forgery detection tests to non-ID documents — invoices, bank statements, tax declarations, and business licenses — in 5-20 seconds with up to 99.99% accuracy and a 90% reduction in manual reviews. It targets KYC, KYB, and AML use cases in finance, crypto, healthcare, and education. CEO Yair Tal noted that effective fraud prevention requires authenticating every supporting document, not just the primary identity document.", pt: "A AU10TIX lançou o AnyDoc Authentication, ferramenta que aplica mais de 150 testes de detecção de falsificações em documentos não-ID — faturas, extratos bancários, declarações fiscais e licenças comerciais — em 5 a 20 segundos, com precisão de até 99,99% e redução de 90% nas revisões manuais. A solução é voltada para KYC, KYB e AML em finanças, cripto, saúde e educação. O CEO Yair Tal destacou que a prevenção eficaz de fraudes exige autenticar cada documento de suporte, não apenas o documento de identidade principal." , titles: { es: "AU10TIX lanza AnyDoc Authentication: 150+ tests de fraude en documentos de soporte con 99,99% de precisión", en: "AU10TIX Launches AnyDoc Authentication: 150+ Fraud Tests on Support Documents with 99.99% Accuracy", pt: "AU10TIX lança AnyDoc Authentication: mais de 150 testes de fraude em documentos de suporte com 99,99% de precisão" } },
  "latam-ciberataques-checkpoint-may13": { es: "El reporte de Check Point Research (abril 2026) ubica a América Latina como la región con más ciberataques del mundo: promedio de 3.364 intentos semanales por organización (+20% interanual), superando a Asia-Pacífico (3.213) y Europa (1.848). Brasil, Colombia y México encabezan en LATAM; Argentina creció 15% año a año. El dato más alarmante: 1 de cada 28 prompts de IA generativa empresarial expone información sensible y el 90% de las organizaciones que usan GenAI ya enfrentaron un incidente asociado — la superficie de ataque se amplía al mismo ritmo que la adopción de IA.", en: "Check Point Research's report (April 2026) positions Latin America as the world's most cyberattacked region: an average of 3,364 weekly attempts per organization (+20% year-over-year), surpassing Asia-Pacific (3,213) and Europe (1,848). Brazil, Colombia, and Mexico lead within LATAM; Argentina grew 15% year-over-year. The most alarming finding: 1 in every 28 enterprise generative AI prompts exposes sensitive information, and 90% of organizations using GenAI have already faced an associated incident — the attack surface is expanding at the same pace as AI adoption.", pt: "O relatório da Check Point Research (abril 2026) posiciona a América Latina como a região com mais ciberataques do mundo: média de 3.364 tentativas semanais por organização (+20% interanual), superando Ásia-Pacífico (3.213) e Europa (1.848). Brasil, Colômbia e México lideram na LATAM; a Argentina cresceu 15% ano a ano. O dado mais alarmante: 1 em cada 28 prompts de IA generativa empresarial expõe informações sensíveis e 90% das organizações que usam GenAI já enfrentaram um incidente associado — a superfície de ataque se expande no mesmo ritmo que a adoção de IA." , titles: { es: "LATAM lidera el ranking global de ciberataques: 3.364 intentos semanales por organización y GenAI como nuevo vector de fuga", en: "LATAM leads the global cyberattack ranking: 3,364 weekly attempts per organization and GenAI as a new exfiltration vector", pt: "LATAM lidera o ranking global de ciberataques: 3.364 tentativas semanais por organização e GenAI como novo vetor de vazamento" } },
  "infobae-ia-voz-deepfake-fraude-may26": { es: "Infobae documenta la escalada de fraudes con clonación de voz e IA generativa que permite crear videollamadas falsas en tiempo real. El caso referente: empleados de Arup (Hong Kong) autorizaron transferencias millonarias engañados por deepfakes de directivos en videollamada. Expertos de ESET, Kaspersky e Interpol advierten que las estafas románticas evolucionaron con \"pig butchering 2.0\" — interacciones en vivo con rostros generados por IA. Las pérdidas globales son multimillonarias y el vector creció 180% en 2025.", en: "Infobae documents the escalation of fraud using voice cloning and generative AI to create real-time fake video calls. The defining case: Arup (Hong Kong) employees authorized multimillion-dollar transfers after being deceived by deepfakes of executives on a video call. Experts from ESET, Kaspersky, and Interpol warn that romance scams have evolved into \"pig butchering 2.0\" — live interactions featuring AI-generated faces. Global losses are in the billions and this attack vector grew 180% in 2025.", pt: "A Infobae documenta a escalada de fraudes com clonagem de voz e IA generativa que permite criar videochamadas falsas em tempo real. O caso de referência: funcionários da Arup (Hong Kong) autorizaram transferências milionárias ao serem enganados por deepfakes de executivos em videochamada. Especialistas da ESET, Kaspersky e Interpol alertam que os golpes românticos evoluíram para o \"pig butchering 2.0\" — interações ao vivo com rostos gerados por IA. As perdas globais são multimilionárias e o vetor cresceu 180% em 2025." , titles: { es: "Estafas con IA al alza: clonar una voz toma 3 segundos — y los bancos están en la mira", en: "AI Scams on the Rise: Cloning a Voice Takes 3 Seconds — and Banks Are in the Crosshairs", pt: "Golpes com IA em alta: clonar uma voz leva 3 segundos — e os bancos estão na mira" } },
  "nec-dhs-mobile-fortify-smart-glasses-2026": { es: "NEC Corporation, que ya alimenta Mobile Fortify —el app de identificación biométrica de campo de ICE y CBP— avanza hacia el siguiente eslabón con el proyecto de smart glasses del DHS (USD 7,5M, FY2027). La herramienta compara en tiempo real rostros y huellas contra repositorios de millones de registros de pasaportes, visas y bases penales de EE.UU. El posicionamiento de NEC como capa biométrica embebida en todo el ciclo de aplicación de la ley migratoria refuerza su narrativa de \"identidad soberana para gobierno\", el segmento que también es prioridad estratégica de VU en LATAM.", en: "NEC Corporation, which already powers Mobile Fortify — the field biometric identification app used by ICE and CBP — is advancing to the next step with the DHS smart glasses project (USD 7.5M, FY2027). The tool matches faces and fingerprints in real time against repositories of millions of passport, visa, and U.S. criminal database records. NEC's positioning as a biometric layer embedded throughout the entire immigration law enforcement cycle reinforces its \"sovereign identity for government\" narrative — the same segment that is also a strategic priority for VU in LATAM.", pt: "A NEC Corporation, que já alimenta o Mobile Fortify — o aplicativo de identificação biométrica de campo do ICE e CBP — avança para o próximo elo com o projeto de smart glasses do DHS (USD 7,5M, FY2027). A ferramenta compara em tempo real rostos e impressões digitais contra repositórios de milhões de registros de passaportes, vistos e bases criminais dos EUA. O posicionamento da NEC como camada biométrica incorporada em todo o ciclo de aplicação da lei migratória reforça sua narrativa de \"identidade soberana para governo\" — o segmento que também é prioridade estratégica da VU na LATAM." , titles: { es: "NEC consolida su posición como proveedor central de biometría para DHS/ICE con proyecto de lentes inteligentes USD 7,5M", en: "NEC Cements Its Role as Core Biometrics Vendor for DHS/ICE with USD 7.5M Smart Glasses Project", pt: "NEC consolida sua posição como fornecedor central de biometria para DHS/ICE com projeto de óculos inteligentes de USD 7,5M" } },
  "brasil-cin-biometria-plazo": { es: "La ordenanza 2.907/2026 extendió hasta el 31 de diciembre el plazo para registrar biometría en la Carteira de Identidade Nacional (reemplazo del RG) y mantener el acceso a beneficios sociales. La base biométrica electoral del TSE supera los 130 millones de registros. Cualquier proceso de KYC operando en Brasil debe manejar documentos en transición sin generar fricción.", en: "Ordinance 2,907/2026 extended the deadline to December 31 for enrolling biometrics in the Carteira de Identidade Nacional (the replacement for the RG) and maintaining access to social benefits. The TSE's electoral biometric database exceeds 130 million records. Any KYC process operating in Brazil must handle transitional documents without friction.", pt: "A portaria 2.907/2026 prorrogou para 31 de dezembro o prazo para o cadastramento biométrico na Carteira de Identidade Nacional (substituta do RG) e a manutenção do acesso a benefícios sociais. A base biométrica eleitoral do TSE supera 130 milhões de registros. Qualquer processo de KYC operando no Brasil deve lidar com documentos em transição sem gerar atrito." , titles: { es: "Brasil extiende el enrolamiento biométrico de la nueva CIN hasta diciembre", en: "Brazil Extends Biometric Enrollment for the New National ID Card to December", pt: "Brasil prorroga o cadastramento biométrico da nova CIN até dezembro" } },
  "uk-digital-id-kings-speech-may13": { es: "El discurso del Trono del 13 de mayo en el Parlamento del Reino Unido incluyó por primera vez un compromiso legislativo explícito con la identidad digital: el Digital Access to Services Bill impulsará un sistema de ID voluntario para acceder a servicios públicos y privados. Los expertos señalan que la biometría y la detección de liveness son componentes técnicos ineludibles del esquema. El hito señala que los gobiernos de economías avanzadas están convirtiendo la identidad digital soberana en política de Estado — el mismo camino que Argentina (RENAPER/miDNI), Brasil (CIN) y México (CURP digital) ya recorren.", en: "The King's Speech on May 13 at the UK Parliament included, for the first time, an explicit legislative commitment to digital identity: the Digital Access to Services Bill will drive a voluntary ID system for accessing public and private services. Experts note that biometrics and liveness detection are unavoidable technical components of the scheme. The milestone signals that governments in advanced economies are turning sovereign digital identity into state policy — the same path Argentina (RENAPER/miDNI), Brazil (CIN), and Mexico (digital CURP) are already following.", pt: "O discurso do Trono de 13 de maio no Parlamento do Reino Unido incluiu, pela primeira vez, um compromisso legislativo explícito com a identidade digital: o Digital Access to Services Bill impulsionará um sistema de ID voluntário para acesso a serviços públicos e privados. Especialistas apontam que a biometria e a detecção de liveness são componentes técnicos inevitáveis do esquema. O marco indica que os governos de economias avançadas estão convertendo a identidade digital soberana em política de Estado — o mesmo caminho que Argentina (RENAPER/miDNI), Brasil (CIN) e México (CURP digital) já percorrem." , titles: { es: "El King's Speech confirma la identidad digital nacional en el Reino Unido — modelo que LATAM observa", en: "The King's Speech confirms national digital identity in the UK — a model LATAM is watching", pt: "O King's Speech confirma a identidade digital nacional no Reino Unido — modelo que a LATAM observa" } },
  "uidai-aadhaar-new-app-selective-sharing-may26": { es: "La autoridad india UIDAI inicia la jubilación de mAadhaar con más de 21 millones de descargas del nuevo sistema en tres meses y 2,8 millones de actualizaciones de número móvil completadas. La nueva plataforma permite compartición selectiva de atributos de identidad —el usuario elige qué datos comparte— reforzando privacidad bajo estándares modernos. El servicio gratuito de actualización documental fue extendido hasta el 14 de junio de 2027, dando margen para la migración masiva.", en: "Indian authority UIDAI begins phasing out mAadhaar, with over 21 million downloads of the new system in three months and 2.8 million mobile number updates completed. The new platform enables selective sharing of identity attributes — users choose which data to share — strengthening privacy under modern standards. The free document update service was extended to June 14, 2027, providing room for a large-scale migration.", pt: "A autoridade indiana UIDAI inicia a aposentadoria do mAadhaar, com mais de 21 milhões de downloads do novo sistema em três meses e 2,8 milhões de atualizações de número de celular concluídas. A nova plataforma permite o compartilhamento seletivo de atributos de identidade — o usuário escolhe quais dados compartilha — reforçando a privacidade sob padrões modernos. O serviço gratuito de atualização documental foi estendido até 14 de junho de 2027, oferecendo margem para a migração em massa." , titles: { es: "India migra 21 millones de usuarios a la nueva app Aadhaar con compartición selectiva de datos biométricos", en: "India Migrates 21 Million Users to New Aadhaar App with Selective Biometric Data Sharing", pt: "Índia migra 21 milhões de usuários para o novo app Aadhaar com compartilhamento seletivo de dados biométricos" } },
  "iproov-injection-1151pct-assurance-may20": { es: "iProov documentó un aumento del 1.151% en ataques de inyección biométrica durante el último año, evidenciando que los deepfakes sofisticados han superado a los sistemas de detección basados en artefactos visuales. La industria responde migrando hacia estándares de desempeño verificados de forma independiente —con eIDAS como nueva línea base regulatoria en la UE— donde el requisito pasa de detectar defectos técnicos a garantizar \"presencia genuina\" del usuario. Para VU, el dato refuerza la narrativa técnica de VU Deepfense: la certificación y la validación multicapa ya no son opcionales sino el umbral mínimo de confianza del mercado.", en: "iProov documented a 1,151% increase in biometric injection attacks over the past year, demonstrating that sophisticated deepfakes have outpaced detection systems based on visual artifacts. The industry is responding by migrating toward independently verified performance standards — with eIDAS as the new regulatory baseline in the EU — where the requirement shifts from detecting technical defects to guaranteeing \"genuine presence\" of the user. For VU, the data reinforces the technical narrative of VU Deepfense: certification and multi-layer validation are no longer optional but the market's minimum trust threshold.", pt: "A iProov documentou um aumento de 1.151% em ataques de injeção biométrica no último ano, evidenciando que deepfakes sofisticados superaram os sistemas de detecção baseados em artefatos visuais. A indústria responde migrando para padrões de desempenho verificados de forma independente — com o eIDAS como nova linha de base regulatória na UE — onde o requisito passa de detectar defeitos técnicos para garantir a \"presença genuína\" do usuário. Para a VU, o dado reforça a narrativa técnica do VU Deepfense: a certificação e a validação multicamada deixaram de ser opcionais e se tornaram o limiar mínimo de confiança do mercado." , titles: { es: "Ataques de inyección biométrica crecen 1.151% en un año: la industria abandona el liveness básico y exige garantías avanzadas", en: "Biometric Injection Attacks Surge 1,151% in One Year: Industry Moves Beyond Basic Liveness to Advanced Assurance", pt: "Ataques de injeção biométrica crescem 1.151% em um ano: setor abandona liveness básico e exige garantias avançadas" } },
  "uk-digital-id-nations-politics-may19": { es: "El Digital Access to Services Bill de Starmer enfrenta rechazo formal de los gobiernos de Escocia, Gales e Irlanda del Norte, con el SNP, Plaid Cymru y el DUP oponiéndose por sensibilidades históricas y soberanía nacional; más de 154.000 residentes galeses firmaron una petición en contra. La posición debilitada de Starmer —presionado a renunciar por más de 90 diputados laboristas— limita su capacidad para imponer el esquema centralizado de identidad. El caso ilustra que los proyectos de identidad digital nacional colapsan cuando quedan atrapados en ciclos políticos sin bases de consenso institucional robusto.", en: "Starmer's Digital Access to Services Bill faces formal rejection from the governments of Scotland, Wales, and Northern Ireland, with the SNP, Plaid Cymru, and the DUP opposing it on grounds of historical sensitivities and national sovereignty; more than 154,000 Welsh residents signed a petition against it. Starmer's weakened position — under pressure to resign from more than 90 Labour MPs — limits his ability to impose the centralized identity scheme. The case illustrates that national digital identity projects collapse when trapped in political cycles without a robust institutional consensus base.", pt: "O Digital Access to Services Bill de Starmer enfrenta rejeição formal dos governos da Escócia, do País de Gales e da Irlanda do Norte, com o SNP, o Plaid Cymru e o DUP se opondo por sensibilidades históricas e soberania nacional; mais de 154.000 residentes galeses assinaram uma petição contra a medida. A posição enfraquecida de Starmer — pressionado a renunciar por mais de 90 deputados trabalhistas — limita sua capacidade de impor o esquema centralizado de identidade. O caso ilustra que projetos de identidade digital nacional colapsam quando presos em ciclos políticos sem bases de consenso institucional robusto." , titles: { es: "La identidad digital del Reino Unido choca con Escocia, Gales e Irlanda del Norte: 154.000 firmas galesas y la debilidad política de Starmer frenan el proyecto", en: "UK Digital ID Clashes with Scotland, Wales and Northern Ireland: 154K Welsh Signatures and Starmer's Political Weakness Stall the Bill", pt: "Identidade digital do Reino Unido enfrenta resistência da Escócia, País de Gales e Irlanda do Norte: 154 mil assinaturas galesas e fragilidade política de Starmer travam o projeto" } },
  "didit-6m-identity-fraud-infra-may27": { es: "Didit —startup fundada por los hermanos Rosas en Barcelona y San Francisco (YC W24)— cerró USD 6M adicionales con inversores de EE.UU., Brasil y la UE incluyendo Y Combinator, Pioneer Fund y Rebel Fund, llevando su semilla total a USD 7,5M. La empresa ofrece una API unificada que combina KYC, KYB, biometría, AML y monitoreo de transacciones en tiempo real para 1.500 clientes B2B activos en fintech, cripto, iGaming y gobierno en 220+ países. Con crecimiento superior al 30% mensual y ya rentable, Didit apunta a identidad \"programable\" con credenciales reutilizables y control de privacidad del usuario.", en: "Didit — a startup founded by the Rosas brothers in Barcelona and San Francisco (YC W24) — closed an additional USD 6M from investors in the US, Brazil, and the EU including Y Combinator, Pioneer Fund, and Rebel Fund, bringing its total seed to USD 7.5M. The company offers a unified API combining KYC, KYB, biometrics, AML, and real-time transaction monitoring for 1,500 active B2B clients in fintech, crypto, iGaming, and government across 220+ countries. With growth exceeding 30% monthly and already profitable, Didit targets \"programmable\" identity with reusable credentials and user-controlled privacy.", pt: "A Didit — startup fundada pelos irmãos Rosas em Barcelona e San Francisco (YC W24) — fechou USD 6M adicionais com investidores dos EUA, Brasil e UE, incluindo Y Combinator, Pioneer Fund e Rebel Fund, levando sua rodada seed total a USD 7,5M. A empresa oferece uma API unificada que combina KYC, KYB, biometria, AML e monitoramento de transações em tempo real para 1.500 clientes B2B ativos em fintech, cripto, iGaming e governo em mais de 220 países. Com crescimento superior a 30% ao mês e já lucrativa, a Didit mira a identidade \"programável\" com credenciais reutilizáveis e controle de privacidade pelo usuário." , titles: { es: "Didit (YC) levanta USD 7,5M en semilla para infraestructura programable de identidad con API unificada KYC+AML+biometría", en: "Didit (YC) Raises $7.5M Seed for Programmable Identity and Fraud Infrastructure with Unified KYC+AML+Biometrics API", pt: "Didit (YC) capta USD 7,5M em rodada semente para infraestrutura programável de identidade com API unificada KYC+AML+biometria" } },
  "feedzai-identity-to-intent-biometrics-fraud-may12": { es: "Lenny Gusel, Head of Fraud Solutions (North America) de Feedzai, argumenta en Biometric Update que la autenticación biométrica de login es insuficiente ante el fraude autorizado: Deloitte estima que las pérdidas en EE.UU. por \"authorized payment scams\" alcanzarán USD 15.000 millones en 2028. La propuesta de Feedzai es un monitoreo conductual continuo durante toda la sesión del usuario — no solo en el login — para detectar señales de coerción o manipulación en tiempo real. Refuerza el posicionamiento de Feedzai como plataforma de behavioral AI para bancos, en directo competencia con las capacidades de fraud analytics de VU ONE.", en: "Lenny Gusel, Head of Fraud Solutions (North America) at Feedzai, argues in Biometric Update that biometric authentication at login is insufficient against authorized fraud: Deloitte estimates that U.S. losses from authorized payment scams will reach USD 15 billion by 2028. Feedzai's proposal is continuous behavioral monitoring throughout the entire user session — not just at login — to detect coercion or manipulation signals in real time. This reinforces Feedzai's positioning as a behavioral AI platform for banks, in direct competition with VU ONE's fraud analytics capabilities.", pt: "Lenny Gusel, Head of Fraud Solutions (América do Norte) da Feedzai, argumenta no Biometric Update que a autenticação biométrica no login é insuficiente frente à fraude autorizada: a Deloitte estima que as perdas nos EUA por \"authorized payment scams\" chegarão a USD 15 bilhões em 2028. A proposta da Feedzai é o monitoramento comportamental contínuo durante toda a sessão do usuário — não apenas no login — para detectar sinais de coerção ou manipulação em tempo real. Isso reforça o posicionamento da Feedzai como plataforma de behavioral AI para bancos, em concorrência direta com as capacidades de fraud analytics do VU ONE." , titles: { es: "Feedzai: la biometría puntual ya no alcanza — la próxima frontera es detectar la intención del fraude en tiempo real", en: "Feedzai: one-time biometrics are no longer enough — the next frontier is detecting fraud intent in real time", pt: "Feedzai: a biometria pontual já não basta — a próxima fronteira é detectar a intenção de fraude em tempo real" } },
  "sec-regulation-sp-small-firms-deadline-jun26": { es: "Venció el plazo de cumplimiento de las enmiendas a la Regulación S-P de la SEC para firmas pequeñas, exigiendo programas formales de respuesta a incidentes, notificación a clientes afectados en máximo 30 días tras detectar una brecha, y supervisión documentada de proveedores en la nube. Las prioridades de examen 2026 de la SEC apuntan específicamente a protección contra robo de identidad, preparación ante ransomware y supervisión de terceros. Las firmas latinoamericanas con operaciones en EE.UU. deben verificar su cumplimiento.", en: "The SEC's Regulation S-P amendment compliance deadline passed for small firms, requiring formal incident response programs, notification to affected clients within 30 days of detecting a breach, and documented oversight of cloud service providers. The SEC's 2026 examination priorities specifically target identity theft protection, ransomware preparedness, and third-party oversight. Latin American firms with U.S. operations should verify their compliance status.", pt: "Venceu o prazo de conformidade com as emendas ao Regulamento S-P da SEC para pequenas firmas, exigindo programas formais de resposta a incidentes, notificação a clientes afetados em no máximo 30 dias após a detecção de uma brecha, e supervisão documentada de provedores de nuvem. As prioridades de exame 2026 da SEC miram especificamente a proteção contra roubo de identidade, preparação para ransomware e supervisão de terceiros. Firmas latino-americanas com operações nos EUA devem verificar sua conformidade." , titles: { es: "La Regulación S-P de la SEC entra en vigor para firmas pequeñas: notificación obligatoria en 30 días tras una brecha de datos", en: "SEC Regulation S-P Takes Effect for Small Firms: 30-Day Breach Notification Now Mandatory", pt: "Regulação S-P da SEC entra em vigor para pequenas firmas: notificação de brecha obrigatória em 30 dias" } },
  "ice-bi2-iris-biometric-nationwide-contract-may12": { es: "El Servicio de Inmigración y Control de Aduanas de EE.UU. (ICE) contrató a Bi2 Technologies para acceso nacional inmediato a una base privada de iris con más de 5 millones de registros de booking y 1,5 millones de individuos únicos. El contrato provee 1.570 dispositivos iris para despliegue en 30 días y opera hasta mayo 2027. La arquitectura consolida el reconocimiento facial (Mobile Fortify/NEC) con iris en una capa biométrica multimodal para enforcement migratorio — un modelo que los gobiernos de LATAM observan de cerca para sus propias infraestructuras de identidad soberana.", en: "U.S. Immigration and Customs Enforcement (ICE) contracted Bi2 Technologies for immediate nationwide access to a private iris database with over 5 million booking records and 1.5 million unique individuals. The contract provides 1,570 iris devices for deployment within 30 days and runs through May 2027. The architecture consolidates facial recognition (Mobile Fortify/NEC) with iris into a multimodal biometric layer for immigration enforcement — a model that LATAM governments are closely watching for their own sovereign identity infrastructures.", pt: "O Serviço de Imigração e Controle Aduaneiro dos EUA (ICE) contratou a Bi2 Technologies para acesso nacional imediato a uma base privada de íris com mais de 5 milhões de registros de booking e 1,5 milhão de indivíduos únicos. O contrato fornece 1.570 dispositivos de íris para implantação em 30 dias e vigora até maio de 2027. A arquitetura consolida o reconhecimento facial (Mobile Fortify/NEC) com íris em uma camada biométrica multimodal para fiscalização migratória — um modelo que os governos da América Latina acompanham de perto para suas próprias infraestruturas de identidade soberana." , titles: { es: "ICE extiende su red biométrica: acceso a base de iris de 5 millones de registros y 1.570 dispositivos en campo", en: "ICE expands its biometric network: access to an iris database of 5 million records and 1,570 devices in the field", pt: "ICE expande sua rede biométrica: acesso a base de íris com 5 milhões de registros e 1.570 dispositivos em campo" } },
  "infobae-cuenta-bloqueada-estafa-may25": { es: "Estafadores envían mensajes, llamadas o SMS con frases urgentes como \"Tu cuenta será bloqueada\" o \"Tiene un pago pendiente\" para crear pánico e inducir a las víctimas a entregar credenciales bancarias sin verificar, aprovechando datos públicos de redes sociales para personalizar los ataques. La combinación de vishing, smishing y phishing en un ciclo de ingeniería social opera bajo los mismos mecanismos de urgencia que el fraude BEC corporativo, pero apuntada a usuarios finales. El INCIBE y la FTC recomiendan no hacer clic en enlaces sospechosos y verificar siempre contactando al banco por canales oficiales.", en: "Fraudsters send messages, calls, or SMS with urgent phrases such as \"Your account will be blocked\" or \"You have a pending payment\" to induce panic and trick victims into handing over banking credentials without verification, leveraging public social media data to personalize attacks. The combination of vishing, smishing, and phishing in a social engineering cycle operates under the same urgency mechanisms as corporate BEC fraud, but targeting end users. INCIBE and the FTC recommend not clicking on suspicious links and always verifying by contacting the bank through official channels.", pt: "Golpistas enviam mensagens, ligações ou SMS com frases urgentes como \"Sua conta será bloqueada\" ou \"Você tem um pagamento pendente\" para criar pânico e induzir as vítimas a fornecer credenciais bancárias sem verificação, aproveitando dados públicos de redes sociais para personalizar os ataques. A combinação de vishing, smishing e phishing em um ciclo de engenharia social opera sob os mesmos mecanismos de urgência que a fraude BEC corporativa, mas direcionada a usuários finais. O INCIBE e a FTC recomendam não clicar em links suspeitos e sempre verificar entrando em contato com o banco por canais oficiais." , titles: { es: "Cuenta bloqueada: la estafa que paraliza a víctimas con urgencia falsa", en: "Account Blocked: The Scam That Paralyzes Victims with Fake Urgency", pt: "Conta bloqueada: o golpe que paralisa vítimas com urgência falsa" } },
  "stripe-fraude-latam-bancos-fintechs-may20": { es: "Stripe alertó que el fraude digital ya no requiere estructuras criminales organizadas: herramientas de IA y automatización permiten que actores individuales ejecuten campañas de fraude a escala contra instituciones financieras de América Latina. La advertencia eleva la presión sobre bancos y fintechs de la región para fortalecer sus mecanismos de prevención en las capas de onboarding e identidad, más allá de los controles transaccionales tradicionales. El contexto regional es crítico: LATAM ya superó a Norteamérica en alertas diarias de fraude financiero.", en: "Stripe warned that digital fraud no longer requires organized criminal structures: AI tools and automation allow individual actors to execute large-scale fraud campaigns against financial institutions in Latin America. The alert increases pressure on banks and fintechs in the region to strengthen their prevention mechanisms at the onboarding and identity layers, beyond traditional transactional controls. The regional context is critical: LATAM has already surpassed North America in daily financial fraud alerts.", pt: "A Stripe alertou que a fraude digital não requer mais estruturas criminosas organizadas: ferramentas de IA e automação permitem que atores individuais executem campanhas de fraude em escala contra instituições financeiras da América Latina. O alerta aumenta a pressão sobre bancos e fintechs da região para fortalecer seus mecanismos de prevenção nas camadas de onboarding e identidade, além dos controles transacionais tradicionais. O contexto regional é crítico: a LATAM já superou a América do Norte em alertas diários de fraude financeira." , titles: { es: "Stripe advierte: el fraude minorista presiona a bancos y fintechs de LATAM — la IA democratizó los ataques a escala individual", en: "Stripe warns: retail fraud is pressuring LATAM banks and fintechs — AI has democratized attacks at the individual scale", pt: "Stripe alerta: a fraude no varejo pressiona bancos e fintechs da LATAM — a IA democratizou os ataques em escala individual" } },
  "identity-compliance-infra-thirdfort-may20": { es: "El UK Digital Identity and Attributes Trust Framework (DIATF) exige que solo proveedores certificados ofrezcan verificación de identidad conforme a las Money Laundering Regulations, convirtiendo el KYC biométrico en requisito regulatorio no opcional. Thirdfort relanzó su plataforma integrando verificación de documentos, Know Your Business, revisión AML y controles de Source of Funds en un flujo único que permite onboardear clientes el mismo día de la consulta; Prove y Velocity firmaron alianza para llevar verificación de identidad a instituciones financieras y plataformas de activos digitales. La convergencia de compliance e identidad que el mercado anglosajón hoy certifica llegará a LATAM en cuanto sus reguladores adopten marcos equivalentes.", en: "The UK Digital Identity and Attributes Trust Framework (DIATF) requires that only certified providers offer identity verification compliant with Money Laundering Regulations, making biometric KYC a non-optional regulatory requirement. Thirdfort relaunched its platform integrating document verification, Know Your Business, AML review, and Source of Funds controls into a single flow enabling same-day client onboarding; Prove and Velocity signed a partnership to bring identity verification to financial institutions and digital asset platforms. The convergence of compliance and identity that the Anglo-Saxon market is now certifying will reach LATAM once its regulators adopt equivalent frameworks.", pt: "O UK Digital Identity and Attributes Trust Framework (DIATF) exige que apenas provedores certificados ofereçam verificação de identidade em conformidade com as Money Laundering Regulations, tornando o KYC biométrico um requisito regulatório não opcional. A Thirdfort relançou sua plataforma integrando verificação de documentos, Know Your Business, revisão AML e controles de Source of Funds em um fluxo único que permite onboardear clientes no mesmo dia da consulta; Prove e Velocity firmaram parceria para levar verificação de identidade a instituições financeiras e plataformas de ativos digitais. A convergência de compliance e identidade que o mercado anglo-saxão certifica hoje chegará à LATAM assim que seus reguladores adotarem marcos equivalentes." , titles: { es: "La verificación de identidad se convierte en infraestructura de compliance: UK DIATF, Thirdfort y la alianza Prove+Velocity consolidan el estándar", en: "Identity Verification Becomes Compliance Infrastructure: UK DIATF, Thirdfort, and Prove+Velocity Alliance Set the Standard", pt: "Verificação de identidade vira infraestrutura de compliance: UK DIATF, Thirdfort e a aliança Prove+Velocity consolidam o padrão" } },
  "panama-ley-524-penas-fraude-may27": { es: "Panamá promulgó la Ley 524 que reforma el Código Penal: el delito base pasa a 3-6 años de prisión, con agravantes por fraude cibernético, usurpación de identidad y daño patrimonial entre US$50.000 y US$100.000; los casos graves alcanzan 7-12 años. El impulso legislativo responde a que los expedientes judicializados crecieron 578,3% entre 2019 y 2024, con 26.670 denuncias acumuladas y 5.241 solo en 2024.", en: "Panama enacted Law 524 reforming the Penal Code: the base offense now carries 3–6 years in prison, with aggravating circumstances for cybercrime, identity theft, and financial damage between US$50,000 and US$100,000; serious cases reach 7–12 years. The legislative push responds to a 578.3% growth in prosecuted cases between 2019 and 2024, with 26,670 cumulative complaints and 5,241 in 2024 alone.", pt: "O Panamá promulgou a Lei 524 que reforma o Código Penal: o delito base passa a 3–6 anos de prisão, com agravantes por fraude cibernética, usurpação de identidade e dano patrimonial entre US$50.000 e US$100.000; os casos graves chegam a 7–12 anos. O impulso legislativo responde ao crescimento de 578,3% nos processos judicializados entre 2019 e 2024, com 26.670 denúncias acumuladas e 5.241 apenas em 2024." , titles: { es: "Panamá: Ley 524 aumenta penas por fraude digital e identidad; denuncias crecieron 578% desde 2019", en: "Panama: Law 524 increases penalties for digital fraud and identity crimes; reports grew 578% since 2019", pt: "Panamá: Lei 524 aumenta penas por fraude digital e identidade; denúncias cresceram 578% desde 2019" } },
  "id4africa-2026-abidjan-digital-identity-ecosystem": { es: "La 12ª Asamblea General de ID4Africa inauguró en Abidján, Costa de Marfil, con más de 1.000 delegados gubernamentales. El lema \"de DPI a ecosistemas digitales públicos\" marca un giro estratégico: el éxito ya no se mide en personas enroladas sino en servicios económicos y sociales habilitados. El presidente ejecutivo Joseph Atick sintetizó el desafío global: \"utilidad sin confianza es peligrosa, escala sin seguridad es frágil, adopción sin salvaguardas es insostenible.\" Para LATAM, el modelo de madurez africano ofrece una hoja de ruta hacia identidad soberana funcional más allá del enrolamiento masivo.", en: "The 12th ID4Africa General Assembly opened in Abidjan, Côte d'Ivoire, with over 1,000 government delegates. The theme \"from DPI to digital public ecosystems\" marks a strategic shift: success is no longer measured in enrolled individuals but in economic and social services enabled. Executive Chairman Joseph Atick framed the global challenge: \"utility without trust is dangerous, scale without security is fragile, adoption without safeguards is unsustainable.\" For LATAM, the African maturity model offers a roadmap toward functional sovereign identity beyond mass enrollment.", pt: "A 12ª Assembleia Geral do ID4Africa foi inaugurada em Abidjan, Costa do Marfim, com mais de 1.000 delegados governamentais. O tema \"de DPI a ecossistemas digitais públicos\" marca uma virada estratégica: o sucesso não é mais medido pelo número de pessoas cadastradas, mas pelos serviços econômicos e sociais habilitados. O presidente executivo Joseph Atick sintetizou o desafio global: \"utilidade sem confiança é perigosa, escala sem segurança é frágil, adoção sem salvaguardas é insustentável.\" Para a América Latina, o modelo de maturidade africano oferece um roteiro rumo à identidade soberana funcional além do cadastramento em massa." , titles: { es: "ID4Africa 2026: de la matrícula masiva al ecosistema de confianza — 1.000 delegados en Abidján", en: "ID4Africa 2026: from mass enrollment to the trust ecosystem — 1,000 delegates in Abidjan", pt: "ID4Africa 2026: do cadastro em massa ao ecossistema de confiança — 1.000 delegados em Abidjan" } },
  "vida-fraudshield-injection-attacks-liveness": { es: "La compañía indonesia VIDA presentó ID FraudShield en Money20/20 Asia 2026, combinando liveness detection, inteligencia de dispositivo, analítica de comportamiento y detección de red en un único SDK. Su CEO Niki Luhur advirtió: \"Los deepfakes tienen el glamour mediático, pero la puerta es el ataque de inyección.\" Los ataques por cámara virtual —principal vector de bypass de KYC biométrico— crecieron 783% en el último período medido y son orquestados desde comunidades online de 45.000 miembros. El patrón amenaza directamente los flujos de onboarding bancario y de fintech en toda la región, incluyendo LATAM.", en: "Indonesian company VIDA unveiled ID FraudShield at Money20/20 Asia 2026, combining liveness detection, device intelligence, behavioral analytics, and network detection in a single SDK. Its CEO Niki Luhur warned: \"Deepfakes get the media glamour, but the real door is the injection attack.\" Virtual camera attacks — the primary vector for biometric KYC bypass — grew 783% in the last measured period and are orchestrated from online communities of 45,000 members. The pattern directly threatens banking and fintech onboarding flows across the region, including LATAM.", pt: "A empresa indonésia VIDA apresentou o ID FraudShield no Money20/20 Asia 2026, combinando liveness detection, inteligência de dispositivo, análise comportamental e detecção de rede em um único SDK. Seu CEO Niki Luhur alertou: \"Os deepfakes têm o glamour midiático, mas a porta de entrada é o ataque de injeção.\" Os ataques por câmera virtual — principal vetor de bypass de KYC biométrico — cresceram 783% no último período medido e são orquestrados por comunidades online de 45.000 membros. O padrão ameaça diretamente os fluxos de onboarding bancário e de fintech em toda a região, incluindo a América Latina." , titles: { es: "VIDA lanza FraudShield: los ataques de inyección superan al deepfake como principal vector contra el liveness biométrico", en: "VIDA launches FraudShield: injection attacks surpass deepfakes as the leading threat vector against biometric liveness", pt: "VIDA lança FraudShield: ataques de injeção superam deepfakes como principal vetor contra o liveness biométrico" } },
  "braintrust-aws-breach-api-keys": { es: "Braintrust, plataforma de evaluación de modelos de IA valuada en USD 800 millones, confirmó acceso no autorizado a su cuenta AWS que almacenaba claves privadas de clientes para acceder a modelos en la nube. Notificó a todos los clientes rotar credenciales de inmediato; tres clientes reportaron picos sospechosos de uso de proveedores de IA mientras continúan las investigaciones. El caso ilustra el riesgo de credenciales estáticas en entornos cloud de IA: exactamente el vector que la gestión dinámica de accesos busca eliminar.", en: "Braintrust, an AI model evaluation platform valued at USD 800M, confirmed unauthorized access to its AWS account, which stored customers' private keys for accessing cloud models. It notified all customers to rotate credentials immediately; three customers reported suspicious usage spikes from AI providers while investigations continue. The case illustrates the risk of static credentials in AI cloud environments — exactly the vector that dynamic access management aims to eliminate.", pt: "A Braintrust, plataforma de avaliação de modelos de IA avaliada em USD 800 milhões, confirmou acesso não autorizado à sua conta AWS, que armazenava chaves privadas de clientes para acesso a modelos na nuvem. A empresa notificou todos os clientes para rotacionar credenciais imediatamente; três clientes relataram picos suspeitos de uso de provedores de IA enquanto as investigações continuam. O caso ilustra o risco de credenciais estáticas em ambientes cloud de IA — exatamente o vetor que o gerenciamento dinâmico de acessos busca eliminar." , titles: { es: "Braintrust breach: startup de IA notifica a clientes rotar API keys tras compromiso de cuenta AWS", en: "Braintrust breach: AI startup urges customers to rotate API keys after AWS account compromise", pt: "Braintrust breach: startup de IA notifica clientes para rotacionar API keys após comprometimento de conta AWS" } },

  "canvas-instructure-shinyhunters-settlement": { es: "Instructure confirmó el 11 de mayo el pago de un rescate a ShinyHunters y el acuerdo de destrucción de los 3,65 TB robados al operador de Canvas LMS. El ataque comprometió 275 millones de registros (usernames, emails, IDs de estudiantes y mensajes internos) de 8.809 universidades en 50 países — incluyendo instituciones latinoamericanas. Investigadores advierten que los datos expuestos permiten campañas de phishing hiperpersonalizado para impersonar administradores y oficinas de ayuda financiera; el vector puede derivar en robo de identidad y fraude de acceso a plataformas bancarias usadas por la comunidad universitaria.", en: "Instructure confirmed on May 11 the payment of a ransom to ShinyHunters and an agreement to destroy the 3.65 TB stolen from the Canvas LMS operator. The attack compromised 275 million records (usernames, emails, student IDs, and internal messages) from 8,809 universities across 50 countries — including Latin American institutions. Researchers warn that the exposed data enables hyper-personalized phishing campaigns impersonating administrators and financial aid offices; the vector can lead to identity theft and fraudulent access to banking platforms used by the university community.", pt: "A Instructure confirmou em 11 de maio o pagamento de um resgate ao ShinyHunters e o acordo de destruição dos 3,65 TB roubados do operador do Canvas LMS. O ataque comprometeu 275 milhões de registros (usernames, e-mails, IDs de estudantes e mensagens internas) de 8.809 universidades em 50 países — incluindo instituições latino-americanas. Pesquisadores alertam que os dados expostos possibilitam campanhas de phishing hiperpersonalizado para se passar por administradores e setores de auxílio financeiro; o vetor pode resultar em roubo de identidade e fraude de acesso a plataformas bancárias usadas pela comunidade universitária." , titles: { es: "Instructure paga rescate a ShinyHunters: el mayor breach educativo afecta 275 millones de registros de 8.800 instituciones", en: "Instructure Pays ShinyHunters Ransom: Largest Education Breach Hits 275 Million Records Across 8,800 Institutions", pt: "Instructure paga resgate ao ShinyHunters: maior breach educacional atinge 275 milhões de registros de 8.800 instituições" } },
  "argentina-ciberataques-15pct-may13": { es: "El reporte de Check Point Research para LATAM ubica a Argentina entre los países con mayor crecimiento interanual en ciberataques: +15% en 2025 dentro de un contexto regional que ya supera los 3.000 intentos semanales por organización. Los sectores más vulnerables son manufactura, fintech y gobierno — los verticales donde VU opera. El crecimiento coincide con el despliegue del DNI digital y el aumento en transacciones digitales, lo que torna crítica la autenticación robusta y el monitoreo continuo de identidad para cualquier organización del ecosistema financiero argentino.", en: "Check Point Research's LATAM report places Argentina among the countries with the highest year-over-year growth in cyberattacks: +15% in 2025, within a regional context already exceeding 3,000 weekly attempts per organization. The most vulnerable sectors are manufacturing, fintech, and government — the verticals where VU operates. This growth coincides with the rollout of the digital national ID and the rise in digital transactions, making robust authentication and continuous identity monitoring critical for any organization in Argentina's financial ecosystem.", pt: "O relatório da Check Point Research para a LATAM coloca a Argentina entre os países com maior crescimento interanual em ataques cibernéticos: +15% em 2025, em um contexto regional que já supera 3.000 tentativas semanais por organização. Os setores mais vulneráveis são manufatura, fintech e governo — os verticais onde a VU atua. O crescimento coincide com o lançamento do documento de identidade digital e o aumento das transações digitais, tornando a autenticação robusta e o monitoramento contínuo de identidade críticos para qualquer organização do ecossistema financeiro argentino." , titles: { es: "Argentina: ciberataques crecieron 15% en 2025 y el país es uno de los epicentros regionales según Check Point", en: "Argentina: Cyberattacks Grew 15% in 2025, Making It One of the Region's Main Epicenters, According to Check Point", pt: "Argentina: ataques cibernéticos cresceram 15% em 2025 e o país é um dos epicentros regionais, segundo a Check Point" } },
  "elimparcial-mx-industria-movil-cancelar-registro-may14": { es: "AMOMVAC y los principales operadores (Telcel, AT&T, Telefónica) exigieron la cancelación inmediata del registro obligatorio de líneas, argumentando un costo de 4.000 millones de pesos para un sistema que al 19 de abril solo registró 30,2 millones de las 160 millones de líneas activas (18,9%). El argumento técnico central: sin biometría (huellas ni iris), el padrón es ineficaz contra la suplantación de identidad y el SIM swapping que alimenta el ATO bancario. El impasse revela la tensión entre regulación de identidad digital y viabilidad operativa que todos los países de LATAM enfrentan al digitalizar sus sistemas de identidad.", en: "AMOMVAC and the main operators (Telcel, AT&T, Telefónica) demanded the immediate cancellation of the mandatory line registration, citing a cost of 4 billion pesos for a system that by April 19 had only registered 30.2 million of the 160 million active lines (18.9%). The core technical argument: without biometrics (no fingerprints or iris), the registry is ineffective against identity theft and SIM swapping that fuels banking ATO. The impasse reveals the tension between digital identity regulation and operational feasibility that all LATAM countries face when digitalizing their identity systems.", pt: "A AMOMVAC e as principais operadoras (Telcel, AT&T, Telefónica) exigiram o cancelamento imediato do registro obrigatório de linhas, argumentando um custo de 4 bilhões de pesos para um sistema que até 19 de abril havia registrado apenas 30,2 milhões das 160 milhões de linhas ativas (18,9%). O argumento técnico central: sem biometria (nem impressões digitais nem íris), o cadastro é ineficaz contra a usurpação de identidade e o SIM swapping que alimenta o ATO bancário. O impasse revela a tensão entre regulação de identidade digital e viabilidade operacional que todos os países da LATAM enfrentam ao digitalizar seus sistemas de identidade." , titles: { es: "La industria móvil de México pide cancelar el registro obligatorio de líneas: 4.000 millones de pesos y solo 18,9% de cumplimiento", en: "Mexico's Mobile Industry Calls to Cancel Mandatory SIM Registration: 4 Billion Pesos Spent, Only 18.9% Compliance", pt: "A indústria móvel do México pede o cancelamento do registro obrigatório de linhas: 4 bilhões de pesos e apenas 18,9% de conformidade" } },
  "digi-yatra-100m-iata-interop-jun01": { es: "La plataforma de identidad biométrica de India procesó más de 100 millones de viajes con 24 millones de descargas activas en 38 aeropuertos. Un piloto conducido por IATA con IndiGo y el aeropuerto de Bengaluru demostró que el modelo basado en credenciales verificables puede interoperar con sistemas de aviación internacionales y billeteras digitales, reduciendo el tiempo de acceso a la terminal de 15 a 5 segundos por pasajero. El caso representa el benchmark más avanzado de identidad biométrica aeroportuaria a escala nacional.", en: "India's biometric identity platform processed over 100 million journeys with 24 million active downloads across 38 airports. An IATA-led pilot with IndiGo and Bengaluru airport demonstrated that the verifiable credentials model can interoperate with international aviation systems and digital wallets, cutting terminal access time from 15 to 5 seconds per passenger. The case represents the most advanced national-scale benchmark for airport biometric identity.", pt: "A plataforma de identidade biométrica da Índia processou mais de 100 milhões de viagens com 24 milhões de downloads ativos em 38 aeroportos. Um piloto conduzido pela IATA com a IndiGo e o aeroporto de Bengaluru demonstrou que o modelo baseado em credenciais verificáveis pode interoperar com sistemas internacionais de aviação e carteiras digitais, reduzindo o tempo de acesso ao terminal de 15 para 5 segundos por passageiro. O caso representa o benchmark mais avançado de identidade biométrica aeroportuária em escala nacional." , titles: { es: "Digi Yatra supera 100 millones de viajes y valida interoperabilidad biométrica global con IATA en India", en: "Digi Yatra Surpasses 100 Million Trips and Validates Global Biometric Interoperability with IATA in India", pt: "Digi Yatra supera 100 milhões de viagens e valida interoperabilidade biométrica global com a IATA na Índia" } },
  "dni-electronico-chip-nfc-renaper": { es: "RENAPER comenzó la emisión del nuevo DNI con chip sin contacto (NFC) en mayo de 2026, bajo la Disposición 55/2026. El documento abre la puerta a firma digital y autenticación online desde el celular y se alinea con estándares ICAO. Eleva la confianza del documento más allá del OCR para flujos KYC/AML remotos.", en: "RENAPER began issuing the new contactless NFC chip national ID in May 2026, under Provision 55/2026. The document opens the door to digital signatures and online authentication from mobile devices, aligning with ICAO standards. It raises document trust beyond OCR for remote KYC/AML flows.", pt: "O RENAPER iniciou a emissão do novo documento de identidade com chip sem contato (NFC) em maio de 2026, sob a Disposição 55/2026. O documento abre caminho para assinatura digital e autenticação online pelo celular, alinhando-se aos padrões ICAO. Eleva a confiabilidade do documento além do OCR para fluxos de KYC/AML remotos." , titles: { es: "Argentina despliega el DNI electrónico con chip NFC: qué cambia para la verificación de identidad", en: "Argentina Rolls Out Electronic ID with NFC Chip: What Changes for Identity Verification", pt: "Argentina lança o documento de identidade eletrônico com chip NFC: o que muda para a verificação de identidade" } },
  "contrasenas-ia-robo-credenciales": { es: "Infobae documenta que el 94% de los usuarios reutiliza contraseñas y los kits de phishing con IA logran 54% de tasa de clic (vs 12% del phishing tradicional). El robo de acceso corporativo administrativo arranca en USD 113.000. ChatGPT y OpenAI: 225.000 credenciales robadas y vendidas.", en: "Infobae reports that 94% of users reuse passwords and AI-powered phishing kits achieve a 54% click-through rate (vs. 12% for traditional phishing). Stolen corporate administrative access starts at USD 113,000. ChatGPT and OpenAI: 225,000 credentials stolen and sold.", pt: "A Infobae documenta que 94% dos usuários reutilizam senhas e os kits de phishing com IA atingem 54% de taxa de clique (vs. 12% do phishing tradicional). O roubo de acesso administrativo corporativo começa em USD 113.000. ChatGPT e OpenAI: 225.000 credenciais roubadas e vendidas." , titles: { es: "El fin de la contraseña segura: la IA convirtió el robo de credenciales en una industria", en: "The End of the Secure Password: AI Has Turned Credential Theft into an Industry", pt: "O fim da senha segura: a IA transformou o roubo de credenciais em uma indústria" } },
  "healthcare-identity-verato-deloitte-may20": { es: "Deloitte estima que el fraude impulsado por IA en el sector salud de EE.UU. crecerá de USD 12.300 millones (2023) a USD 40.000 millones para 2027, presionando a hospitales y aseguradoras a adoptar infraestructura de identidad de alta garantía. Verato lanzó la Verato Identity Network (VIN) en la Reuters Digital Health Summit para resolver el reconocimiento de pacientes a través de sistemas y redes de datos interoperables; 1Kosmos obtuvo designación Epic Toolbox para verificación de identidad en portales MyChart, y Zoom integró World ID para verificación en visitas médicas virtuales. El patrón del sector salud replica exactamente el de la banca: cuando el fraude alcanza escala sistémica, la identidad deja de ser una feature y se convierte en infraestructura crítica.", en: "Deloitte estimates that AI-driven fraud in the US healthcare sector will grow from USD 12.3 billion (2023) to USD 40 billion by 2027, pressuring hospitals and insurers to adopt high-assurance identity infrastructure. Verato launched the Verato Identity Network (VIN) at the Reuters Digital Health Summit to solve patient recognition across interoperable systems and data networks; 1Kosmos obtained Epic Toolbox designation for identity verification in MyChart portals, and Zoom integrated World ID for verification in virtual medical visits. The healthcare sector pattern replicates exactly that of banking: when fraud reaches systemic scale, identity stops being a feature and becomes critical infrastructure.", pt: "A Deloitte estima que a fraude impulsionada por IA no setor de saúde dos EUA crescerá de USD 12,3 bilhões (2023) para USD 40 bilhões até 2027, pressionando hospitais e seguradoras a adotar infraestrutura de identidade de alta garantia. A Verato lançou a Verato Identity Network (VIN) na Reuters Digital Health Summit para resolver o reconhecimento de pacientes em sistemas e redes de dados interoperáveis; a 1Kosmos obteve a designação Epic Toolbox para verificação de identidade em portais MyChart, e o Zoom integrou o World ID para verificação em consultas médicas virtuais. O padrão do setor de saúde replica exatamente o da banca: quando a fraude atinge escala sistêmica, a identidade deixa de ser uma feature e se torna infraestrutura crítica." , titles: { es: "Salud digital construye su capa de identidad: Deloitte proyecta USD 40.000M en fraude por IA para 2027 y Verato lanza la VIN", en: "Digital Health Builds Its Identity Layer: Deloitte Projects USD 40B in AI Fraud by 2027 as Verato Launches VIN", pt: "Saúde digital constrói sua camada de identidade: Deloitte projeta USD 40 bi em fraude por IA até 2027 e Verato lança a VIN" } },
  "catalonia-postquantum-identity-may19": { es: "La Agencia de Ciberseguridad de Cataluña lanzó un programa de €1,2 millones —parte de una inversión total de €10M financiada por la UE vía RETECH e INCIBE— para mapear vulnerabilidades criptográficas en certificados digitales, firmas y sistemas de identidad ciudadana antes de que la computación cuántica rompa el cifrado actual. El programa incluye inventario de activos criptográficos, pruebas de algoritmos post-cuánticos alineados con NIST/ETSI y una hoja de ruta unificada de migración; la startup Sybolid Identity recibió €500.000 del programa. Es el primer movimiento soberano europeo de preparación post-cuántica en identidad digital —una señal de alerta temprana para los RENAPER, INE y registros civiles de LATAM que dependen de RSA y ECC.", en: "The Catalonia Cybersecurity Agency launched a €1.2 million program — part of a total €10M EU-funded investment via RETECH and INCIBE — to map cryptographic vulnerabilities in digital certificates, signatures, and citizen identity systems before quantum computing breaks current encryption. The program includes a cryptographic asset inventory, testing of post-quantum algorithms aligned with NIST/ETSI, and a unified migration roadmap; startup Sybolid Identity received €500,000 from the program. It is the first European sovereign move in post-quantum digital identity readiness — an early warning signal for RENAPER, INE, and civil registries across LATAM that rely on RSA and ECC.", pt: "A Agência de Cibersegurança da Catalunha lançou um programa de €1,2 milhão — parte de um investimento total de €10M financiado pela UE via RETECH e INCIBE — para mapear vulnerabilidades criptográficas em certificados digitais, assinaturas e sistemas de identidade cidadã antes que a computação quântica quebre a criptografia atual. O programa inclui inventário de ativos criptográficos, testes de algoritmos pós-quânticos alinhados ao NIST/ETSI e um roteiro unificado de migração; a startup Sybolid Identity recebeu €500.000 do programa. É o primeiro movimento soberano europeu de preparação pós-quântica em identidade digital — um sinal de alerta antecipado para o RENAPER, o INE e os registros civis da LATAM que dependem de RSA e ECC." , titles: { es: "Cataluña invierte 1,2M euros para blindar su identidad digital ante la computación cuántica", en: "Catalonia Invests €1.2M to Shield Its Digital Identity Against Quantum Computing", pt: "Catalunha investe 1,2M de euros para proteger sua identidade digital contra a computação quântica" } },
  "mundial-2026-estafas-magistv-latam-may28": { es: "ESET documentó múltiples vectores de fraude que explotan el Mundial FIFA 2026: apps de streaming ilegales que capturan datos sensibles, portales de apuestas sin licencia, réplicas de FIFA.com para venta de entradas falsas y tokens cripto fraudulentos como worldcup*.fun. El mercado global de apuestas deportivas movió US$84.000 millones en 2023. Los países más afectados son Argentina, Colombia, México, Estados Unidos y Canadá.", en: "ESET documented multiple fraud vectors exploiting the FIFA World Cup 2026: illegal streaming apps that capture sensitive data, unlicensed betting portals, FIFA.com replicas selling fake tickets, and fraudulent crypto tokens such as worldcup*.fun. The global sports betting market moved US$84 billion in 2023. The most affected countries are Argentina, Colombia, Mexico, the United States, and Canada.", pt: "A ESET documentou múltiplos vetores de fraude explorando a Copa do Mundo FIFA 2026: apps de streaming ilegais que capturam dados sensíveis, portais de apostas sem licença, réplicas do FIFA.com para venda de ingressos falsos e tokens cripto fraudulentos como worldcup*.fun. O mercado global de apostas esportivas movimentou US$ 84 bilhões em 2023. Os países mais afetados são Argentina, Colômbia, México, Estados Unidos e Canadá." , titles: { es: "Mundial 2026: MagisTV y sitios falsos de apuestas lideran ola de fraudes en Argentina, Colombia y México", en: "World Cup 2026: MagisTV and Fake Betting Sites Lead Fraud Wave Across Argentina, Colombia and Mexico", pt: "Copa 2026: MagisTV e sites falsos de apostas lideram onda de fraudes na Argentina, Colômbia e México" } },
  "face-biometrics-use-cases-may26": { es: "Biometric Update analiza la expansión del reconocimiento facial en pasaportes, banca móvil y seguridad fronteriza mientras reguladores exigen certificaciones ISO 17025 para laboratorios de prueba. El Reino Unido adjudicó el contrato de pasaportes biométricos por £576 millones a 12 años. La industria enfrenta la paradoja de madurez: múltiples sectores adoptan la tecnología más rápido de lo que la regulación puede alcanzar.", en: "Biometric Update analyzes the expansion of facial recognition in passports, mobile banking, and border security as regulators demand ISO 17025 certifications for testing laboratories. The UK awarded a 12-year biometric passport contract worth £576 million. The industry faces a maturity paradox: multiple sectors are adopting the technology faster than regulation can keep up.", pt: "A Biometric Update analisa a expansão do reconhecimento facial em passaportes, banco móvel e segurança de fronteiras enquanto reguladores exigem certificações ISO 17025 para laboratórios de teste. O Reino Unido adjudicou o contrato de passaportes biométricos por £576 milhões por 12 anos. O setor enfrenta o paradoxo da maturidade: múltiplos segmentos adotam a tecnologia mais rápido do que a regulação consegue acompanhar." , titles: { es: "Biometría facial a escala: los casos de uso superan los desafíos regulatorios solo en velocidad", en: "Facial Biometrics at Scale: Use Cases Outpace Regulatory Challenges—at Least in Speed", pt: "Biometria facial em escala: os casos de uso superam os desafios regulatórios, pelo menos em velocidade" } },
  "prove-wef-unicorn-innovator-community-may12": { es: "Prove, líder en autenticación de identidad basada en señales telefónicas (Phone-Centric Identity), fue seleccionada para el exclusivo programa del World Economic Forum para empresas privadas valuadas en más de USD 1.000 millones. La selección cita el State of Identity Report 2026: el 88% de las organizaciones anticipa un aumento de fraude impulsado por IA, pero el 65% no tiene plan para defenderse; los humanos identifican deepfakes correctamente apenas el 40% del tiempo. El endorsement del WEF refuerza la narrativa de Prove sobre identidad longitudinal (señales acumuladas en el tiempo, no documentos ni rostros) — posicionamiento en directo competencia con VU ONE.", en: "Prove, a leader in phone-based identity authentication (Phone-Centric Identity), was selected for the World Economic Forum's exclusive program for private companies valued at over USD 1 billion. The selection references the State of Identity Report 2026: 88% of organizations anticipate an increase in AI-driven fraud, yet 65% have no plan to defend against it; humans correctly identify deepfakes only 40% of the time. The WEF endorsement reinforces Prove's narrative around longitudinal identity (signals accumulated over time, not documents or faces) — positioning in direct competition with VU ONE.", pt: "A Prove, líder em autenticação de identidade baseada em sinais telefônicos (Phone-Centric Identity), foi selecionada para o programa exclusivo do Fórum Econômico Mundial para empresas privadas avaliadas em mais de USD 1 bilhão. A seleção cita o State of Identity Report 2026: 88% das organizações antecipam um aumento de fraude impulsionada por IA, mas 65% não têm plano para se defender; os humanos identificam deepfakes corretamente apenas 40% das vezes. O endosso do WEF reforça a narrativa da Prove sobre identidade longitudinal (sinais acumulados ao longo do tempo, não documentos nem rostos) — posicionamento em concorrência direta com o VU ONE." , titles: { es: "Prove ingresa al WEF Unicorn Innovator Community: el competidor de identidad telefónica con endorsement global", en: "Prove Joins the WEF Unicorn Innovator Community: The Phone Identity Competitor With Global Endorsement", pt: "Prove entra na WEF Unicorn Innovator Community: o competidor de identidade telefônica com endorsement global" } },
  "infobae-fraude-digital-centroamerica-appgate-may17": { es: "El informe Fraud Beat 2026 de AppGate registra que Guatemala (+206%), Costa Rica (+182%) y Nicaragua (+170%) lideran el crecimiento interanual de fraude digital en la región, con El Salvador en +28% y República Dominicana en +63%. Las redes sociales desplazaron al email como canal dominante de ataque; el sector financiero concentra el 35,5% de los incidentes y el fraude BEC creció 136% en transferencias en el Q4 2025.", en: "AppGate's Fraud Beat 2026 report shows Guatemala (+206%), Costa Rica (+182%), and Nicaragua (+170%) leading year-over-year digital fraud growth in the region, with El Salvador at +28% and the Dominican Republic at +63%. Social media has displaced email as the dominant attack channel; the financial sector accounts for 35.5% of incidents, and BEC fraud in wire transfers grew 136% in Q4 2025.", pt: "O relatório Fraud Beat 2026 da AppGate registra que Guatemala (+206%), Costa Rica (+182%) e Nicarágua (+170%) lideram o crescimento interanual de fraude digital na região, com El Salvador em +28% e República Dominicana em +63%. As redes sociais deslocaram o e-mail como canal dominante de ataque; o setor financeiro concentra 35,5% dos incidentes e a fraude BEC cresceu 136% em transferências no Q4 2025." , titles: { es: "Fraude digital en Centroamérica creció hasta 206% anual — redes sociales reemplazaron el email como vector principal de ataque", en: "Digital Fraud in Central America Grew Up to 206% Annually — Social Media Replaced Email as the Main Attack Vector", pt: "Fraude digital na América Central cresceu até 206% ao ano — redes sociais substituíram o e-mail como principal vetor de ataque" } },
  "okta-identity-25-2026": { es: "Okta Ventures presentó su tercer reporte anual con los 25 innovadores más destacados en identidad digital bajo el lema \"identity is the control plane\", señalando a la IA agéntica y los deepfakes como los principales desafíos del mercado. El reporte incluye desarrolladores, líderes empresariales y funcionarios públicos de todo el mundo, publicado simultáneamente al lanzamiento de Okta for AI Agents (GA el 30 de abril). Okta está apropiando el mensaje de \"plataforma unificada de identidad\" exactamente cuando VU ONE lanza en LATAM — la diferenciación regional y vertical es clave para no competir en el mismo espacio narrativo.", en: "Okta Ventures released its third annual report featuring the 25 most outstanding innovators in digital identity under the theme \"identity is the control plane\", identifying agentic AI and deepfakes as the market's primary challenges. The report includes developers, business leaders, and public officials from around the world, published simultaneously with the launch of Okta for AI Agents (GA on April 30). Okta is appropriating the \"unified identity platform\" message at the exact moment VU ONE launches in LATAM — regional and vertical differentiation is key to avoiding competition in the same narrative space.", pt: "A Okta Ventures apresentou seu terceiro relatório anual com os 25 inovadores mais destacados em identidade digital sob o lema \"identity is the control plane\", apontando a IA agêntica e os deepfakes como os principais desafios do mercado. O relatório inclui desenvolvedores, líderes empresariais e funcionários públicos de todo o mundo, publicado simultaneamente ao lançamento do Okta for AI Agents (GA em 30 de abril). A Okta está se apropriando da mensagem de \"plataforma unificada de identidade\" exatamente quando o VU ONE lança na LATAM — a diferenciação regional e vertical é fundamental para não competir no mesmo espaço narrativo." , titles: { es: "Okta publica el Identity 25: las 25 identidades más influyentes en seguridad de 2026", en: "Okta Publishes the Identity 25: The 25 Most Influential Identities in Security for 2026", pt: "Okta publica o Identity 25: as 25 identidades mais influentes em segurança de 2026" } },
  "binance-bullrich-prevencion": { es: "Esteban Bullrich, con ELA, no logró autenticarse contra el reconocimiento facial de Binance porque sus rasgos cambiaron. El abogado Jorge Monastersky (Infobae) sostiene que la falla no es tecnológica sino de diseño y prevención jurídica. Plataformas con biometría facial necesitan protocolos de excepción y caminos de re-enrolamiento.", en: "Esteban Bullrich, who has ALS, was unable to authenticate against Binance's facial recognition because his facial features had changed. Attorney Jorge Monastersky (Infobae) argues the failure is not technological but one of design and legal safeguards. Platforms using facial biometrics need exception protocols and re-enrollment pathways.", pt: "Esteban Bullrich, portador de ELA, não conseguiu se autenticar no reconhecimento facial da Binance porque suas feições haviam mudado. O advogado Jorge Monastersky (Infobae) sustenta que a falha não é tecnológica, mas de design e prevenção jurídica. Plataformas com biometria facial precisam de protocolos de exceção e caminhos de re-enrolamento." , titles: { es: "Binance y el caso Esteban Bullrich: lo que falló no fue la tecnología, fue la prevención", en: "Binance and the Esteban Bullrich Case: What Failed Was Not the Technology, It Was Prevention", pt: "Binance e o caso Esteban Bullrich: o que falhou não foi a tecnologia, foi a prevenção" } },
  "identy-nigeria-banking-biometrics-may19": { es: "Identy.io desplegó su plataforma de autenticación biométrica completamente on-device —captura, matching y detección de liveness en el smartphone, sin envío de datos a servidores externos— para combatir el fraude bancario en Nigeria, que aun tras una caída del 51% en incidentes en 2025 escala hacia esquemas más sofisticados. El sistema verifica identidades contra la plataforma Bank Verification Number (BVN) e incluye detección de deepfakes; Identy participó en evaluaciones RIVR del DHS y múltiples benchmarks NIST. El modelo on-device resuelve el dilema privacidad-seguridad en mercados emergentes con infraestructura de servidores limitada —lección directamente aplicable a mercados financieros de LATAM.", en: "Identy.io deployed its fully on-device biometric authentication platform — capture, matching, and liveness detection on the smartphone, with no data sent to external servers — to combat banking fraud in Nigeria, which despite a 51% drop in incidents in 2025 is escalating toward more sophisticated schemes. The system verifies identities against the Bank Verification Number (BVN) platform and includes deepfake detection; Identy participated in DHS RIVR evaluations and multiple NIST benchmarks. The on-device model resolves the privacy-security dilemma in emerging markets with limited server infrastructure — a lesson directly applicable to LATAM financial markets.", pt: "A Identy.io implantou sua plataforma de autenticação biométrica totalmente on-device — captura, matching e detecção de liveness no smartphone, sem envio de dados a servidores externos — para combater a fraude bancária na Nigéria, que mesmo após uma queda de 51% nos incidentes em 2025 está escalando para esquemas mais sofisticados. O sistema verifica identidades contra a plataforma Bank Verification Number (BVN) e inclui detecção de deepfakes; a Identy participou de avaliações RIVR do DHS e múltiplos benchmarks NIST. O modelo on-device resolve o dilema privacidade-segurança em mercados emergentes com infraestrutura de servidores limitada — lição diretamente aplicável aos mercados financeiros da LATAM." , titles: { es: "Identy lleva biometría on-device a la banca nigeriana para neutralizar SIM swap y ATO sin hardware dedicado ni datos en la nube", en: "Identy Brings On-Device Biometrics to Nigerian Banking to Stop SIM Swap and ATO Without Dedicated Hardware or Cloud Data", pt: "Identy leva biometria on-device à banca nigeriana para neutralizar SIM swap e ATO sem hardware dedicado nem envio de dados à nuvem" } },
  "poland-age-verification-law-eudi-jun26": { es: "Polonia adoptó un paquete legislativo que obliga a sitios web a implementar verificación de edad robusta para restringir el acceso de menores a contenido adulto, recomendando la EUDI Wallet como mecanismo que confirma la edad sin revelar datos personales al proveedor ni al emisor. Polonia planea integrar la verificación anónima en su app mObywatel, que ya sirve a 12 millones de usuarios, antes de fin de 2026. El caso es un referente anticipado para los debates legislativos activos sobre age assurance en Brasil, Argentina y México.", en: "Poland adopted a legislative package requiring websites to implement robust age verification to restrict minors' access to adult content, recommending the EUDI Wallet as a mechanism that confirms age without disclosing personal data to the provider or issuer. Poland plans to integrate anonymous verification into its mObywatel app — already serving 12 million users — before the end of 2026. The case is an early reference point for active legislative debates on age assurance in Brazil, Argentina, and Mexico.", pt: "A Polônia adotou um pacote legislativo que obriga sites a implementar verificação de idade robusta para restringir o acesso de menores a conteúdo adulto, recomendando a EUDI Wallet como mecanismo que confirma a idade sem revelar dados pessoais ao provedor ou ao emissor. O país planeja integrar a verificação anônima ao seu app mObywatel — que já atende 12 milhões de usuários — antes do fim de 2026. O caso é uma referência antecipada para os debates legislativos ativos sobre age assurance no Brasil, Argentina e México." , titles: { es: "Polonia aprueba ley de verificación de edad y recomienda la EUDI Wallet como mecanismo sin revelación de datos personales", en: "Poland Passes Age Verification Law, Backs EUDI Wallet as Privacy-Preserving Mechanism", pt: "Polônia aprova lei de verificação de idade e recomenda a EUDI Wallet como solução sem exposição de dados" } },
  "mexico-ato-condusef-smishing": { es: "Condusef alertó el 3 de mayo sobre una nueva ola de smishing bancario; BioCatch ya documentaba +324% en intentos de ATO. Ingeniería social y smishing desbordan la autenticación tradicional: cuando los bancos endurecen controles en app, los atacantes migran al canal externo. Pérdidas por fraude financiero: ~MX$14.500 millones en 2024.", en: "Condusef issued an alert on May 3 about a new wave of banking smishing; BioCatch had already documented a +324% surge in ATO attempts. Social engineering and smishing are overwhelming traditional authentication: when banks tighten in-app controls, attackers shift to external channels. Financial fraud losses: ~MX$14.5 billion in 2024.", pt: "A Condusef emitiu um alerta em 3 de maio sobre uma nova onda de smishing bancário; a BioCatch já documentava +324% nas tentativas de ATO. Engenharia social e smishing estão superando a autenticação tradicional: quando os bancos reforçam os controles no app, os atacantes migram para o canal externo. Perdas por fraude financeiro: ~MX$14,5 bilhões em 2024." , titles: { es: "México lidera el fraude bancario en LATAM con +324% en account takeover", en: "Mexico Leads Banking Fraud in LATAM with +324% in Account Takeover", pt: "México lidera a fraude bancária na LATAM com +324% em account takeover" } },
  "jumio-watch-monitoreo-continuo": { es: "Jumio Watch detecta hasta 25% más riesgo después del onboarding que las verificaciones estáticas. Se construye sobre el \"Jumio Identity Graph\" con señales de millones de identidades verificadas y fraudulentas. Cobertura global desde el lanzamiento, dirigido a fintech, cripto, gaming y marketplaces.", en: "Jumio Watch detects up to 25% more risk post-onboarding than static verifications. It builds on the \"Jumio Identity Graph\" with signals from millions of verified and fraudulent identities. Global coverage from launch, targeting fintech, crypto, gaming, and marketplaces.", pt: "O Jumio Watch detecta até 25% mais risco após o onboarding do que as verificações estáticas. É construído sobre o \"Jumio Identity Graph\" com sinais de milhões de identidades verificadas e fraudulentas. Cobertura global desde o lançamento, voltado para fintech, cripto, gaming e marketplaces." , titles: { es: "Jumio lanza monitoreo continuo de identidad: el KYC puntual empieza a quedarse corto", en: "Jumio Launches Continuous Identity Monitoring: Point-in-Time KYC Is Starting to Fall Short", pt: "Jumio lança monitoramento contínuo de identidade: o KYC pontual começa a ficar para trás" } },
  "zoom-world-id-deepfake-beta-may20": { es: "Zoom abrió un programa beta de integración con World ID Deep Face de Tools for Humanity que permite a los participantes verificar su identidad mediante escaneo de iris (dispositivo Orb) y recibir un badge \"Verified Human\" en video, sin compartir datos biométricos con Zoom. Empresas de finanzas y salud pueden activar el \"Deep Face Waiting Room\" —sala de espera que exige verificación previa— para bloquear suplantaciones generadas por IA en sesiones críticas. El movimiento de Zoom convierte el antideepfake en una capa estándar de comunicaciones corporativas y posiciona a Tools for Humanity como competidor emergente en el espacio de verificación de identidad que VU Deepfense habita.", en: "Zoom opened a beta integration program with Tools for Humanity's World ID Deep Face, allowing participants to verify their identity via iris scan (Orb device) and receive a \"Verified Human\" badge in video, without sharing biometric data with Zoom. Finance and healthcare companies can enable the \"Deep Face Waiting Room\" — a waiting room requiring prior verification — to block AI-generated impersonation in critical sessions. Zoom's move turns anti-deepfake into a standard layer of corporate communications and positions Tools for Humanity as an emerging competitor in the identity verification space that VU Deepfense occupies.", pt: "A Zoom abriu um programa beta de integração com o World ID Deep Face da Tools for Humanity, que permite aos participantes verificar sua identidade por meio de escaneamento de íris (dispositivo Orb) e receber um badge \"Verified Human\" em vídeo, sem compartilhar dados biométricos com a Zoom. Empresas de finanças e saúde podem ativar o \"Deep Face Waiting Room\" — sala de espera que exige verificação prévia — para bloquear suplantações geradas por IA em sessões críticas. O movimento da Zoom transforma o antideepfake em uma camada padrão das comunicações corporativas e posiciona a Tools for Humanity como concorrente emergente no espaço de verificação de identidade que o VU Deepfense ocupa." , titles: { es: "Zoom lanza beta de World ID: verificación biométrica de iris para acreditar humanidad real en videoconferencias", en: "Zoom Launches World ID Beta: Iris Biometric Verification to Prove Human Presence Against Deepfakes", pt: "Zoom lança beta do World ID: verificação biométrica de íris para atestar presença humana real em videoconferências" } },
  "spin-oxxo-continuidad-operativa-ciso-may25": { es: "El Chief Information Security Officer de Spin by OXXO detalló la metodología costo-beneficio que aplica la fintech mexicana para justificar gastos en redundancia cloud, backups y planes de recuperación ante directorios que exigen ROI claro. La clave está en \"demostrar qué riesgos se reducen y qué servicios siguen operando\" en lugar de solo defender el gasto en herramientas de seguridad. El enfoque refleja la madurez creciente del CISO en fintechs de LATAM que pasan de seguridad reactiva a resiliencia operativa alineada con objetivos del negocio.", en: "The Chief Information Security Officer of Spin by OXXO detailed the cost-benefit methodology the Mexican fintech uses to justify spending on cloud redundancy, backups, and recovery plans before boards that demand a clear ROI. The key is \"demonstrating which risks are reduced and which services remain operational\" rather than simply defending security tool expenditures. The approach reflects the growing maturity of the CISO role in LATAM fintechs transitioning from reactive security to operational resilience aligned with business objectives.", pt: "O Chief Information Security Officer da Spin by OXXO detalhou a metodologia de custo-benefício que a fintech mexicana aplica para justificar gastos em redundância cloud, backups e planos de recuperação perante conselhos que exigem ROI claro. A chave está em \"demonstrar quais riscos são reduzidos e quais serviços continuam operando\", em vez de apenas defender os gastos com ferramentas de segurança. A abordagem reflete a crescente maturidade do CISO em fintechs da LATAM que transitam de uma segurança reativa para uma resiliência operacional alinhada aos objetivos de negócio." , titles: { es: "El CISO de Spin by OXXO explica cómo justificar inversiones en continuidad operativa ante la alta dirección de una fintech", en: "Spin by OXXO's CISO on How to Justify Operational Continuity Investments to Fintech Leadership", pt: "O CISO da Spin by OXXO explica como justificar investimentos em continuidade operacional para a alta liderança de uma fintech" } },
  "instagram-meta-ai-account-hijack-jun02": { es: "Ciberdelincuentes manipularon mediante ingeniería social el bot de recuperación de cuentas de Meta para vincular direcciones de correo controladas por ellos, habilitando el reseteo de contraseñas sin necesidad de robar credenciales. Cuentas comprometidas de influencers y marcas fueron revendidas en canales de Telegram con valores acumulados superiores a USD 1 millón. Meta corrigió la vulnerabilidad a fines de mayo de 2026; las cuentas con 2FA mediante app autenticadora no fueron afectadas.", en: "Cybercriminals used social engineering to manipulate Meta's account recovery bot into linking attacker-controlled email addresses, enabling password resets without credential theft. Compromised influencer and brand accounts were resold on Telegram channels for a cumulative value exceeding USD 1 million. Meta patched the vulnerability in late May 2026; accounts with authenticator-app 2FA were not affected.", pt: "Cibercriminosos manipularam por engenharia social o bot de recuperação de contas da Meta para vincular endereços de e-mail sob seu controle, permitindo a redefinição de senhas sem roubo de credenciais. Contas comprometidas de influenciadores e marcas foram revendidas em canais do Telegram com valores acumulados superiores a USD 1 milhão. A Meta corrigiu a vulnerabilidade no final de maio de 2026; contas com 2FA via app autenticador não foram afetadas." , titles: { es: "Atacantes explotan el chatbot de recuperación de Meta para secuestrar cuentas de Instagram sin robar contraseñas", en: "Attackers Exploit Meta's Recovery Chatbot to Hijack Instagram Accounts Without Stealing Passwords", pt: "Atacantes exploram chatbot de recuperação da Meta para sequestrar contas do Instagram sem roubar senhas" } },
  "vu-modo-scoglio-lima-youtube-may13": { es: "En una nueva entrevista publicada en el canal de YouTube de VU, Pablo Lima (Director de Ventas de VU) conversa con Pablo Scoglio, VP de Desarrollo de MODO, sobre la evolución de una de las plataformas más relevantes del ecosistema financiero argentino. La charla recorre el pasado, presente y futuro de MODO: cómo nació el proyecto, los desafíos del crecimiento, la transformación digital de la industria financiera, la experiencia del usuario y la confianza digital, el rol de la identidad y la seguridad, y qué viene para el ecosistema. Un contenido que posiciona a VU como interlocutor de las fintech argentinas en la conversación sobre identidad, escala y confianza digital.", en: "In a new interview published on VU's YouTube channel, Pablo Lima (VU's Sales Director) speaks with Pablo Scoglio, VP of Development at MODO, about the evolution of one of the most relevant platforms in Argentina's financial ecosystem. The conversation covers MODO's past, present, and future: how the project was born, the challenges of growth, the digital transformation of the financial industry, user experience and digital trust, the role of identity and security, and what lies ahead for the ecosystem. The content positions VU as a key voice for Argentine fintechs in the conversation around identity, scale, and digital trust.", pt: "Em uma nova entrevista publicada no canal do YouTube da VU, Pablo Lima (Diretor de Vendas da VU) conversa com Pablo Scoglio, VP de Desenvolvimento da MODO, sobre a evolução de uma das plataformas mais relevantes do ecossistema financeiro argentino. A conversa percorre o passado, o presente e o futuro da MODO: como o projeto nasceu, os desafios do crescimento, a transformação digital da indústria financeira, a experiência do usuário e a confiança digital, o papel da identidade e da segurança, e o que vem por aí para o ecossistema. Um conteúdo que posiciona a VU como interlocutora das fintechs argentinas na conversa sobre identidade, escala e confiança digital." , titles: { es: "VU entrevista a Pablo Scoglio (VP de Desarrollo de MODO) sobre el crecimiento de la billetera y el rol de la identidad", en: "VU Interviews Pablo Scoglio (MODO VP of Development) on Wallet Growth and the Role of Identity", pt: "VU entrevista Pablo Scoglio (VP de Desenvolvimento da MODO) sobre o crescimento da carteira e o papel da identidade" } },
  "biometricupdate-dhs-ley-biometrica-may14": { es: "La Ley de Asignaciones del DHS aprobada el 30 de abril de 2026 autoriza recolección biométrica con supervisión virtual en los Application Support Centers de USCIS —un paso significativo hacia el procesamiento biométrico remoto a escala. La ley prohíbe fondos para sistemas de vigilancia fronteriza no autónomos, impulsando hacia IA con mayor autonomía, y asigna USD 222,9 millones para CBP, USD 20 millones para cámaras corporales y USD 10,6 mil millones para operaciones de la TSA. El modelo de expansión federal convierte la biometría en el tejido conectivo de la seguridad migratoria de EE.UU. — referencia directa para los gobiernos de LATAM que escalan infraestructuras de identidad soberana.", en: "The DHS Appropriations Act passed on April 30, 2026 authorizes biometric collection with virtual supervision at USCIS Application Support Centers — a significant step toward remote biometric processing at scale. The law prohibits funding for non-autonomous border surveillance systems, pushing toward greater AI autonomy, and allocates USD 222.9 million for CBP, USD 20 million for body cameras, and USD 10.6 billion for TSA operations. The federal expansion model positions biometrics as the connective tissue of U.S. immigration security — a direct reference for LATAM governments scaling sovereign identity infrastructures.", pt: "A Lei de Dotações do DHS aprovada em 30 de abril de 2026 autoriza a coleta biométrica com supervisão virtual nos Application Support Centers do USCIS — um passo significativo rumo ao processamento biométrico remoto em escala. A lei proíbe recursos para sistemas de vigilância de fronteira não autônomos, impulsionando a IA com maior autonomia, e destina USD 222,9 milhões para o CBP, USD 20 milhões para câmeras corporais e USD 10,6 bilhões para operações da TSA. O modelo de expansão federal transforma a biometria no tecido conectivo da segurança migratória dos EUA — referência direta para os governos da LATAM que escalam infraestruturas de identidade soberana." , titles: { es: "La ley de asignaciones del DHS habilita biometría remota a escala: USD 222,9M en CBP y USD 10,6B para TSA", en: "DHS Appropriations Bill Enables Remote Biometrics at Scale: USD 222.9M for CBP and USD 10.6B for TSA", pt: "Lei de dotações do DHS habilita biometria remota em escala: USD 222,9M para CBP e USD 10,6B para TSA" } },
  "meta-world-cup-fraud-prevention-jun01": { es: "Meta implementó IA avanzada, advertencias de seguridad en búsquedas de entradas en Facebook y colaboración con Visa para desmantelar redes que usaban branding del Mundial para dirigir usuarios a sitios de apuestas fraudulentos. La compañía eliminó 2,6 millones de piezas de contenido dañino entre octubre y diciembre de 2025, más del 74% antes de ser reportadas por usuarios. Los países sede —EE.UU., Canadá y México— son los de mayor exposición.", en: "Meta deployed advanced AI, security warnings on Facebook ticket searches, and partnered with Visa to dismantle networks using World Cup branding to funnel users toward fraudulent betting sites. The company removed 2.6 million pieces of harmful content between October and December 2025, over 74% before users reported them. Host countries — the US, Canada, and Mexico — face the highest exposure.", pt: "A Meta implementou IA avançada, alertas de segurança nas buscas de ingressos no Facebook e colaboração com a Visa para desmantelar redes que usavam a marca da Copa do Mundo para direcionar usuários a sites de apostas fraudulentos. A empresa removeu 2,6 milhões de peças de conteúdo prejudicial entre outubro e dezembro de 2025, sendo mais de 74% antes de serem reportadas pelos usuários. Os países-sede — EUA, Canadá e México — são os de maior exposição." , titles: { es: "Meta activa herramientas anti-fraude ante el inicio del Mundial 2026 el 11 de junio", en: "Meta Activates Anti-Fraud Tools Ahead of World Cup 2026 Kickoff on June 11", pt: "Meta ativa ferramentas antifraude antes do início da Copa do Mundo 2026 em 11 de junho" } },
  "met-police-facial-recognition-protests-may18": { es: "La Policía Metropolitana de Londres desplegó reconocimiento facial en vivo durante manifestaciones rivales en Camden, marcando el primer uso de la tecnología en contexto de protestas en el Reino Unido. El operativo resultó en tres arrestos y generó críticas inmediatas de Big Brother Watch, Liberty y Privacy International, que cuestionan el uso de vigilancia biométrica masiva en el ejercicio del derecho a manifestación. El caso eleva el debate regulatorio sobre el uso de biometría en espacio público —un límite que los marcos del AI Act europeo y los proyectos de regulación de biometría en LATAM tendrán que definir con urgencia.", en: "The London Metropolitan Police deployed live facial recognition during rival protests in Camden, marking the first use of the technology in a protest context in the United Kingdom. The operation resulted in three arrests and drew immediate criticism from Big Brother Watch, Liberty, and Privacy International, who question the use of mass biometric surveillance in the exercise of the right to protest. The case elevates the regulatory debate over the use of biometrics in public spaces — a boundary that the European AI Act frameworks and biometric regulation initiatives in LATAM will need to define urgently.", pt: "A Polícia Metropolitana de Londres implantou reconhecimento facial ao vivo durante manifestações rivais em Camden, marcando o primeiro uso da tecnologia em contexto de protestos no Reino Unido. A operação resultou em três prisões e gerou críticas imediatas da Big Brother Watch, da Liberty e da Privacy International, que questionam o uso de vigilância biométrica em massa no exercício do direito de manifestação. O caso eleva o debate regulatório sobre o uso de biometria em espaços públicos — um limite que os marcos do AI Act europeu e os projetos de regulação de biometria na LATAM precisarão definir com urgência." , titles: { es: "La Policía Metropolitana de Londres usa reconocimiento facial en protestas por primera vez: 3 arrestos y rechazo de grupos civiles", en: "London Met Police Uses Facial Recognition at Protests for the First Time: 3 Arrests and Civil Liberties Backlash", pt: "Polícia Metropolitana de Londres usa reconhecimento facial em protestos pela primeira vez: 3 prisões e rejeição de grupos de liberdades civis" } },
  "reality-defender-zerofox-deepfake-detection-jun26": { es: "Reality Defender anunció la integración de su tecnología de detección multimodal de contenido generado por IA en la plataforma de ciberseguridad ZeroFox, cubriendo voz, video e imagen. La alianza permite a los analistas identificar campañas de medios sintéticos, incluyendo suplantación de ejecutivos en earnings calls y phishing basado en videos falsos, antes de que circulen. Gartner advirtió que el uso de deepfakes por atacantes es ya rutinario, y la mayoría de los equipos de seguridad los detectan recién después de que han circulado.", en: "Reality Defender announced the integration of its multimodal AI-generated content detection technology into the ZeroFox cybersecurity platform, covering voice, video, and image. The partnership allows analysts to identify synthetic media campaigns — including executive impersonation on earnings calls and deepfake-based phishing — before they spread. Gartner warned that attacker use of deepfakes is now routine, and most security teams only detect them after they have already circulated.", pt: "A Reality Defender anunciou a integração de sua tecnologia de detecção multimodal de conteúdo gerado por IA na plataforma de cibersegurança ZeroFox, cobrindo voz, vídeo e imagem. A parceria permite que analistas identifiquem campanhas de mídia sintética — incluindo a personificação de executivos em earnings calls e phishing baseado em deepfakes — antes que se espalhem. A Gartner alertou que o uso de deepfakes por atacantes já é rotineiro, e a maioria das equipes de segurança os detecta somente após a circulação." , titles: { es: "Reality Defender integra detección de deepfakes en ZeroFox: el uso de medios sintéticos por atacantes ya es rutinario según Gartner", en: "Reality Defender Embeds Deepfake Detection in ZeroFox as Gartner Flags Synthetic Media as Routine Attack Vector", pt: "Reality Defender integra detecção de deepfakes ao ZeroFox: uso de mídia sintética por atacantes já é rotineiro, aponta Gartner" } },
  "aware-liveness-cen-ts-18099-may13": { es: "El laboratorio acreditado BixeLab completó una evaluación independiente de Intelligent Liveness de Aware sobre 900 escenarios de ataque bajo el estándar europeo CEN/TS 18099:2024: cero bypasses exitosos de ataques de inyección y 0% de error en presentaciones legítimas. La certificación CEN/TS 18099 se convierte en el requisito de facto para licitaciones bancarias y gubernamentales que exigen prueba de resistencia a deepfakes y presentaciones sintéticas — un umbral que los reguladores de banca latinoamericana están incorporando a sus marcos de KYC biométrico.", en: "Accredited lab BixeLab completed an independent evaluation of Aware's Intelligent Liveness across 900 attack scenarios under the European standard CEN/TS 18099:2024: zero successful injection attack bypasses and 0% error rate on legitimate presentations. CEN/TS 18099 certification is becoming the de facto requirement for banking and government tenders demanding proof of resistance to deepfakes and synthetic presentations — a threshold that Latin American banking regulators are incorporating into their biometric KYC frameworks.", pt: "O laboratório credenciado BixeLab concluiu uma avaliação independente do Intelligent Liveness da Aware em 900 cenários de ataque sob o padrão europeu CEN/TS 18099:2024: zero bypasses bem-sucedidos de ataques de injeção e 0% de erro em apresentações legítimas. A certificação CEN/TS 18099 torna-se o requisito de fato para licitações bancárias e governamentais que exigem comprovação de resistência a deepfakes e apresentações sintéticas — um limiar que os reguladores bancários da América Latina estão incorporando aos seus marcos de KYC biométrico." , titles: { es: "Aware registra cero bypasses de ataques de inyección en 900 pruebas bajo CEN/TS 18099", en: "Aware records zero injection attack bypasses across 900 tests under CEN/TS 18099", pt: "Aware registra zero bypasses de ataques de injeção em 900 testes sob a norma CEN/TS 18099" } },

function escAttr(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sumData(it) {
  const ext = window.NEWSROOM_SUMMARIES && window.NEWSROOM_SUMMARIES[it.id];
  const s = ext || it.summaries || {};
  const fb = it.summary || '';
  return `id="sum-${it.id}" data-es="${escAttr(s.es||fb)}" data-en="${escAttr(s.en||fb)}" data-pt="${escAttr(s.pt||fb)}"`;
}

function titleData(it) {
  const ext = window.NEWSROOM_SUMMARIES && window.NEWSROOM_SUMMARIES[it.id];
  const t = (ext && ext.titles) || {};
  const fb = it.title || '';
  return id="title-${it.id}" data-es="${escAttr(t.es||fb)}" data-en="${escAttr(t.en||fb)}" data-pt="${escAttr(t.pt||fb)}";
}

function langSwitcherHTML(it) {
  const lang = (it.language || 'es').split('-')[0].toLowerCase();
  const id = it.id;
  return `<span class="lang-switcher">`
    + `<button class="lang-btn${lang==='es'?' active':''}" onclick="event.stopPropagation();translateSummary(event,'${id}','es')" title="Español">ES</button>`
    + `<button class="lang-btn${lang==='en'?' active':''}" onclick="event.stopPropagation();translateSummary(event,'${id}','en')" title="English">EN</button>`
    + `<button class="lang-btn${lang==='pt'?' active':''}" onclick="event.stopPropagation();translateSummary(event,'${id}','pt')" title="Português">PT</button>`
    + `</span>`;
}

function translateSummary(event, articleId, targetLang) {
  event.stopPropagation();
  const btn = event.currentTarget;
  const sumEl = document.getElementById('sum-' + articleId);
  if (!sumEl) return;
  const switcher = btn.closest('.lang-switcher');
  const allBtns = switcher ? switcher.querySelectorAll('.lang-btn') : [];
  const titleEl = document.getElementById('title-' + articleId);
  sumEl.textContent = sumEl.dataset[targetLang] || sumEl.textContent;
  if (titleEl) titleEl.textContent = titleEl.dataset[targetLang] || titleEl.textContent;
  allBtns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function metaHTML(it) {
  return `
    <div class="meta">
      <span class="date-badge">${fmtDate(it.date)}</span>
      ${langSwitcherHTML(it)}
      ${it.vertical ? `<span class="pip">·</span><span>${it.vertical}</span>` : ''}
      ${it.topic ? `<span class="pip">·</span><span>${it.topic}</span>` : ''}
      <span class="pip">·</span>
      <span>Fuente:</span>
      <a href="${it.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation();">${it.sourceName} ↗</a>
    </div>
  `;
}

  'ventana':                { icon: '🎯', label: 'Ventana de Mercado'     },

function flipBackHTML(it) {
  const t = ACTIONABLE_TYPE_MAP[it.actionable.type] || { icon: '⚡', label: 'Accionable' };
  return `
    <div class="flip-back">
      <div class="flip-back-header">
        <span class="flip-back-icon">${t.icon}</span>
        <div class="flip-back-type">${t.label}</div>
      </div>
      <div class="flip-back-body">
        <div class="flip-back-label">Señal de Mercado</div>
        <p class="flip-back-text">${it.actionable.text}</p>
      </div>
      <div class="flip-back-footer">
        <span class="flip-back-source">${it.sourceName}</span>
        <a class="flip-btn-read" href="${it.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation();">Leer nota ↗</a>
      </div>
    </div>`;
}

function wrapFlipCard(frontHTML, it, articleClass) {
  return `
    <article class="${articleClass} flip-card">
      <div class="flip-card-inner">
        <div class="flip-front" onclick="window.open('${it.sourceUrl}','_blank','noopener')">
          ${frontHTML}
          <div class="flip-hint"></div>
          <button class="flip-toggle-btn" onclick="event.stopPropagation();this.closest('.flip-card').classList.toggle('flipped')">⚡</button>
        </div>
        ${flipBackHTML(it)}
      </div>
    </article>`;
}

function featCardHTML(it) {
  const imageHTML = `<div class="feat-image">${generateCoverSVG(it)}</div>`;
  const frontInner = `
    ${imageHTML}
    <div class="feat-content">
      <div class="feat-top">${pillsHTML(it)}</div>
      <h2 ${titleData(it)}>${it.title}</h2>
      <p class="feat-summary" ${sumData(it)}>${it.summary}</p>
      ${metaHTML(it)}
    </div>`;
  if (it.actionable) {
    return wrapFlipCard(frontInner, it, `feat-card card-${it.section} ${it.highRelevance ? 'high' : ''} has-image`);
  }
  return `
    <article class="feat-card card-${it.section} ${it.highRelevance ? 'high' : ''} has-image" onclick="window.open('${it.sourceUrl}','_blank','noopener')">
      ${frontInner}
    </article>`;
}

function sideCardHTML(it) {
  const frontInner = `
    <div class="side-top">${pillsHTML(it)}</div>
    <h3 ${titleData(it)}>${it.title}</h3>
    <p class="side-summary" ${sumData(it)}>${it.summary}</p>

      ${langSwitcherHTML(it)}

  if (it.actionable) {

  return `
    <article class="side-card card-${it.section} ${it.highRelevance ? 'high' : ''}" onclick="window.open('${it.sourceUrl}','_blank','noopener')">

      <div class="side-top">${pillsHTML(it)}</div>

function renderFeatured(items, emptyMsg) {
  if (!items.length) return `<div class="empty-msg">${emptyMsg}</div>`;
  const featured = items[0];
  const sides    = items.slice(1, 4);
  const list     = items.slice(4);
  return `
    <div class="feat-grid">
      ${featCardHTML(featured)}
      <div class="sides">
        ${sides.map(sideCardHTML).join('') || '<div class="empty-msg" style="padding:14px;text-align:left;">Sin notas adicionales en esta vista.</div>'}
      </div>
    </div>
    ${list.length ? `<div class="list-grid">${list.map(listCardHTML).join('')}</div>` : ''}
  `;
}

function renderListOnly(items, emptyMsg) {
  if (!items.length) return `<div class="empty-msg">${emptyMsg}</div>`;
  return `<div class="list-grid">${items.map(listCardHTML).join('')}</div>`;
}

function renderLatam(items, emptyMsg) {
  if (!items.length) return `<div class="empty-msg">${emptyMsg}</div>`;
  const featured = items[0];
  const sides    = items.slice(1, 4);
  const topHTML  = `
    <div class="feat-grid">
      ${featCardHTML(featured)}
      <div class="sides">
        ${sides.map(sideCardHTML).join('') || ''}
      </div>
    </div>`;
  const byCountry = {};
  items.forEach(it => {
    if (!byCountry[it.country]) byCountry[it.country] = [];
    byCountry[it.country].push(it);
  });
  const countryOrder = ['argentina','brasil','mexico','colombia','chile','peru','uruguay','ecuador','costa_rica','panama','bolivia','paraguay','venezuela','el_salvador','espana'];
  const sectionsHTML = countryOrder
    .filter(c => byCountry[c]?.length)
    .map(c => {
      const citems = byCountry[c];
      const info = COUNTRIES[c] || { flag: '', name: c };
      return `
        <details class="country-section" data-country="${c}">
          <summary>
            <span class="country-flag">${info.flag}</span>
            <span>${info.name}</span>
            <span class="country-count">${citems.length}</span>
            <span class="country-chevron">▶</span>
          </summary>
          <div class="country-items">${citems.map(listCardHTML).join('')}</div>
        </details>`;
    }).join('');
  return `
    ${topHTML}
    <div class="latam-view-toggle">
      <button class="latam-toggle-btn active" data-tab="list">☰&nbsp; Por país</button>
      <button class="latam-toggle-btn" data-tab="map">🗺&nbsp; Mapa</button>
    </div>
    <div id="latamListView"><div class="latam-by-country">${sectionsHTML}</div></div>
    <div id="latamMapView" style="display:none"></div>
  `;
}

function initLatamToggle() {
  const listView = document.getElementById('latamListView');
  const mapView  = document.getElementById('latamMapView');
  const btns     = document.querySelectorAll('.latam-toggle-btn');
  if (!listView || !mapView || !btns.length) return;

  // Reconstruct byCountry from live data
  const byCountry = {};
  VIEW_CONFIG.latam.items().forEach(it => {
    if (!byCountry[it.country]) byCountry[it.country] = [];
    byCountry[it.country].push(it);
  });

  let mapRendered = false;

  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (btn.dataset.tab === 'list') {
        listView.style.display = '';
        mapView.style.display  = 'none';
      } else {
        listView.style.display = 'none';
        mapView.style.display  = '';
        if (!mapRendered) {
          renderD3LatamMap(byCountry, mapView);
          mapRendered = true;
        }
      }
    });
  });
}

/* =========================================================================
   HEATMAP DE ACTIVIDAD
   ========================================================================= */

function getHmapLevel(n) {
  if (!n) return 0;
  if (n <= 3) return 1;
  if (n <= 7) return 2;
  if (n <= 12) return 3;
  return 4;
}

function buildHeatmapHTML() {
  const counts = {};
  collectAll().forEach(it => {
    if (it.date) counts[it.date] = (counts[it.date] || 0) + 1;
  });

  const WEEKS = 20;
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const toStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const todayStr = toStr(now);

  // Align to Monday of current week, then go back WEEKS-1 more weeks
  const dow = (now.getDay() + 6) % 7; // Mon=0 … Sun=6
  const startDate = new Date(now);
  startDate.setDate(now.getDate() - dow - (WEEKS - 1) * 7);

  const columns = [];
  const cursor = new Date(startDate);
  for (let w = 0; w < WEEKS; w++) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      week.push(toStr(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    columns.push(week);
  }

  const DAY_LABELS = ['L','','X','','V','','D'];
  const MONTH_NAMES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  let prevM = -1;
  const monthsRow = columns.map(week => {
    const d = new Date(week[0] + 'T12:00:00');
    const m = d.getMonth();
    const label = m !== prevM ? MONTH_NAMES[m] : '';
    prevM = m;
    return `<div class="hmap-month">${label}</div>`;
  }).join('');

  const gridCols = columns.map(week => {
    const cells = week.map(ds => {
      const n = counts[ds] || 0;
      const cls = ds > todayStr ? 'future' : `l${getHmapLevel(n)}`;
      return `<div class="hmap-cell ${cls}" data-date="${ds}" data-count="${n}"></div>`;
    }).join('');
    return `<div class="hmap-col">${cells}</div>`;
  }).join('');

  const totalNotes = Object.values(counts).reduce((a,b) => a+b, 0);
  const activeDays = Object.keys(counts).filter(k => counts[k] > 0).length;

  const dayLabelsHTML = DAY_LABELS.map(l => `<div class="hmap-day-lbl">${l}</div>`).join('');
  const legendCells = [0,1,2,3,4].map(l => `<div class="hmap-cell l${l}"></div>`).join('');

  return `
    <div class="heatmap-panel">
      <div class="hmap-header">
        <span class="hmap-title">Actividad de cobertura</span>
        <span class="hmap-stats">${totalNotes} notas · ${activeDays} días activos</span>
      </div>
      <div class="hmap-wrap">
        <div class="hmap-day-col">${dayLabelsHTML}</div>
        <div class="hmap-right">
          <div class="hmap-months-row">${monthsRow}</div>
          <div class="hmap-grid">${gridCols}</div>
        </div>
      </div>
      <div class="hmap-footer">
        <div class="hmap-legend">
          <span class="hmap-leg-txt">Menos</span>${legendCells}<span class="hmap-leg-txt">Más</span>
        </div>
      </div>
    </div>
    <div class="hmap-tip" id="hmapTip"></div>
  `;
}

function initHeatmap() {
  const tip = document.getElementById('hmapTip');
  if (!tip) return;
  const DAY_ES  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MON_ES  = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  document.querySelectorAll('.hmap-cell[data-date]').forEach(cell => {
    cell.addEventListener('mouseenter', () => {
      const n = parseInt(cell.dataset.count) || 0;
      const ds = cell.dataset.date;
      const d  = new Date(ds + 'T12:00:00');
      const label = `${DAY_ES[d.getDay()]} ${d.getDate()} ${MON_ES[d.getMonth()]} ${d.getFullYear()}`;
      tip.textContent = n ? `${n} nota${n !== 1 ? 's' : ''} · ${label}` : `Sin cobertura · ${label}`;
      tip.style.opacity = '1';
    });
    cell.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 34) + 'px';
    });
    cell.addEventListener('mouseleave', () => { tip.style.opacity = '0'; });
  });
}

function renderView(viewKey) {
  const cfg = VIEW_CONFIG[viewKey];
  if (!cfg) return renderView('home');

  const items = cfg.items();
  const view  = document.getElementById('view');
  view.dataset.view = viewKey;

  const headHTML = `
    <header class="view-head">
      <span class="view-tag">${cfg.label}</span>
      <h1>${cfg.title}</h1>
      <span class="view-meta">${items.length} ${items.length === 1 ? 'nota' : 'notas'}</span>
    </header>
  `;

  const bodyHTML = cfg.render === 'list'
    ? renderListOnly(items, cfg.empty)
    : cfg.render === 'latam'
      ? renderLatam(items, cfg.empty)
      : renderFeatured(items, cfg.empty);

  const extraHTML = viewKey === 'home' ? buildHeatmapHTML() : '';
  view.innerHTML = headHTML + bodyHTML + extraHTML;
  if (viewKey === 'latam') initLatamToggle();
  if (viewKey === 'home') initHeatmap();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

/* =========================================================================
   TOC NAV
   ========================================================================= */

function buildTOC() {
  const order = ['home','global','latam','regulation','competencia','vu','archivo'];
  const counts = {
    home:        VIEW_CONFIG.home.items().length,
    global:      VIEW_CONFIG.global.items().length,
    latam:       VIEW_CONFIG.latam.items().length,
    regulation:  VIEW_CONFIG.regulation.items().length,
    competencia: VIEW_CONFIG.competencia.items().length,
    vu:          VIEW_CONFIG.vu.items().length,
    archivo:     VIEW_CONFIG.archivo.items().length
  };
  const colors = {
    home:        'var(--vu-naranja)',
    global:      'var(--sec-global)',
    latam:       'var(--sec-latam)',
    regulation:  'var(--sec-regulation)',
    competencia: 'var(--sec-competencia)',
    vu:          'var(--sec-vu)',
    archivo:     'var(--sec-archivo)'
  };
  const nav = document.getElementById('tocNav');
  nav.innerHTML = order.map(k => {
    const c = counts[k];
    const badgeStyle = c > 0 ? `background:${colors[k]};color:#fff;border-color:transparent;` : '';
    return `
      <a class="toc-link ${k === 'archivo' ? 'archivo' : ''}" data-view="${k}" href="#${k}">
        <span class="dot" style="background:${colors[k]};"></span>
        <span>${VIEW_CONFIG[k].label}</span>
        <span class="count ${c > 0 ? 'has-items' : ''}" style="--badge-color:${colors[k]};${badgeStyle}">${c}</span>
      </a>`;
  }).join('');
}

function setActiveTOC(viewKey) {
  document.querySelectorAll('.toc-link').forEach(a => {
    a.classList.toggle('active', a.dataset.view === viewKey);
  });
}

/* =========================================================================
   ROUTER
   ========================================================================= */

function currentView() {
  const k = (window.location.hash || '#home').replace('#','');
  return VIEW_CONFIG[k] ? k : 'home';
}
function route() {
  const v = currentView();
  setActiveTOC(v);
  renderView(v);
}
window.addEventListener('hashchange', route);

/* =========================================================================
   BACK TO TOP
   ========================================================================= */

const backTopBtn = document.getElementById('backTopBtn');
backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
window.addEventListener('scroll', () => {
  backTopBtn.classList.toggle('visible', window.scrollY > 360);
}, { passive: true });

/* =========================================================================
   SEARCH
   ========================================================================= */

function renderSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) { route(); return; }
  const results = collectAll()
    .filter(it =>
      (it.title     || '').toLowerCase().includes(q) ||
      (it.summary   || '').toLowerCase().includes(q) ||
      (it.sourceName|| '').toLowerCase().includes(q) ||
      (it.topic     || '').toLowerCase().includes(q) ||
      (it.competitor|| '').toLowerCase().includes(q)
    )
    .sort(byDateDesc);
  const view = document.getElementById('view');
  view.dataset.view = 'search';
  view.innerHTML = `
    <header class="view-head">
      <span class="view-tag">Búsqueda</span>
      <h1>"${query}"</h1>
      <span class="view-meta">${results.length} ${results.length === 1 ? 'resultado' : 'resultados'}</span>
    </header>
    ${renderListOnly(results, 'Sin resultados para esta búsqueda.')}`;
  window.scrollTo({ top: 0, behavior: 'auto' });
  document.querySelectorAll('.toc-link').forEach(a => a.classList.remove('active'));
}

/* =========================================================================
   TICKER BLOOMBERG
   ========================================================================= */

function initTicker() {
  const SMETA = {
    global:      { label: 'GLOBAL',  color: '#3A86FF' },
    latam:       { label: 'LATAM',   color: '#F15E37' },
    regulation:  { label: 'REG.',    color: '#9B59B6' },
    competencia: { label: 'COMP.',   color: '#C44826' },
    vu:          { label: 'VU',      color: '#06A77D' },
  };

  const all = [];
  Object.entries(briefing.sections).forEach(([key, items]) => {
    if (!SMETA[key]) return;
    items.forEach(item => all.push({ ...item, _sec: key }));
  });

  // Prioridad: highRelevance primero, luego por sección
  const ORDER = ['global','latam','regulation','competencia','vu'];
  all.sort((a, b) => {
    if (b.highRelevance !== a.highRelevance) return (b.highRelevance ? 1 : 0) - (a.highRelevance ? 1 : 0);
    return ORDER.indexOf(a._sec) - ORDER.indexOf(b._sec);
  });

  const items = all.slice(0, 24);

  const makeItem = (item) => {
    const m = SMETA[item._sec];
    const bg = m.color + '28';
    return `<a class="ticker-item" href="#${item._sec}">` +
      `<span class="ticker-tag" style="color:${m.color};background:${bg};">${m.label}</span>` +
      `<span>${item.title}</span>` +
      `<span class="ticker-source">— ${item.sourceName}</span>` +
      `</a><span class="ticker-sep" aria-hidden="true">◆</span>`;
  };

  const html = items.map(makeItem).join('');
  const track = document.getElementById('tickerTrack');
  if (!track) return;
  track.innerHTML = html + html; // duplicado para loop sin corte

  // Duración proporcional al contenido
  const totalLen = items.reduce((s, i) => s + i.title.length + i.sourceName.length, 0);
  const dur = Math.max(50, Math.min(120, Math.round(totalLen * 0.13)));
  track.style.animationDuration = dur + 's';
}

/* =========================================================================
   COMMAND PALETTE
   ========================================================================= */

const CMD_SECTIONS = [
  { id: 'home',        label: 'Inicio',      color: '#F15E37' },
  { id: 'global',      label: 'Global',      color: '#3A86FF' },
  { id: 'latam',       label: 'LATAM',       color: '#F15E37' },
  { id: 'regulation',  label: 'Regulación',  color: '#9B59B6' },
  { id: 'competencia', label: 'Competencia', color: '#C44826' },
  { id: 'vu',          label: 'VU',          color: '#06A77D' },
  { id: 'archivo',     label: 'Archivo',     color: '#888888' },
];

const SEC_COLOR = {
  global: '#3A86FF', latam: '#F15E37', regulation: '#9B59B6',
  competencia: '#C44826', vu: '#06A77D', archivo: '#888888'
};

let cmdOpen = false;
let cmdActiveIdx = -1;
let cmdItemsData = [];

function openCmd() {
  const backdrop = document.getElementById('cmdBackdrop');
  const input    = document.getElementById('cmdInput');
  backdrop.classList.add('open');
  cmdOpen = true;
  cmdActiveIdx = -1;
  input.value = '';
  renderCmdResults('');
  requestAnimationFrame(() => input.focus());
  document.body.style.overflow = 'hidden';
}

function closeCmd() {
  document.getElementById('cmdBackdrop').classList.remove('open');
  cmdOpen = false;
  document.body.style.overflow = '';
}

function activateCmd(item) {
  closeCmd();
  if (item.type === 'section') {
    window.location.hash = '#' + item.id;
    route();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (item.type === 'article') {
    window.open(item.url, '_blank', 'noopener');
  }
}

function setCmdActive(idx) {
  cmdActiveIdx = idx;
  document.querySelectorAll('#cmdResults .cmd-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function cmdMoveSelection(dir) {
  const items = document.querySelectorAll('#cmdResults .cmd-item');
  if (!items.length) return;
  let next = cmdActiveIdx + dir;
  if (next < 0) next = items.length - 1;
  if (next >= items.length) next = 0;
  setCmdActive(next);
  items[next].scrollIntoView({ block: 'nearest' });
}

function renderCmdResults(q) {
  const resultsEl = document.getElementById('cmdResults');
  const query = q.trim().toLowerCase();
  cmdItemsData = [];
  let html = '';

  const iconNav = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
  const iconDoc = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;

  if (!query) {
    html += `<div class="cmd-group-label">Navegar</div>`;
    CMD_SECTIONS.forEach(sec => {
      const idx = cmdItemsData.length;
      cmdItemsData.push({ type: 'section', id: sec.id });
      html += `<div class="cmd-item" data-idx="${idx}">
        <div class="cmd-item-icon" style="background:${sec.color}1a;color:${sec.color};">${iconNav}</div>
        <div class="cmd-item-body">
          <div class="cmd-item-title">${sec.label}</div>
          <div class="cmd-item-meta">Sección del newsroom</div>
        </div>
        <span class="cmd-item-badge" style="color:${sec.color};background:${sec.color}1a;">${sec.label.toUpperCase()}</span>
      </div>`;
    });
  } else {
    const results = collectAll()
      .filter(it =>
        (it.title      || '').toLowerCase().includes(query) ||
        (it.summary    || '').toLowerCase().includes(query) ||
        (it.sourceName || '').toLowerCase().includes(query) ||
        (it.topic      || '').toLowerCase().includes(query) ||
        (it.competitor || '').toLowerCase().includes(query)
      )
      .sort(byDateDesc)
      .slice(0, 15);

    if (!results.length) {
      html += `<div class="cmd-empty">Sin resultados para "<strong>${q}</strong>"</div>`;
    } else {
      html += `<div class="cmd-group-label">${results.length} resultado${results.length !== 1 ? 's' : ''}</div>`;
      results.forEach(it => {
        const color = SEC_COLOR[it.section] || '#888';
        const label = SECTION_LABEL[it.section] || it.section;
        const idx = cmdItemsData.length;
        cmdItemsData.push({ type: 'article', url: it.sourceUrl });
        html += `<div class="cmd-item" data-idx="${idx}">
          <div class="cmd-item-icon" style="background:${color}1a;color:${color};">${iconDoc}</div>
          <div class="cmd-item-body">
            <div class="cmd-item-title">${it.title}</div>
            <div class="cmd-item-meta">${it.sourceName} · ${it.date}</div>
          </div>
          <span class="cmd-item-badge" style="color:${color};background:${color}1a;">${label}</span>
        </div>`;
      });
    }
  }

  resultsEl.innerHTML = html;
  cmdActiveIdx = -1;

  resultsEl.querySelectorAll('.cmd-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      if (cmdItemsData[idx]) activateCmd(cmdItemsData[idx]);
    });
    el.addEventListener('mouseenter', () => {
      setCmdActive(parseInt(el.dataset.idx, 10));
    });
  });
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    cmdOpen ? closeCmd() : openCmd();
    return;
  }
  if (!cmdOpen) return;
  if (e.key === 'Escape')    { e.preventDefault(); closeCmd(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdMoveSelection(1); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); cmdMoveSelection(-1); return; }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (cmdActiveIdx >= 0 && cmdItemsData[cmdActiveIdx]) activateCmd(cmdItemsData[cmdActiveIdx]);
    return;
  }
});

document.addEventListener('DOMContentLoaded', () => {
  buildTOC();
  route();
  initTicker();

  const cmdInput = document.getElementById('cmdInput');
  if (cmdInput) {
    cmdInput.addEventListener('input', e => renderCmdResults(e.target.value));
  }

  document.getElementById('cmdBackdrop')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) closeCmd();
  });

  document.getElementById('cmdTriggerBtn')?.addEventListener('click', openCmd);

  let searchTimer;
  const searchBox = document.getElementById('searchBox');
  if (searchBox) {
    searchBox.addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => renderSearch(e.target.value), 220);
    });
    searchBox.addEventListener('keydown', e => {
      if (e.key === 'Escape') { searchBox.value = ''; route(); searchBox.blur(); }
    });
  }
});
</script>

  "fbi-ngi-biometric-rfi-jun01": { es: "La división CJIS del FBI emitió un RFI solicitando algoritmos biométricos comerciales para modernizar el sistema NGI, que alberga 650 millones de huellas latentes, 175 millones de registros faciales y 2 millones de iris. Los requisitos incluyen certificación FedRAMP High, despliegue en GovCloud, cadena de suministro de software 100% doméstica y habilitación de seguridad Secret; las presentaciones cierran el 30 de junio de 2026. El proceso señala una tendencia global de soberanía e infraestructura biométrica de estado que ya está replicándose en debates regulatorios de LATAM.", en: "The FBI's CJIS division issued an RFI seeking commercial biometric algorithms to modernize the NGI system, which holds 650 million latent fingerprints, 175 million facial records, and 2 million iris records. Requirements include FedRAMP High certification, GovCloud deployment, a 100% domestic software supply chain, and Secret security clearance; submissions close June 30, 2026. The process signals a global trend toward state biometric sovereignty and infrastructure already being replicated in LATAM regulatory debates.", pt: "A divisão CJIS do FBI emitiu um RFI solicitando algoritmos biométricos comerciais para modernizar o sistema NGI, que armazena 650 milhões de impressões latentes, 175 milhões de registros faciais e 2 milhões de íris. Os requisitos incluem certificação FedRAMP High, implantação em GovCloud, cadeia de fornecimento de software 100% doméstica e habilitação de segurança Secret; as submissões encerram em 30 de junho de 2026. O processo sinaliza uma tendência global de soberania e infraestrutura biométrica estatal que já se replica nos debates regulatórios da LATAM." , titles: { es: "El FBI licita modernización del mayor repositorio biométrico gubernamental del mundo: 650 millones de huellas y 175 millones de rostros", en: "FBI Seeks to Modernize World's Largest Government Biometric Repository: 650 Million Fingerprints, 175 Million Faces", pt: "FBI licita modernização do maior repositório biométrico governamental do mundo: 650 milhões de digitais e 175 milhões de rostos" } },
  "getreal-continuous-idv-deepfake-may18": { es: "GetReal Security integró verificación de identidad continua a GetReal Protect, su plataforma de detección de deepfakes en comunicaciones de voz y video. El sistema confirma que la persona que inicia la sesión sigue siendo la misma durante toda la llamada —no solo al ingresar— combinando detección multimodal de deepfakes, detección de suplantación e inteligencia de amenazas. GetReal Protect se integra con Microsoft Teams, Cisco Webex y Zoom y soporta más de 40 integraciones nativas con Okta, Microsoft Entra y CyberArk; la empresa reportó que los deepfakes causaron USD 1.600 millones en pérdidas globales durante 2025 y el fraude de identidad sintética se multiplicó por ocho en el mismo período.", en: "GetReal Security integrated continuous identity verification into GetReal Protect, its deepfake detection platform for voice and video communications. The system confirms that the person who initiates a session remains the same throughout the entire call — not just at login — combining multimodal deepfake detection, impersonation detection, and threat intelligence. GetReal Protect integrates with Microsoft Teams, Cisco Webex, and Zoom and supports more than 40 native integrations with Okta, Microsoft Entra, and CyberArk; the company reported that deepfakes caused USD 1.6 billion in global losses during 2025 and synthetic identity fraud multiplied eightfold in the same period.", pt: "A GetReal Security integrou verificação de identidade contínua ao GetReal Protect, sua plataforma de detecção de deepfakes em comunicações de voz e vídeo. O sistema confirma que a pessoa que inicia a sessão continua sendo a mesma durante toda a chamada — não apenas no login — combinando detecção multimodal de deepfakes, detecção de spoofing e inteligência de ameaças. O GetReal Protect se integra com Microsoft Teams, Cisco Webex e Zoom e suporta mais de 40 integrações nativas com Okta, Microsoft Entra e CyberArk; a empresa reportou que deepfakes causaram USD 1,6 bilhão em perdas globais em 2025 e que a fraude de identidade sintética se multiplicou por oito no mesmo período." , titles: { es: "GetReal Security lanza verificación de identidad continua: la autenticación deja de ser un checkpoint de entrada y se convierte en capa permanente", en: "GetReal Security Launches Continuous Identity Verification: Authentication Becomes a Permanent Layer, Not Just an Entry Checkpoint", pt: "GetReal Security lança verificação de identidade contínua: autenticação deixa de ser um checkpoint de entrada e vira camada permanente" } },
  "haotian-ai-deepfake-realtime": { es: "404 Media documentó Haotian AI, software chino de suplantación facial que funciona en WhatsApp, Zoom, Teams y TikTok sin artefactos visuales ni retrasos, engañando al 100% de los detectores académicos testeados. Cuesta USD 1.998/año con modelos faciales a USD 498 adicionales; sus creadores llevan generados más de USD 4 millones. Representa una nueva generación de deepfake que invalida los sistemas de detección basados en artefactos visuales e impacta directamente en liveness detection y verificación biométrica por video.", en: "404 Media documented Haotian AI, a Chinese facial impersonation software that works on WhatsApp, Zoom, Teams, and TikTok without visual artifacts or delays, fooling 100% of academic detectors tested. It costs USD 1,998/year with facial models at an additional USD 498; its creators have generated over USD 4 million in revenue. It represents a new generation of deepfake that invalidates artifact-based detection systems and directly impacts liveness detection and video-based biometric verification.", pt: "A 404 Media documentou o Haotian AI, software chinês de falsificação facial que funciona no WhatsApp, Zoom, Teams e TikTok sem artefatos visuais nem atrasos, enganando 100% dos detectores acadêmicos testados. Custa USD 1.998/ano com modelos faciais a USD 498 adicionais; seus criadores já geraram mais de USD 4 milhões. Representa uma nova geração de deepfake que invalida os sistemas de detecção baseados em artefatos visuais e impacta diretamente o liveness detection e a verificação biométrica por vídeo." , titles: { es: "Haotian AI: deepfake facial en tiempo real sin glitches ni delays — ya opera en estafas globales desde compuestos en Camboya", en: "Haotian AI: real-time facial deepfake with no glitches or delays — already powering global scams from Cambodia compounds", pt: "Haotian AI: deepfake facial em tempo real sem falhas ou atrasos — já opera em golpes globais a partir de complexos no Camboja" } },
  "espana-estafas-bancarias-ia-apps-sms-may12": { es: "Las estafas bancarias en España rozaron los 500.000 casos en 2025 (5,3% más que el año anterior), con el importe medio de las transferencias fraudulentas creciendo un 42% hasta €2.347 por operación según el Banco de España y el Ministerio del Interior. Las técnicas evolucionaron: SMS que aparecen dentro del hilo legítimo del banco, apps de banca falsas con logos idénticos a los oficiales, y llamadas con voz clonada de representantes bancarios. El modelo de ataque ya no bypasea la seguridad bancaria — convence a la víctima de autorizar la operación ella misma, eludiendo los controles antifraude tradicionales.", en: "Banking fraud in Spain approached 500,000 cases in 2025 (up 5.3% year-over-year), with the average fraudulent transfer amount rising 42% to €2,347 per transaction, according to the Bank of Spain and the Ministry of the Interior. Attack techniques have evolved: SMS messages appearing within the bank's legitimate conversation thread, fake banking apps with identical official logos, and calls using cloned voices of bank representatives. The attack model no longer bypasses bank security — it convinces the victim to authorize the transaction themselves, circumventing traditional anti-fraud controls.", pt: "As fraudes bancárias na Espanha se aproximaram de 500.000 casos em 2025 (5,3% a mais do que o ano anterior), com o valor médio das transferências fraudulentas crescendo 42% para €2.347 por operação, segundo o Banco da Espanha e o Ministério do Interior. As técnicas evoluíram: SMS que aparecem dentro da conversa legítima do banco, aplicativos bancários falsos com logos idênticos aos oficiais e ligações com voz clonada de representantes bancários. O modelo de ataque já não contorna a segurança bancária — convence a própria vítima a autorizar a operação, burlando os controles antifraude tradicionais." , titles: { es: "España: estafas bancarias con apps falsas e IA que engañan hasta a expertos — 500.000 casos y transferencias 42% más altas", en: "Spain: banking scams with fake apps and AI that fool even experts — 500,000 cases and transfers 42% higher", pt: "Espanha: golpes bancários com apps falsos e IA que enganam até especialistas — 500.000 casos e transferências 42% mais altas" } },
  "appgate-fraud-beat-2026-latam": { es: "El informe Fraud Beat 2026 de AppGate registra crecimientos interanuales en fraude digital durante 2025: Venezuela +228%, Bolivia +170%, Costa Rica +89%, Brasil +53%, Chile +40%, El Salvador +28%. El patrón es consistente en todos: phishing para captura de identidad, account takeover y BEC para extracción de fondos, con el BEC creciendo 136% en el último trimestre de 2025. El fraude ya opera como una cadena industrializada que cubre desde la captura de identidad en redes sociales hasta el retiro de fondos.", en: "AppGate's Fraud Beat 2026 report records year-over-year growth in digital fraud throughout 2025: Venezuela +228%, Bolivia +170%, Costa Rica +89%, Brazil +53%, Chile +40%, El Salvador +28%. The pattern is consistent across all markets: phishing for identity capture, account takeover and BEC for fund extraction, with BEC growing 136% in the last quarter of 2025. Fraud now operates as an industrialized chain spanning from identity capture on social media to fund withdrawal.", pt: "O relatório Fraud Beat 2026 da AppGate registra crescimentos anuais no fraude digital ao longo de 2025: Venezuela +228%, Bolívia +170%, Costa Rica +89%, Brasil +53%, Chile +40%, El Salvador +28%. O padrão é consistente em todos: phishing para captura de identidade, account takeover e BEC para extração de fundos, com o BEC crescendo 136% no último trimestre de 2025. O fraude já opera como uma cadeia industrializada que vai desde a captura de identidade nas redes sociais até o saque dos fundos." , titles: { es: "Fraud Beat 2026 AppGate: 6 países de LATAM con crecimientos de fraude digital de hasta 228%", en: "AppGate Fraud Beat 2026: 6 LATAM Countries with Digital Fraud Growth of Up to 228%", pt: "Fraud Beat 2026 AppGate: 6 países da LATAM com crescimento de fraude digital de até 228%" } },
  "wso2-thunderid-agentic-ai-postquantum-may26": { es: "WSO2 contribuyó ThunderID a la OpenWallet Foundation como nueva pila IAM open source diseñada para agentes de IA y preparada para criptografía post-cuántica. La empresa expande su plataforma Agent Fabric —que habilita interacciones digitales autónomas en ecosistemas B2B— y refuerza su alianza con MOSIP para desplegar la plataforma eSignet de SSO e identidad en mercados emergentes. El movimiento apunta a convertirse en infraestructura de identidad base para la economía de agentes autónomos.", en: "WSO2 contributed ThunderID to the OpenWallet Foundation as a new open source IAM stack designed for AI agents and built for post-quantum cryptography. The company expands its Agent Fabric platform — which enables autonomous digital interactions in B2B ecosystems — and strengthens its alliance with MOSIP to deploy the eSignet SSO and identity platform in emerging markets. The move positions WSO2 as foundational identity infrastructure for the autonomous agent economy.", pt: "A WSO2 contribuiu o ThunderID para a OpenWallet Foundation como uma nova stack IAM open source projetada para agentes de IA e preparada para criptografia pós-quântica. A empresa expande sua plataforma Agent Fabric — que habilita interações digitais autônomas em ecossistemas B2B — e reforça sua aliança com a MOSIP para implantar a plataforma eSignet de SSO e identidade em mercados emergentes. O movimento visa se tornar infraestrutura de identidade base para a economia de agentes autônomos." , titles: { es: "WSO2 lanza ThunderID open source para agentes de IA: infraestructura de identidad post-cuántica contribuida a OpenWallet Foundation", en: "WSO2 Launches Open Source ThunderID for AI Agents: Post-Quantum Identity Infrastructure Contributed to OpenWallet Foundation", pt: "WSO2 lança ThunderID open source para agentes de IA: infraestrutura de identidade pós-quântica contribuída à OpenWallet Foundation" } },
  "deepfake-wave-digital-dam-may19": { es: "Datos de GetReal Security revelan que el 80% de las organizaciones ya encontró deepfakes o intentos de suplantación por IA, y el 45% los enfrenta frecuentemente; a USD 2.000/año, herramientas como Haotian AI ya son accesibles para atacantes no sofisticados. Gartner proyecta que el 40% de los gobiernos creará funciones dedicadas de TrustOps para 2028, trasladando la carga de verificación del usuario a la arquitectura institucional mediante proveniencia criptográfica. iProov lanzó Verified Meetings —autenticación biométrica de participantes en videollamadas— y GetReal Security amplió su plataforma con verificación de identidad continua, señalando que la identidad ya no puede limitarse al momento del login.", en: "Data from GetReal Security reveals that 80% of organizations have already encountered deepfakes or AI impersonation attempts, and 45% face them frequently; at USD 2,000/year, tools like Haotian AI are now accessible to unsophisticated attackers. Gartner projects that 40% of governments will create dedicated TrustOps functions by 2028, shifting the verification burden from the user to institutional architecture through cryptographic provenance. iProov launched Verified Meetings — biometric authentication of participants in video calls — and GetReal Security expanded its platform with continuous identity verification, signaling that identity can no longer be limited to the login moment.", pt: "Dados da GetReal Security revelam que 80% das organizações já encontraram deepfakes ou tentativas de suplantação por IA, e 45% as enfrentam com frequência; a USD 2.000/ano, ferramentas como Haotian AI já são acessíveis a atacantes sem sofisticação técnica. O Gartner projeta que 40% dos governos criarão funções dedicadas de TrustOps até 2028, transferindo a carga de verificação do usuário para a arquitetura institucional mediante proveniência criptográfica. A iProov lançou o Verified Meetings — autenticação biométrica de participantes em videochamadas — e a GetReal Security ampliou sua plataforma com verificação de identidade contínua, sinalizando que a identidade não pode mais se limitar ao momento do login." , titles: { es: "La ola deepfake supera las defensas digitales: el 45% de las organizaciones las enfrenta frecuentemente y Gartner exige TrustOps para 2028", en: "Deepfake Wave Overwhelms Digital Defenses: 45% of Organizations Hit Frequently as Gartner Mandates TrustOps by 2028", pt: "Onda de deepfakes supera as defesas digitais: 45% das organizações enfrentam ataques frequentes e Gartner exige TrustOps até 2028" } },
  "dhs-ice-smart-glasses-biometrics-field": { es: "El Departamento de Seguridad Nacional de EE.UU. incorporó en su presupuesto FY2027 USD 7,5 millones para desarrollar smart glasses que den a agentes de ICE acceso en tiempo real a biometría facial y dactilar en operaciones de campo. El dispositivo complementará Mobile Fortify —app de NEC ya en uso por ICE y CBP— que compara rostros contra repositorios de millones de pasaportes, visas y registros penales. El movimiento señala la agenda de DHS de hacer la identificación biométrica móvil y rutinaria más allá de los puestos fronterizos, con implicancias en flujos de identidad de migrantes de LATAM.", en: "The U.S. Department of Homeland Security included USD 7.5 million in its FY2027 budget to develop smart glasses giving ICE agents real-time access to facial and fingerprint biometrics during field operations. The device will complement Mobile Fortify — an NEC app already in use by ICE and CBP — which matches faces against repositories of millions of passports, visas, and criminal records. The move signals DHS's agenda to make biometric identification mobile and routine beyond border checkpoints, with implications for the identity flows of LATAM migrants.", pt: "O Departamento de Segurança Interna dos EUA incluiu USD 7,5 milhões em seu orçamento FY2027 para desenvolver smart glasses que dão aos agentes do ICE acesso em tempo real a biometria facial e dactilar em operações de campo. O dispositivo complementará o Mobile Fortify — aplicativo da NEC já em uso pelo ICE e CBP — que compara rostos com repositórios de milhões de passaportes, vistos e registros criminais. O movimento sinaliza a agenda do DHS de tornar a identificação biométrica móvel e rotineira além dos postos de fronteira, com implicações para os fluxos de identidade de migrantes da LATAM." , titles: { es: "DHS destina USD 7,5 millones a lentes inteligentes con reconocimiento facial para agentes de ICE en campo", en: "DHS Allocates $7.5 Million for Smart Glasses with Facial Recognition for ICE Field Agents", pt: "DHS destina USD 7,5 milhões a óculos inteligentes com reconhecimento facial para agentes do ICE em campo" } },
  "thomson-reuters-socure-fraud-prevention-may18": { es: "Thomson Reuters integró su plataforma CLEAR de verificación de identidad con RiskOS de Socure para ofrecer autenticación de identidad y prevención de fraude en tiempo real a sectores financiero, sanitario, legal y gubernamental. La alianza permite verificación de identidad instantánea y acelera el onboarding de clientes combinando datos públicos con modelos de IA; Socure asegura capturar hasta el 99% del fraude de identidad en sus implementaciones. La integración refleja la tendencia de consolidación en la que los grandes players de información corporativa se convierten también en plataformas de identidad —una presión competitiva que los actores locales de LATAM deberán considerar en sus propuestas de valor.", en: "Thomson Reuters integrated its CLEAR identity verification platform with Socure's RiskOS to offer real-time identity authentication and fraud prevention to the financial, healthcare, legal, and government sectors. The partnership enables instant identity verification and accelerates customer onboarding by combining public data with AI models; Socure claims to capture up to 99% of identity fraud in its deployments. The integration reflects the consolidation trend in which large corporate information players are also becoming identity platforms — a competitive pressure that LATAM local players will need to factor into their value propositions.", pt: "A Thomson Reuters integrou sua plataforma CLEAR de verificação de identidade com o RiskOS da Socure para oferecer autenticação de identidade e prevenção de fraude em tempo real aos setores financeiro, de saúde, jurídico e governamental. A parceria permite verificação de identidade instantânea e acelera o onboarding de clientes combinando dados públicos com modelos de IA; a Socure afirma capturar até 99% das fraudes de identidade em suas implementações. A integração reflete a tendência de consolidação em que grandes players de informação corporativa se tornam também plataformas de identidade — uma pressão competitiva que os players locais da LATAM precisarão considerar em suas propostas de valor." , titles: { es: "Thomson Reuters y Socure integran identidad y antifraude por IA para proteger a profesionales legales y financieros", en: "Thomson Reuters and Socure Integrate AI-Powered Identity and Fraud Prevention for Legal and Financial Professionals", pt: "Thomson Reuters e Socure integram identidade e antifraude por IA para profissionais jurídicos e financeiros" } },
  "idemia-clear-dot-motus-biometric-may21": { es: "El Departamento de Transporte de EE.UU. desplegó Motus, el nuevo sistema biométrico que reemplaza el Portal FMCSA —que permitía registro con solo nombre y email, habilitando identidades múltiples para evadir sanciones. IDEMIA Public Security provee el motor de matching facial y CLEAR aporta la analítica de detección de fraude; el sistema cruza el Drug and Alcohol Clearinghouse para bloquear conductores con sanciones activas. En los primeros días se registraron 50.000 carriers. El despliegue Motus es un caso de referencia para LATAM: mandatos regulatorios sectoriales que exigen biometría para combatir fraude de identidad en transporte y logística, donde plataformas como VU pueden replicar el modelo.", en: "The U.S. Department of Transportation deployed Motus, the new biometric system replacing the FMCSA Portal — which allowed registration with just a name and email, enabling multiple identities to evade sanctions. IDEMIA Public Security provides the facial matching engine and CLEAR contributes fraud detection analytics; the system cross-references the Drug and Alcohol Clearinghouse to block drivers with active sanctions. In its first days, 50,000 carriers registered. The Motus deployment is a reference case for LATAM: sector-specific regulatory mandates requiring biometrics to combat identity fraud in transportation and logistics, where platforms like VU can replicate the model.", pt: "O Departamento de Transportes dos EUA implantou o Motus, o novo sistema biométrico que substitui o Portal FMCSA — que permitia registro com apenas nome e e-mail, viabilizando múltiplas identidades para evadir sanções. A IDEMIA Public Security fornece o motor de matching facial e a CLEAR contribui com a análise de detecção de fraude; o sistema cruza o Drug and Alcohol Clearinghouse para bloquear motoristas com sanções ativas. Nos primeiros dias, 50.000 transportadoras se registraram. O deployment do Motus é um caso de referência para a LATAM: mandatos regulatórios setoriais que exigem biometria para combater fraude de identidade em transporte e logística, onde plataformas como a VU podem replicar o modelo." , titles: { es: "IDEMIA + CLEAR ganan el registro biométrico federal de camioneros en EE.UU.: 50.000 carriers en los primeros días, fin del fraude de identidad múltiple", en: "IDEMIA + CLEAR win U.S. federal biometric truck driver registration: 50,000 carriers in the first days, end of multiple-identity fraud", pt: "IDEMIA + CLEAR vencem registro biométrico federal de caminhoneiros nos EUA: 50.000 transportadoras nos primeiros dias, fim da fraude de identidade múltipla" } },
  "brazil-anpd-age-verification-consultation-jun01": { es: "La ANPD (Autoridade Nacional de Proteção de Dados) publicó el 1 de junio una guía actualizada de verificación de edad que distingue explícitamente este proceso de la verificación de identidad, e impone una cadena de responsabilidades digitales sobre tiendas de apps, sistemas operativos y plataformas de contenido. La consulta acepta comentarios hasta el 9 de julio de 2026 y contempla métodos biométricos como estimación de edad facial, verificación de documentos y matching facial. Para proveedores de identidad digital en LATAM, Brasil es el mercado más relevante con mayor urgencia regulatoria.", en: "Brazil's ANPD (National Data Protection Authority) published an updated age verification guidance on June 1 that explicitly distinguishes the process from identity verification, and places a chain of digital responsibilities on app stores, operating systems, and content platforms. The public consultation accepts comments until July 9, 2026, and covers biometric methods such as facial age estimation, document verification, and facial matching. For digital identity providers in LATAM, Brazil is the most relevant market with the highest regulatory urgency.", pt: "A ANPD (Autoridade Nacional de Proteção de Dados) publicou em 1º de junho um guia atualizado de verificação de idade que distingue explicitamente esse processo da verificação de identidade, e impõe uma cadeia de responsabilidades digitais sobre lojas de aplicativos, sistemas operacionais e plataformas de conteúdo. A consulta pública aceita comentários até 9 de julho de 2026 e contempla métodos biométricos como estimativa de idade facial, verificação de documentos e matching facial. Para provedores de identidade digital na LATAM, o Brasil é o mercado mais relevante e com maior urgência regulatória." , titles: { es: "Brasil abre consulta pública sobre verificación de edad con biometría bajo la Ley ECA Digital — plazo al 9 de julio", en: "Brazil opens public consultation on biometric age verification under the Digital ECA Law — deadline July 9", pt: "Brasil abre consulta pública sobre verificação de idade com biometria sob a Lei ECA Digital — prazo até 9 de julho" } },
  "irs-idme-biometric-retention-36m-may25": { es: "La propuesta del IRS extendería la retención de datos biométricos faciales bajo contratos con el proveedor privado ID.me hasta 36 meses después del cierre de cuenta, habilitando coincidencia uno-a-muchos para combatir el fraude fiscal impulsado por identidades sintéticas e IA. El organismo detectó 7,5 millones de declaraciones sospechosas en 2024-2025 y busca capacidades de auditoría y rastreo multi-año. Grupos de privacidad advierten que el cambio normaliza el almacenamiento prolongado de plantillas faciales en manos de terceros privados sin garantías de eliminación tras la transacción.", en: "The IRS proposal would extend facial biometric data retention under contracts with private vendor ID.me to 36 months after account closure, enabling one-to-many matching to combat tax fraud driven by synthetic identities and AI. The agency detected 7.5 million suspicious returns in 2024-2025 and is seeking multi-year audit and tracing capabilities. Privacy groups warn that the change normalizes prolonged storage of facial templates by private third parties with no deletion guarantees after the transaction.", pt: "A proposta do IRS estenderia a retenção de dados biométricos faciais sob contratos com o fornecedor privado ID.me para 36 meses após o encerramento da conta, habilitando correspondência um-para-muitos para combater a fraude fiscal impulsionada por identidades sintéticas e IA. O órgão detectou 7,5 milhões de declarações suspeitas em 2024-2025 e busca capacidades de auditoria e rastreamento multi-anual. Grupos de privacidade alertam que a mudança normaliza o armazenamento prolongado de templates faciais nas mãos de terceiros privados sem garantias de exclusão após a transação." , titles: { es: "IRS propone que ID.me retenga biometría de contribuyentes hasta 36 meses: reconocimiento facial como base anti-fraude fiscal", en: "IRS Proposes ID.me Retain Taxpayer Biometrics for Up to 36 Months: Facial Recognition as a Tax Fraud Database", pt: "IRS propõe que ID.me retenha biometria de contribuintes por até 36 meses: reconhecimento facial como base antifraude fiscal" } },
  "voxmind-voice-deepfake-funding-may27": { es: "La startup londinense Voxmind cerró una ronda pre-seed de £546.491 liderada por Ascension Ventures para comercializar su motor de extracción de frecuencias fonémicas con 99,8% de precisión en detección de deepfakes de voz en menos de 3 segundos. El timing es estratégico: Microsoft retiró Azure Speaker Recognition en septiembre 2025 y AWS cierra Voice ID en mayo 2026, dejando a empresas de servicios financieros, telecomunicaciones y contact centers sin solución de autenticación de voz nativa en la nube. El modelo opera en menos de 500MB sin GPU ni conectividad cloud, priorizando despliegue en dispositivos OEM con un acuerdo ya firmado con un proveedor Fortune 500 de hardware de comunicaciones.", en: "London-based startup Voxmind closed a £546,491 pre-seed round led by Ascension Ventures to commercialize its phonemic frequency extraction engine, which delivers 99.8% accuracy in voice deepfake detection in under 3 seconds. The timing is strategic: Microsoft retired Azure Speaker Recognition in September 2025 and AWS is closing Voice ID in May 2026, leaving financial services firms, telcos, and contact centers without a native cloud voice authentication solution. The model runs in under 500MB with no GPU or cloud connectivity required, prioritizing OEM device deployment with a signed agreement already in place with a Fortune 500 communications hardware provider.", pt: "A startup londrina Voxmind fechou uma rodada pré-seed de £546.491 liderada pela Ascension Ventures para comercializar seu motor de extração de frequências fonêmicas com 99,8% de precisão na detecção de deepfakes de voz em menos de 3 segundos. O timing é estratégico: a Microsoft encerrou o Azure Speaker Recognition em setembro de 2025 e a AWS fecha o Voice ID em maio de 2026, deixando empresas de serviços financeiros, telecomunicações e contact centers sem solução nativa de autenticação de voz na nuvem. O modelo opera em menos de 500MB sem GPU nem conectividade cloud, priorizando implantação em dispositivos OEM com um acordo já assinado com um fornecedor Fortune 500 de hardware de comunicações." , titles: { es: "Voxmind recauda £546k para detección de voz sintética mientras AWS y Azure abandonan el mercado de biometría de voz", en: "Voxmind Raises £546k for Synthetic Voice Detection as AWS and Azure Exit the Voice Biometrics Market", pt: "Voxmind capta £546k para detecção de voz sintética enquanto AWS e Azure abandonam o mercado de biometria de voz" } },
  "yubico-ingram-india-fips-may27": { es: "Yubico amplía distribución en India mediante acuerdo con Ingram Micro —presente en 40+ oficinas en el país— para llevar llaves de autenticación hardware al sector corporativo en finanzas, salud y gobierno. El YubiKey 5 FIPS Series obtiene validación FIPS 140-3 Nivel 2 y Nivel 3 de Seguridad Física, convirtiéndose en el único autenticador autorizado simultáneamente para credenciales PKI del Departamento de Defensa de EE.UU. y passkeys FIDO2. La certificación coincide con la presión regulatoria de mercados globales que exigen MFA resistente al phishing para acceso a sistemas críticos.", en: "Yubico expands distribution in India through an agreement with Ingram Micro — present in 40+ offices across the country — to bring hardware authentication keys to the corporate sector in finance, healthcare, and government. The YubiKey 5 FIPS Series achieves FIPS 140-3 Level 2 and Physical Security Level 3 validation, becoming the only authenticator simultaneously authorized for U.S. Department of Defense PKI credentials and FIDO2 passkeys. The certification aligns with regulatory pressure in global markets demanding phishing-resistant MFA for access to critical systems.", pt: "A Yubico expande a distribuição na Índia por meio de acordo com a Ingram Micro — presente em mais de 40 escritórios no país — para levar chaves de autenticação por hardware ao setor corporativo em finanças, saúde e governo. A série YubiKey 5 FIPS obtém validação FIPS 140-3 Nível 2 e Nível 3 de Segurança Física, tornando-se o único autenticador autorizado simultaneamente para credenciais PKI do Departamento de Defesa dos EUA e passkeys FIDO2. A certificação coincide com a pressão regulatória de mercados globais que exigem MFA resistente a phishing para acesso a sistemas críticos." , titles: { es: "YubiKey obtiene validación FIPS 140-3 y llega al mercado corporativo indio vía Ingram Micro ante creciente demanda de MFA anti-phishing", en: "YubiKey Achieves FIPS 140-3 Validation and Enters Indian Enterprise Market via Ingram Micro as Phishing-Resistant MFA Demand Grows", pt: "YubiKey obtém validação FIPS 140-3 e chega ao mercado corporativo indiano via Ingram Micro com demanda crescente por MFA resistente a phishing" } },
  "unico-kyc-siloed-fraud-report-may21": { es: "Un white paper de ID Tech y Unico revela que el fraude de nueva cuenta subió 31% interanual (5,4 millones de víctimas en 2025) mientras las instituciones tratan la pérdida crediticia —el síntoma— en vez del onboarding comprometido —el origen. Los modelos KYC 1:1 no detectan reutilización biométrica coordinada: Unico documentó casos donde una sola firma biométrica intentó apertura en más de 150 ocasiones en ~30 instituciones antes de ser detectada. El reporte aboga por arquitecturas \"network-aware\" con inteligencia compartida entre instituciones para detectar anillos de fraude e identidades sintéticas a escala —el mismo espacio que VU tiene en roadmap con Identity Link.", en: "A white paper by ID Tech and Unico reveals that new account fraud rose 31% year-over-year (5.4 million victims in 2025) while institutions address credit loss — the symptom — rather than compromised onboarding — the root cause. 1:1 KYC models fail to detect coordinated biometric reuse: Unico documented cases where a single biometric signature attempted account opening over 150 times across ~30 institutions before detection. The report advocates for network-aware architectures with cross-institutional shared intelligence to detect fraud rings and synthetic identities at scale — the same space VU has on its roadmap with Identity Link.", pt: "Um white paper da ID Tech e da Unico revela que a fraude de novas contas aumentou 31% ano a ano (5,4 milhões de vítimas em 2025), enquanto as instituições tratam a perda de crédito — o sintoma — em vez do onboarding comprometido — a origem. Os modelos KYC 1:1 não detectam reutilização biométrica coordenada: a Unico documentou casos em que uma única assinatura biométrica tentou abertura de conta mais de 150 vezes em ~30 instituições antes de ser detectada. O relatório defende arquiteturas \"network-aware\" com inteligência compartilhada entre instituições para detectar anéis de fraude e identidades sintéticas em escala — o mesmo espaço que a VU tem no roadmap com o Identity Link." , titles: { es: "Unico + ID Tech: los sistemas KYC en silos clasifican mal el fraude — un token biométrico intentó apertura en 30 instituciones", en: "Unico + ID Tech: siloed KYC systems misclassify fraud — one biometric token attempted onboarding at 30 institutions", pt: "Unico + ID Tech: sistemas KYC em silos classificam mal a fraude — um token biométrico tentou abertura em 30 instituições" } },
  "estonia-eudi-wallet-21m-may21": { es: "La Autoridad de Sistemas de Información de Estonia (RIA) lanzó una licitación de €21,65 millones para construir y operar una billetera de identidad digital nacional conforme a la arquitectura EUDI (European Digital Identity Wallet). El contrato abarca 96 meses —cinco años operativos post-lanzamiento— con entre tres y cinco empresas en la segunda etapa; plazo de presentación: 29 de junio de 2026. El movimiento consolida el giro de la UE desde pilotos hacia despliegues de producción en todos los estados miembros. Estonia —líder mundial en gobierno digital— marca el ritmo del estándar EUDI que llegará como referencia regulatoria a LATAM y presionará a los registros de identidad nacionales a adoptar modelos de credencial selectiva interoperable.", en: "Estonia's Information System Authority (RIA) launched a €21.65 million tender to build and operate a national digital identity wallet compliant with the EUDI (European Digital Identity Wallet) architecture. The contract spans 96 months — five operational years post-launch — with between three and five companies in the second stage; submission deadline: June 29, 2026. The move consolidates the EU's shift from pilots to production deployments across all member states. Estonia — a world leader in digital government — sets the pace for the EUDI standard that will arrive as a regulatory reference in LATAM and will pressure national identity registries to adopt interoperable selective credential models.", pt: "A Autoridade de Sistemas de Informação da Estônia (RIA) lançou uma licitação de €21,65 milhões para construir e operar uma carteira de identidade digital nacional em conformidade com a arquitetura EUDI (European Digital Identity Wallet). O contrato abrange 96 meses — cinco anos operacionais pós-lançamento — com entre três e cinco empresas na segunda etapa; prazo de submissão: 29 de junho de 2026. O movimento consolida a transição da UE de pilotos para implantações em produção em todos os estados-membros. A Estônia — líder mundial em governo digital — define o ritmo do padrão EUDI que chegará como referência regulatória à LATAM e pressionará os registros de identidade nacionais a adotar modelos de credencial seletiva interoperável." , titles: { es: "Estonia licita €21,65M para su billetera de identidad digital europea: de los pilotos a producción soberana con arquitectura EUDI", en: "Estonia Tenders €21.65M for Its European Digital Identity Wallet: From Pilots to Sovereign Production on EUDI Architecture", pt: "Estônia licita €21,65M para sua carteira de identidade digital europeia: dos pilotos à produção soberana com arquitetura EUDI" } },
  "cisa-github-contractor-identity-breach-jun01": { es: "Un repositorio público de GitHub mantenido por un empleado de Nightwing —contratista de CISA— expuso credenciales privilegiadas de cuentas AWS GovCloud, tokens de acceso y certificados SAML de Entra ID de la Agencia de Ciberseguridad de EE. UU. y del Departamento de Seguridad Nacional. El análisis del 1 de junio enmarca el incidente como falla estructural de gestión de identidades de contratistas: credenciales estáticas, secretos en texto plano y acceso administrativo de larga duración sin controles de rotación, señalando que incluso quienes definen los estándares de seguridad federal son vulnerables a este vector.", en: "A public GitHub repository maintained by a Nightwing employee — a CISA contractor — exposed privileged AWS GovCloud account credentials, access tokens, and Entra ID SAML certificates belonging to the US Cybersecurity and Infrastructure Security Agency and the Department of Homeland Security. The June 1 analysis frames the incident as a structural failure in contractor identity management: static credentials, plaintext secrets, and long-lived administrative access without rotation controls, underscoring that even those who set federal security standards are vulnerable to this attack vector.", pt: "Um repositório público do GitHub mantido por um funcionário da Nightwing — contratada da CISA — expôs credenciais privilegiadas de contas AWS GovCloud, tokens de acesso e certificados SAML do Entra ID pertencentes à Agência de Cibersegurança e Infraestrutura dos EUA e ao Departamento de Segurança Interna. A análise de 1 de junho enquadra o incidente como uma falha estrutural na gestão de identidades de contratados: credenciais estáticas, segredos em texto simples e acesso administrativo de longa duração sem controles de rotação, evidenciando que até mesmo quem define os padrões de segurança federal é vulnerável a esse vetor." , titles: { es: "Credenciales AWS GovCloud de CISA expuestas en GitHub público por contratista: falla sistémica de gestión de identidades", en: "CISA's AWS GovCloud Credentials Exposed on Public GitHub by Contractor: Systemic Identity Management Failure", pt: "Credenciais AWS GovCloud da CISA expostas no GitHub público por contratado: falha sistêmica na gestão de identidades" } },
  "infobae-mundial-fifa-estafa-may27": { es: "Kaspersky y KnowBe4 detectaron una escalada de campañas de fraude que explotan la fiebre mundialista mediante sitios clonados de FIFA, correos con premios falsos de hasta USD 500.000 y plataformas de entradas fraudulentas que capturan credenciales bancarias e identidades digitales. FIFA adoptó exclusivamente entradas digitales con QR dinámicos vía su app oficial para 2026, lo que convierte en automáticamente fraudulenta cualquier oferta de entradas físicas o por canales no oficiales. Los países más afectados incluyen Argentina, México, Colombia, España, Perú, Venezuela y Ecuador, con técnicas que combinan ingeniería social, IA y presión temporal.", en: "Kaspersky and KnowBe4 detected an escalation of fraud campaigns exploiting World Cup fever through cloned FIFA sites, emails offering fake prizes of up to USD 500,000, and fraudulent ticketing platforms that harvest banking credentials and digital identities. FIFA adopted exclusively digital tickets with dynamic QR codes via its official app for 2026, making any offer of physical tickets or through unofficial channels automatically fraudulent. The most affected countries include Argentina, Mexico, Colombia, Spain, Peru, Venezuela, and Ecuador, with techniques combining social engineering, AI, and time pressure.", pt: "Kaspersky e KnowBe4 detectaram uma escalada de campanhas de fraude que exploram a febre da Copa do Mundo por meio de sites clonados da FIFA, e-mails com prêmios falsos de até USD 500.000 e plataformas fraudulentas de ingressos que capturam credenciais bancárias e identidades digitais. A FIFA adotou exclusivamente ingressos digitais com QR codes dinâmicos via seu app oficial para 2026, tornando automaticamente fraudulenta qualquer oferta de ingressos físicos ou por canais não oficiais. Os países mais afetados incluem Argentina, México, Colômbia, Espanha, Peru, Venezuela e Equador, com técnicas que combinam engenharia social, IA e pressão temporal." , titles: { es: "Copa Mundial 2026: oleada de phishing promete USD 500.000 en premios falsos para vaciar cuentas bancarias", en: "2026 World Cup: Phishing wave promises $500K in fake prizes to drain bank accounts", pt: "Copa do Mundo 2026: onda de phishing promete USD 500.000 em prêmios falsos para esvaziar contas bancárias" } },
  "nginx-cve-2026-42945-exploit-wild-may17": { es: "La vulnerabilidad CVE-2026-42945 (CVSS 9.2), un heap buffer overflow de 18 años en el módulo ngx_http_rewrite_module de NGINX, entró bajo explotación activa días después de su divulgación pública. El fallo afecta las versiones 0.6.27–1.30.0 y permite a atacantes no autenticados crashear workers (DoS trivial) o, en sistemas sin ASLR activo, ejecutar código arbitrario con una sola petición HTTP maliciosa. Bancos, fintechs, proveedores de KYC/CIAM y toda organización que corra NGINX sin parchear están en riesgo inmediato.", en: "CVE-2026-42945 (CVSS 9.2), an 18-year-old heap buffer overflow in NGINX's ngx_http_rewrite_module, entered active exploitation days after public disclosure. The flaw affects versions 0.6.27–1.30.0 and allows unauthenticated attackers to crash workers (trivial DoS) or, on systems without active ASLR, execute arbitrary code with a single malicious HTTP request. Banks, fintechs, KYC/CIAM providers, and any organization running unpatched NGINX face immediate risk.", pt: "A vulnerabilidade CVE-2026-42945 (CVSS 9.2), um heap buffer overflow de 18 anos no módulo ngx_http_rewrite_module do NGINX, entrou em exploração ativa dias após sua divulgação pública. A falha afeta as versões 0.6.27–1.30.0 e permite que atacantes não autenticados derrubem workers (DoS trivial) ou, em sistemas sem ASLR ativo, executem código arbitrário com uma única requisição HTTP maliciosa. Bancos, fintechs, provedores de KYC/CIAM e qualquer organização que execute o NGINX sem o patch aplicado estão em risco imediato." , titles: { es: "CVE-2026-42945 (NGINX Rift) bajo explotación activa: DoS garantizado y RCE potencial en millones de servidores web", en: "CVE-2026-42945 (NGINX Rift) Under Active Exploitation: Guaranteed DoS and Potential RCE on Millions of Web Servers", pt: "CVE-2026-42945 (NGINX Rift) sob exploração ativa: DoS garantido e RCE potencial em milhões de servidores web" } },
  "palo-alto-cve-2026-0300-panos": { es: "Un buffer overflow en el portal de autenticación User-ID de PAN-OS permite ejecutar código arbitrario con privilegios root en firewalls PA-Series y VM-Series expuestos a internet. CISA incorporó la CVE al catálogo KEV el 6 de mayo exigiendo remediación antes del 9 de mayo; la explotación activa es atribuida al grupo CL-STA-1132 (presunto origen estatal). Los parches no estarán disponibles hasta el 13 de mayo, dejando una ventana de exposición en redes de clientes de banca y gobierno.", en: "A buffer overflow in PAN-OS's User-ID authentication portal allows arbitrary code execution with root privileges on internet-exposed PA-Series and VM-Series firewalls. CISA added the CVE to the KEV catalog on May 6, requiring remediation by May 9; active exploitation is attributed to group CL-STA-1132 (suspected state-sponsored origin). Patches will not be available until May 13, leaving an exposure window across banking and government client networks.", pt: "Um buffer overflow no portal de autenticação User-ID do PAN-OS permite execução de código arbitrário com privilégios root em firewalls PA-Series e VM-Series expostos à internet. A CISA adicionou a CVE ao catálogo KEV em 6 de maio, exigindo remediação até 9 de maio; a exploração ativa é atribuída ao grupo CL-STA-1132 (presumida origem estatal). Os patches não estarão disponíveis até 13 de maio, deixando uma janela de exposição nas redes de clientes de bancos e governo." , titles: { es: "CVE-2026-0300 (CVSS 9.3): RCE sin autenticación en firewalls Palo Alto — explotado activamente, parches recién el 13 de mayo", en: "CVE-2026-0300 (CVSS 9.3): Unauthenticated RCE in Palo Alto firewalls — actively exploited, patches only on May 13", pt: "CVE-2026-0300 (CVSS 9.3): RCE sem autenticação em firewalls Palo Alto — exploração ativa, patches apenas em 13 de maio" } },
  "uk-digital-id-starmer-crisis-may18": { es: "El Digital Access to Services Bill —presentado en el King's Speech del 13 de mayo para crear un sistema voluntario de identidad digital en el Reino Unido— enfrenta incertidumbre legislativa tras la crisis política del primer ministro Keir Starmer, presionado a dimitir por más de 90 diputados de su propio partido. La ley busca reducir el fraude de identidad de £1.800 millones anuales, pero fue modificada de obligatoria a voluntaria en enero bajo presión de grupos civiles y su futuro parlamentario está en duda. Para diseñadores de marcos de identidad digital soberana en LATAM, el caso ilustra la fragilidad de los proyectos de ID cuando están atados a ciclos políticos.", en: "The Digital Access to Services Bill — introduced in the King's Speech on May 13 to create a voluntary digital identity system in the UK — faces legislative uncertainty following the political crisis surrounding Prime Minister Keir Starmer, who is under pressure to resign from more than 90 members of his own party. The bill aims to reduce identity fraud of £1.8 billion annually, but was amended from mandatory to voluntary in January under pressure from civil society groups, and its parliamentary future is now in question. For designers of sovereign digital identity frameworks in LATAM, the case illustrates how fragile ID initiatives can be when tied to political cycles.", pt: "O Digital Access to Services Bill — apresentado no King's Speech de 13 de maio para criar um sistema voluntário de identidade digital no Reino Unido — enfrenta incerteza legislativa após a crise política do primeiro-ministro Keir Starmer, pressionado a renunciar por mais de 90 deputados de seu próprio partido. A lei busca reduzir a fraude de identidade de £1,8 bilhão anuais, mas foi alterada de obrigatória para voluntária em janeiro sob pressão de grupos da sociedade civil, e seu futuro parlamentar está em dúvida. Para designers de marcos de identidade digital soberana na LATAM, o caso ilustra a fragilidade dos projetos de ID quando atrelados a ciclos políticos." , titles: { es: "La crisis política de Starmer amenaza la Ley de Identidad Digital del Reino Unido: más de 90 laboristas piden su renuncia", en: "Starmer's Political Crisis Threatens UK Digital Identity Bill: Over 90 Labour MPs Call for His Resignation", pt: "Crise política de Starmer ameaça a Lei de Identidade Digital do Reino Unido: mais de 90 trabalhistas pedem sua renúncia" } },
  "fico-mitek-mivip-marketplace-may13": { es: "Mitek anunció la integración de su plataforma MiVIP —verificación de documentos, biometría facial, liveness pasivo y defensa contra deepfakes— en el FICO Platform Marketplace, permitiendo a instituciones financieras embeber verificación de identidad en sus flujos de decisión crediticia y gestión de riesgo. La integración sigue una alianza previa de Mitek con PingOne DaVinci. El movimiento consolida a FICO como plataforma orquestadora de scoring + identidad en banca — un modelo que los bancos latinoamericanos que ya usan FICO como motor de scoring evaluarán rápidamente como complemento a sus flujos de KYC.", en: "Mitek announced the integration of its MiVIP platform — document verification, facial biometrics, passive liveness, and deepfake defense — into the FICO Platform Marketplace, enabling financial institutions to embed identity verification into their credit decisioning and risk management workflows. The integration follows a prior Mitek alliance with PingOne DaVinci. The move consolidates FICO as an orchestration platform for scoring plus identity in banking — a model that Latin American banks already using FICO as their scoring engine will quickly evaluate as a complement to their KYC flows.", pt: "A Mitek anunciou a integração de sua plataforma MiVIP — verificação de documentos, biometria facial, liveness passivo e defesa contra deepfakes — no FICO Platform Marketplace, permitindo que instituições financeiras incorporem verificação de identidade em seus fluxos de decisão de crédito e gestão de risco. A integração segue uma aliança anterior da Mitek com o PingOne DaVinci. O movimento consolida a FICO como plataforma orquestradora de scoring + identidade no setor bancário — um modelo que os bancos latino-americanos que já utilizam a FICO como motor de scoring avaliarão rapidamente como complemento aos seus fluxos de KYC." , titles: { es: "FICO integra verificación biométrica de Mitek en su marketplace: KYC embebido en la decisión crediticia", en: "FICO integrates Mitek biometric verification into its marketplace: KYC embedded in credit decisioning", pt: "FICO integra verificação biométrica da Mitek em seu marketplace: KYC embutido na decisão de crédito" } },
  "lseg-daon-fourthline-continuous-identity-jun26": { es: "Tres actores del ecosistema de identidad presentaron iniciativas para reemplazar la verificación puntual por modelos continuos: LSEG lanzó Identity Gateway cubriendo 10 mercados europeos y prometiendo reducir el time-to-market un 80-90%; Daon se integró con ebankIT embebiendo biometría y liveness detection en APIs bancarias; y Fourthline firmó con Anyfin para expansión europea. La tendencia responde al auge del fraude por identidades sintéticas y deepfakes que hacen insuficiente la verificación one-time.", en: "Three identity ecosystem players announced initiatives to replace point-in-time verification with continuous models: LSEG launched Identity Gateway covering 10 European markets and promising to reduce time-to-market by 80-90%; Daon integrated with ebankIT to embed biometrics and liveness detection into banking APIs; and Fourthline signed with Anyfin for European expansion. The trend is driven by the rise of synthetic identity fraud and deepfakes that render one-time verification insufficient.", pt: "Três players do ecossistema de identidade apresentaram iniciativas para substituir a verificação pontual por modelos contínuos: a LSEG lançou o Identity Gateway cobrindo 10 mercados europeus e prometendo reduzir o time-to-market em 80-90%; a Daon se integrou com a ebankIT para embutir biometria e liveness detection em APIs bancárias; e a Fourthline assinou com a Anyfin para expansão europeia. A tendência é impulsionada pelo aumento da fraude por identidades sintéticas e deepfakes, que tornam insuficiente a verificação one-time." , titles: { es: "LSEG, Daon y Fourthline impulsan la verificación de identidad continua más allá de los controles puntuales", en: "LSEG, Daon and Fourthline Push Continuous Identity Verification Beyond One-Time Checks", pt: "LSEG, Daon e Fourthline impulsionam verificação de identidade contínua além dos controles pontuais" } },
  "ping-identity-agentic-enterprise-control-plane-may27": { es: "Ping Identity anunció tres nuevas capacidades: Programmable Identity (interfaces headless AI-first con CLI y MCP), Agent Discovery and Governance (ciclo de vida y responsabilidad para agentes de IA), y Privileged Access for Desktop Agents (acceso just-in-time sin exponer secretos). La propuesta posiciona a la identidad como plano de control universal para entornos con más agentes de IA que usuarios humanos.", en: "Ping Identity announced three new capabilities: Programmable Identity (headless AI-first interfaces with CLI and MCP), Agent Discovery and Governance (lifecycle and accountability for AI agents), and Privileged Access for Desktop Agents (just-in-time access without exposing secrets). The offering positions identity as the universal control plane for environments where AI agents outnumber human users.", pt: "A Ping Identity anunciou três novas capacidades: Programmable Identity (interfaces headless AI-first com CLI e MCP), Agent Discovery and Governance (ciclo de vida e responsabilidade para agentes de IA) e Privileged Access for Desktop Agents (acesso just-in-time sem expor segredos). A proposta posiciona a identidade como plano de controle universal para ambientes com mais agentes de IA do que usuários humanos." , titles: { es: "Ping Identity redefine el plano de control de identidad para la empresa agéntica", en: "Ping Identity Redefines the Identity Control Plane for the Agentic Enterprise", pt: "Ping Identity redefine o plano de controle de identidade para a empresa agêntica" } },
  "entrust-identity-fraud-report-2026-may28": { es: "El séptimo informe anual de fraude de identidad de Entrust documenta que los deepfakes ya representan el 20% de todos los intentos de fraude biométrico, con selfies deepfakeadas creciendo 58% en 2025. Los ataques de inyección aumentaron 40% interanual, permitiendo a los atacantes eludir la captura en vivo durante el onboarding digital. Los documentos de identidad nacionales representan el 46% de los documentos fraudulentos presentados globalmente.", en: "Entrust's seventh annual identity fraud report documents that deepfakes now account for 20% of all biometric fraud attempts, with deepfaked selfies growing 58% in 2025. Injection attacks increased 40% year-over-year, enabling attackers to bypass liveness capture during digital onboarding. National identity documents represent 46% of fraudulent documents submitted globally.", pt: "O sétimo relatório anual de fraude de identidade da Entrust documenta que os deepfakes já representam 20% de todas as tentativas de fraude biométrica, com selfies deepfakeadas crescendo 58% em 2025. Os ataques de injeção aumentaram 40% em relação ao ano anterior, permitindo que atacantes contornem a captura de liveness durante o onboarding digital. Os documentos de identidade nacionais representam 46% dos documentos fraudulentos apresentados globalmente." , titles: { es: "Reporte Entrust 2026: los deepfakes representan 1 de cada 5 intentos de fraude biométrico; los injection attacks suben 40%", en: "Entrust 2026 Report: Deepfakes Account for 1 in 5 Biometric Fraud Attempts; Injection Attacks Up 40%", pt: "Relatório Entrust 2026: deepfakes representam 1 em cada 5 tentativas de fraude biométrica; ataques de injeção sobem 40%" } },
  "face-morph-detection-eab-border-may26": { es: "Investigadores presentaron nuevos desarrollos en detección de ataques de morfo facial en un workshop de la Asociación Europea de Biometría (EAB). Los morfos generados con modelos de difusión alcanzan hasta 99,8% de efectividad en evasión, mientras que inspectores fronterizos sin entrenamiento aceptan como válidos dos tercios de los casos y solo mejoran un 10% tras capacitación. La competencia de detección basada en video V-MAD en IJCB 2026 recibió 24 submissions, evidenciando la urgencia de datasets y estándares más robustos.", en: "Researchers presented new developments in facial morph attack detection at a workshop by the European Association for Biometrics (EAB). Morphs generated with diffusion models achieve up to 99.8% evasion effectiveness, while untrained border inspectors accept two-thirds of cases as valid and improve only 10% after training. The video-based detection competition V-MAD at IJCB 2026 received 24 submissions, highlighting the urgent need for more robust datasets and standards.", pt: "Pesquisadores apresentaram novos desenvolvimentos em detecção de ataques de morfo facial em um workshop da Associação Europeia de Biometria (EAB). Morfos gerados com modelos de difusão atingem até 99,8% de eficácia de evasão, enquanto inspetores de fronteira sem treinamento aceitam como válidos dois terços dos casos e melhoram apenas 10% após capacitação. A competição de detecção baseada em vídeo V-MAD no IJCB 2026 recebeu 24 submissões, evidenciando a urgência de datasets e padrões mais robustos." , titles: { es: "Avances en detección de ataques de morfo facial ofrecen esperanza para la seguridad fronteriza biométrica", en: "Advances in Face Morph Attack Detection Offer Hope for Biometric Border Security", pt: "Avanços na detecção de ataques de morfo facial trazem esperança para a segurança biométrica de fronteiras" } },
  "philippines-biometrics-otp-fraud-may26": { es: "El Banco Central de Filipinas impulsa la verificación biométrica obligatoria para banca digital luego de que el fraude se triplicara a 10.004 casos con pérdidas de USD 11,4 millones en 2024. El referente regional es Vietnam, donde la obligatoriedad biométrica en 2024 reveló que 86 de 200 millones de cuentas eran ficticias y redujo el fraude individual un 59%. El 58% de adultos filipinos tiene ahora cuenta financiera (vs. 51% antes), ampliando la superficie de ataque y la urgencia de autenticación robusta frente a OTP comprometibles.", en: "The Central Bank of the Philippines is pushing mandatory biometric verification for digital banking after fraud tripled to 10,004 cases with losses of USD 11.4 million in 2024. The regional benchmark is Vietnam, where mandatory biometrics in 2024 revealed that 86 out of 200 million accounts were fictitious and reduced individual fraud by 59%. With 58% of Filipino adults now holding a financial account (vs. 51% previously), the attack surface is expanding, underscoring the urgency of robust authentication over compromisable OTPs.", pt: "O Banco Central das Filipinas impulsiona a verificação biométrica obrigatória para o setor bancário digital após a triplicação das fraudes, que chegaram a 10.004 casos com perdas de USD 11,4 milhões em 2024. O referencial regional é o Vietnã, onde a obrigatoriedade biométrica em 2024 revelou que 86 de 200 milhões de contas eram fictícias e reduziu a fraude individual em 59%. Com 58% dos adultos filipinos com conta financeira (ante 51%), a superfície de ataque se amplia, reforçando a urgência de autenticação robusta frente a OTPs comprometíveis." , titles: { es: "Filipinas acelera adopción biométrica en banca digital: Vietnam redujo 59% el fraude individual tras implementación obligatoria", en: "Philippines Accelerates Biometric Adoption in Digital Banking: Vietnam Cut Individual Fraud 59% After Mandatory Rollout", pt: "Filipinas acelera adoção biométrica na banca digital: Vietnã reduziu 59% da fraude individual após implementação obrigatória" } },
  "espana-fraude-bancario-smishing-barcelona-jun26": { es: "La Policía española detuvo a 23 personas en Barcelona y Murcia por un fraude bancario que causó pérdidas de 300.000 euros en 48 denuncias. Los delincuentes usaban aplicaciones de spoofing para suplantar el número telefónico de entidades bancarias, enviaban SMS con links a sitios clonados y convencían a las víctimas de compartir credenciales o realizar transferencias bajo pretexto de transacciones no autorizadas. El patrón smishing y vishing con cuentas mulas es idéntico al documentado en Argentina y México.", en: "Spanish police arrested 23 people in Barcelona and Murcia for a banking fraud scheme that caused losses of €300,000 across 48 complaints. The perpetrators used spoofing applications to impersonate bank phone numbers, sent SMS messages with links to cloned sites, and convinced victims to share credentials or authorize transfers under the pretense of unauthorized transactions. The smishing and vishing pattern using mule accounts is identical to cases documented in Argentina and Mexico.", pt: "A Polícia espanhola prendeu 23 pessoas em Barcelona e Múrcia por um esquema de fraude bancária que causou prejuízos de 300.000 euros em 48 denúncias. Os criminosos usavam aplicativos de spoofing para se passar pelo número de telefone de instituições bancárias, enviavam SMS com links para sites clonados e convenciam as vítimas a compartilhar credenciais ou realizar transferências sob o pretexto de transações não autorizadas. O padrão de smishing e vishing com contas laranja é idêntico ao documentado na Argentina e no México." , titles: { es: "España: 23 detenidos por fraude bancario de 300.000 euros con smishing y vishing en Barcelona y Murcia", en: "Spain: 23 Arrested for €300,000 Banking Fraud Using Smishing and Vishing in Barcelona and Murcia", pt: "Espanha: 23 detidos por fraude bancária de 300.000 euros com smishing e vishing em Barcelona e Múrcia" } },
  "stranieri-buffett-deepfake": { es: "En la asamblea de Berkshire del 2 de mayo, Greg Abel abrió el Q&A con un deepfake del propio Warren Buffett generado solo con material público. El CEO de VU levantó el caso en LinkedIn: \"una cara y una voz pueden ser técnicamente correctas, pero no reales\". La identidad como sistema continuo — comportamiento + dispositivo + transacción + liveness — es lo que la industria todavía está construyendo.", en: "At the May 2 Berkshire shareholder meeting, Greg Abel opened the Q&A with a deepfake of Warren Buffett himself, generated solely from public material. VU's CEO raised the case on LinkedIn: \"a face and a voice can be technically correct, but not real.\" Identity as a continuous system — behavior + device + transaction + liveness — is what the industry is still building.", pt: "Na assembleia da Berkshire de 2 de maio, Greg Abel abriu o Q&A com um deepfake do próprio Warren Buffett gerado apenas com material público. O CEO da VU destacou o caso no LinkedIn: \"um rosto e uma voz podem ser tecnicamente corretos, mas não reais\". A identidade como sistema contínuo — comportamento + dispositivo + transação + liveness — é o que a indústria ainda está construindo." , titles: { es: "Stranieri sobre el deepfake de Buffett en Berkshire: "asumir confianza sin contexto es el problema"", en: "Stranieri on Buffett's Berkshire deepfake: "Assuming trust without context is the problem"", pt: "Stranieri sobre o deepfake de Buffett na Berkshire: "assumir confiança sem contexto é o problema"" } },
  "peru-sismate-hack-alerta-falsa-may21": { es: "El 20 de mayo entre las 19 y 20 hs, el grupo hackivista \"Deface Perú\" accedió a la cuenta del proveedor Everbridge del Sismate —el sistema de mensajería de alerta temprana del Ministerio de Transportes y Comunicaciones del Perú— y difundió una falsa alerta de terremoto 8,7 con amenaza de tsunami en la costa central, seguida de mensajes políticos que mencionaban \"fraude electoral\" y al streamer Curwen, a días de la segunda vuelta presidencial del 7 de junio. El Sismate opera vía Cell Broadcast, que llega a millones de dispositivos sin requerir internet. El incidente expone la vulnerabilidad de infraestructura crítica de emergencias ante ataques a cuentas de proveedores y es parte de un historial de ataques de Deface Perú a plataformas gubernamentales desde 2024.", en: "On May 20 between 7 and 8 PM, the hacktivist group \"Deface Perú\" accessed the Everbridge vendor account for Sismate — Peru's Ministry of Transport and Communications early-warning messaging system — and broadcast a fake magnitude 8.7 earthquake alert with a tsunami threat for the central coast, followed by political messages referencing \"electoral fraud\" and streamer Curwen, days before the June 7 presidential runoff. Sismate operates via Cell Broadcast, reaching millions of devices without requiring internet connectivity. The incident exposes the vulnerability of critical emergency infrastructure to vendor account attacks and is part of Deface Perú's history of targeting government platforms since 2024.", pt: "Em 20 de maio, entre 19h e 20h, o grupo hacktivista \"Deface Perú\" acessou a conta do fornecedor Everbridge do Sismate — o sistema de mensagens de alerta precoce do Ministério de Transportes e Comunicações do Peru — e difundiu um falso alerta de terremoto magnitude 8,7 com ameaça de tsunami no litoral central, seguido de mensagens políticas mencionando \"fraude eleitoral\" e o streamer Curwen, a dias do segundo turno presidencial de 7 de junho. O Sismate opera via Cell Broadcast, alcançando milhões de dispositivos sem necessidade de internet. O incidente expõe a vulnerabilidade da infraestrutura crítica de emergências a ataques a contas de fornecedores e integra um histórico de ataques do Deface Perú a plataformas governamentais desde 2024." , titles: { es: "Hackeo al Sismate: alerta falsa de terremoto llega a millones de celulares en Perú", en: "Sismate Hack: Fake Earthquake Alert Reaches Millions of Phones in Peru", pt: "Hack ao Sismate: alerta falso de terremoto chega a milhões de celulares no Peru" } },
  "australia-vc-trust-framework-may25": { es: "El Departamento de Finanzas de Australia abrió una consulta pública hasta el 3 de julio de 2026 sobre el Commonwealth VC Trust Framework, que cubre nueve áreas: emisores, verificadores, billeteras digitales, servicios de confianza, privacidad, voluntariedad, interoperabilidad y seguridad. El sistema se integra al Australian Government Digital ID System (AGDIS) con estándares ISO y sigue la estrategia de identidad digital publicada en marzo 2026. La arquitectura de credenciales verificables interoperables con divulgación selectiva es el modelo que los marcos regulatorios de LATAM siguen con creciente atención.", en: "Australia's Department of Finance opened a public consultation through July 3, 2026 on the Commonwealth VC Trust Framework, covering nine areas: issuers, verifiers, digital wallets, trust services, privacy, voluntariness, interoperability, and security. The system integrates with the Australian Government Digital ID System (AGDIS) under ISO standards and follows the digital identity strategy published in March 2026. The interoperable verifiable credentials architecture with selective disclosure is the model LATAM regulatory frameworks are following with growing attention.", pt: "O Departamento de Finanças da Austrália abriu uma consulta pública até 3 de julho de 2026 sobre o Commonwealth VC Trust Framework, que abrange nove áreas: emissores, verificadores, carteiras digitais, serviços de confiança, privacidade, voluntariedade, interoperabilidade e segurança. O sistema se integra ao Australian Government Digital ID System (AGDIS) com padrões ISO e segue a estratégia de identidade digital publicada em março de 2026. A arquitetura de credenciais verificáveis interoperáveis com divulgação seletiva é o modelo que os marcos regulatórios da LATAM acompanham com atenção crescente." , titles: { es: "Australia abre consulta pública sobre credenciales verificables y marco de confianza nacional: referencia regulatoria para LATAM", en: "Australia Opens Public Consultation on Verifiable Credentials and National Trust Framework: A Regulatory Reference for LATAM", pt: "Austrália abre consulta pública sobre credenciais verificáveis e marco de confiança nacional: referência regulatória para a LATAM" } },
  "google-android-deepfake-call-detection-jun03": { es: "Google activó la función 'fake call detection' en Android 12+ de forma global por defecto, comenzando con dispositivos Pixel, usando un apretón de manos cifrado sobre RCS para verificar si el llamante es quien dice ser. Si detecta suplantación, muestra una alerta en pantalla antes de que el usuario responda. La medida responde a pérdidas globales de USD 440 mil millones por fraude de suplantación en 2025, según INTERPOL.", en: "Google enabled the 'fake call detection' feature globally by default on Android 12+, starting with Pixel devices, using an encrypted handshake over RCS to verify whether the caller is who they claim to be. If impersonation is detected, an on-screen alert appears before the user answers. The move responds to global losses of USD 440 billion from impersonation fraud in 2025, according to INTERPOL.", pt: "O Google ativou globalmente por padrão o recurso 'fake call detection' no Android 12+, começando pelos dispositivos Pixel, utilizando um handshake cifrado sobre RCS para verificar se o chamador é quem diz ser. Se for detectada suplantação de identidade, um alerta aparece na tela antes de o usuário atender. A medida responde a perdas globais de USD 440 bilhões por fraude de suplantação em 2025, segundo a INTERPOL." , titles: { es: "Google activa protección contra llamadas deepfake en Android a nivel global para combatir fraude por voz con IA", en: "Google Rolls Out Global Android Protection Against Deepfake Calls to Counter AI Voice Fraud", pt: "Google ativa proteção contra chamadas deepfake no Android globalmente para combater fraude de voz com IA" } },
  "dashlane-brute-force-2fa-vaults-jun26": { es: "El 31 de mayo de 2026, actores externos lanzaron un ataque de fuerza bruta contra el sistema de autenticación de dos factores de Dashlane, logrando acceder a aproximadamente 20 cuentas y descargar copias de sus bóvedas de contraseñas cifradas. Las bóvedas contienen contraseñas y credenciales sensibles de los usuarios, aunque Dashlane asegura que solo pueden descifrarse con la contraseña maestra del cliente. La compañía notificó directamente a los afectados y señaló que usuarios con contraseñas maestras débiles corren mayor riesgo.", en: "On May 31, 2026, external threat actors launched a brute-force attack against Dashlane's two-factor authentication system, gaining access to approximately 20 accounts and downloading copies of their encrypted password vaults. The vaults contain users' passwords and sensitive credentials, though Dashlane states they can only be decrypted with the customer's master password. The company notified affected users directly and noted that those with weak master passwords face greater risk.", pt: "Em 31 de maio de 2026, agentes externos lançaram um ataque de força bruta contra o sistema de autenticação de dois fatores da Dashlane, conseguindo acessar aproximadamente 20 contas e baixar cópias de seus cofres de senhas cifrados. Os cofres contêm senhas e credenciais sensíveis dos usuários, embora a Dashlane afirme que só podem ser decifrados com a senha mestra do cliente. A empresa notificou diretamente os afetados e sinalizou que usuários com senhas mestras fracas correm maior risco." , titles: { es: "Dashlane sufre ataque de fuerza bruta que vulnera 2FA y expone bóvedas de contraseñas cifradas", en: "Dashlane Hit by Brute-Force Attack That Bypasses 2FA and Exposes Encrypted Password Vaults", pt: "Dashlane sofre ataque de força bruta que contorna 2FA e expõe cofres de senhas criptografadas" } },
  "idemia-nist-elft-fingerprint-speed-jun26": { es: "Idemia Public Security alcanzó el primer puesto en velocidad de procesamiento en la evaluación NIST ELFT de huellas dactilares latentes, completando búsquedas en aproximadamente 2 minutos frente a los 6 minutos del siguiente competidor. Su algoritmo idemia+0008 logró una tasa Rank-1 Hit de 96,1%, aunque competidores ROC e Innovatrics registraron tasas de precisión superiores (98,2% y 98,6%). El resultado posiciona a Idemia con ventaja operacional de velocidad en un mercado donde la precisión entre vendors converge.", en: "Idemia Public Security ranked first in processing speed in the NIST ELFT latent fingerprint evaluation, completing searches in approximately 2 minutes versus 6 minutes for the nearest competitor. Its idemia+0008 algorithm achieved a Rank-1 Hit rate of 96.1%, though competitors ROC and Innovatrics recorded higher accuracy rates (98.2% and 98.6%). The result positions Idemia with an operational speed advantage in a market where accuracy is converging across vendors.", pt: "A Idemia Public Security alcançou o primeiro lugar em velocidade de processamento na avaliação NIST ELFT de impressões digitais latentes, completando buscas em aproximadamente 2 minutos frente aos 6 minutos do concorrente mais próximo. Seu algoritmo idemia+0008 atingiu uma taxa Rank-1 Hit de 96,1%, embora os concorrentes ROC e Innovatrics tenham registrado taxas de precisão superiores (98,2% e 98,6%). O resultado posiciona a Idemia com vantagem operacional de velocidade em um mercado onde a precisão entre fornecedores está convergindo." , titles: { es: "Idemia lidera velocidad en evaluación NIST de huellas dactilares: 2 minutos frente a los 6 del siguiente competidor", en: "Idemia Leads Speed in NIST Fingerprint Evaluation: 2 Minutes vs. 6 for the Nearest Competitor", pt: "Idemia lidera em velocidade na avaliação NIST de impressões digitais: 2 minutos contra 6 do competidor mais próximo" } },
  "veriff-deepfake-report-quiz-may20": { es: "Veriff publicó el Deepfake Report 2026 y un quiz online gratuito de 12 ítems para evaluar la capacidad humana de detectar deepfakes; Biometric Update alcanzó 83% de precisión (10/12) frente al promedio de solo 55% de usuarios generales. Los datos revelan que solo el 63% de adultos estadounidenses conocen el término \"deepfake\" (vs. 74% en UK y 67% en Brasil), y la detección de video de mujeres deepfake falla un 70% de las veces. Veriff aprovecha los resultados como argumento de posicionamiento: si los humanos no pueden detectar deepfakes, la biometría automatizada certificada es el único recurso fiable —posicionamiento directo en el espacio donde VU Deepfense compite.", en: "Veriff published the Deepfake Report 2026 and a free 12-item online quiz to assess human ability to detect deepfakes; Biometric Update scored 83% accuracy (10/12) versus a general user average of just 55%. The data reveals that only 63% of American adults are familiar with the term \"deepfake\" (vs. 74% in the UK and 67% in Brazil), and detection of deepfake video of women fails 70% of the time. Veriff leverages the results as a positioning argument: if humans cannot detect deepfakes, certified automated biometrics is the only reliable recourse — a direct positioning play in the space where VU Deepfense competes.", pt: "A Veriff publicou o Deepfake Report 2026 e um quiz online gratuito de 12 itens para avaliar a capacidade humana de detectar deepfakes; o Biometric Update atingiu 83% de precisão (10/12) frente à média de apenas 55% dos usuários em geral. Os dados revelam que apenas 63% dos adultos americanos conhecem o termo \"deepfake\" (vs. 74% no Reino Unido e 67% no Brasil), e a detecção de vídeos deepfake de mulheres falha 70% das vezes. A Veriff usa os resultados como argumento de posicionamento: se os humanos não conseguem detectar deepfakes, a biometria automatizada certificada é o único recurso confiável — posicionamento direto no espaço onde o VU Deepfense compete." , titles: { es: "Veriff lanza quiz de deepfakes: solo 55% de detección promedio humana", en: "Veriff Launches Deepfake Quiz: Humans Detect Only 55% on Average", pt: "Veriff lança quiz de deepfakes: apenas 55% de detecção humana em média" } },
  "appgate-fraud-beat-2026-appgate": { es: "AppGate publicó el Fraud Beat 2026, analizando el fraude digital en América Latina como un modelo en cadena industrializada mediante datos propios del Guardian Fusion Center en 15+ países. El reporte muestra que phishing impulsó el 73,2% de los incidentes globales de fraude en 2025 y que el 86% de las amenazas detectadas provienen de redes sociales. Con este informe, AppGate se consolida como proveedor de inteligencia de fraude regional de referencia en el mercado financiero latinoamericano.", en: "AppGate published the Fraud Beat 2026, analyzing digital fraud in Latin America as an industrialized chain model using proprietary data from its Guardian Fusion Center across 15+ countries. The report shows that phishing drove 73.2% of global fraud incidents in 2025 and that 86% of detected threats originate from social media. With this report, AppGate consolidates its position as a benchmark regional fraud intelligence provider in the Latin American financial market.", pt: "A AppGate publicou o Fraud Beat 2026, analisando a fraude digital na América Latina como um modelo em cadeia industrializada com dados próprios do Guardian Fusion Center em mais de 15 países. O relatório mostra que o phishing impulsionou 73,2% dos incidentes globais de fraude em 2025 e que 86% das ameaças detectadas têm origem nas redes sociais. Com este relatório, a AppGate se consolida como provedora de referência em inteligência de fraude regional no mercado financeiro latino-americano." , titles: { es: "AppGate Fraud Beat 2026: phishing y BEC como vectores dominantes — se posiciona como referente de inteligencia de fraude en LATAM", en: "AppGate Fraud Beat 2026: Phishing and BEC as Dominant Vectors — Positioning as LATAM's Fraud Intelligence Reference", pt: "AppGate Fraud Beat 2026: phishing e BEC como vetores dominantes — se posiciona como referência de inteligência de fraude na LATAM" } },
  "idme-verisys-medicaid-cms-may18": { es: "ID.me y Verisys anunciaron una alianza para modernizar la verificación de identidad de proveedores en los programas estatales de Medicaid, combinando la infraestructura de identidad de ID.me —ya contratada por CMS desde diciembre 2025 para Medicare.gov— con las credenciales sanitarias de Verisys. La solución permite a las agencias de salud verificar identidades de proveedores y cumplir con los requisitos de revalidación del CMS para reducir fraude en programas públicos. El caso muestra cómo la identidad digital se convierte en capa de integridad del gasto público en salud —un patrón aplicable a los sistemas de LATAM que enfrentan fraude creciente en prestaciones sociales y beneficiarios.", en: "ID.me and Verisys announced a partnership to modernize provider identity verification in state Medicaid programs, combining ID.me's identity infrastructure — already contracted by CMS since December 2025 for Medicare.gov — with Verisys's healthcare credentials. The solution enables health agencies to verify provider identities and meet CMS revalidation requirements to reduce fraud in public programs. The case demonstrates how digital identity becomes an integrity layer for public health spending — a pattern applicable to LATAM systems facing growing fraud in social benefits and beneficiary programs.", pt: "ID.me e Verisys anunciaram uma parceria para modernizar a verificação de identidade de prestadores nos programas estaduais de Medicaid, combinando a infraestrutura de identidade da ID.me — já contratada pelo CMS desde dezembro de 2025 para o Medicare.gov — com as credenciais de saúde da Verisys. A solução permite que agências de saúde verifiquem identidades de prestadores e cumpram os requisitos de revalidação do CMS para reduzir fraudes em programas públicos. O caso demonstra como a identidade digital se torna uma camada de integridade do gasto público em saúde — um padrão aplicável aos sistemas da LATAM que enfrentam fraude cres

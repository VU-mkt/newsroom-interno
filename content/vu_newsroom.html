cente em benefícios sociais e cadastros de beneficiários." , titles: { es: "ID.me y Verisys llevan la identidad digital al núcleo de Medicaid: verificación de proveedores sanitarios y revalidación CMS en tiempo real", en: "ID.me and Verisys Bring Digital Identity to the Core of Medicaid: Real-Time Provider Verification and CMS Revalidation", pt: "ID.me e Verisys levam a identidade digital ao núcleo do Medicaid: verificação de provedores de saúde e revalidação CMS em tempo real" } },
  "kali365-phishing-mfa-bypass-may25": { es: "El FBI advirtió sobre Kali365, un servicio de phishing distribuido vía Telegram que captura tokens de sesión de cuentas Microsoft 365 mediante ataques adversary-in-the-middle (AITM), eludiendo la autenticación multifactor basada en SMS o push notifications. El kit afecta a empresas, agencias gubernamentales y contratistas que dependen de Microsoft en la nube, y la alerta refuerza el argumento de la industria: los métodos MFA que pueden ser suplantados, serán suplantados. El incidente acelera la migración hacia credenciales criptográficas FIDO2 y passkeys resistentes al phishing, precisamente el espacio donde VU ONE posiciona su autenticación sin contraseña.", en: "The FBI issued a warning about Kali365, a phishing-as-a-service distributed via Telegram that captures Microsoft 365 session tokens through adversary-in-the-middle (AITM) attacks, bypassing SMS-based or push notification MFA. The kit targets businesses, government agencies, and contractors relying on Microsoft's cloud, and the alert reinforces the industry's core argument: MFA methods that can be spoofed, will be spoofed. The incident accelerates migration toward FIDO2 cryptographic credentials and phishing-resistant passkeys — precisely the space where VU ONE positions its passwordless authentication.", pt: "O FBI alertou sobre o Kali365, um serviço de phishing distribuído via Telegram que captura tokens de sessão de contas Microsoft 365 por meio de ataques adversary-in-the-middle (AITM), contornando a autenticação multifator baseada em SMS ou push notifications. O kit afeta empresas, agências governamentais e contratantes que dependem do Microsoft na nuvem, e o alerta reforça o argumento da indústria: métodos de MFA que podem ser falsificados, serão falsificados. O incidente acelera a migração para credenciais criptográficas FIDO2 e passkeys resistentes a phishing — exatamente o espaço onde o VU ONE posiciona sua autenticação sem senha." , titles: { es: "FBI alerta sobre Kali365: el kit phishing-as-a-service que elude MFA de Microsoft 365 y acelera la migración a passkeys", en: "FBI Warns of Kali365: The Phishing-as-a-Service Kit Bypassing Microsoft 365 MFA and Accelerating Passkey Migration", pt: "FBI alerta sobre Kali365: o kit phishing-as-a-service que contorna o MFA do Microsoft 365 e acelera a migração para passkeys" } },
  "mundial-2026-fraude-fifa": { es: "Investigadores de Flare identificaron 14 IPs y 79 dominios que replican el sitio oficial de FIFA — calendario, tienda y entradas — para capturar datos bancarios y de identidad. El torneo se juega en México, EE.UU. y Canadá desde junio. Los datos comprometidos suelen aparecer semanas después en intentos de onboarding fraudulento en bancos y billeteras digitales.", en: "Flare researchers identified 14 IPs and 79 domains replicating the official FIFA website — schedule, store, and ticketing — to capture banking and identity data. The tournament is held across Mexico, the U.S., and Canada starting in June. Compromised data typically surfaces weeks later in fraudulent onboarding attempts at banks and digital wallets.", pt: "Pesquisadores da Flare identificaram 14 IPs e 79 domínios que replicam o site oficial da FIFA — calendário, loja e ingressos — para capturar dados bancários e de identidade. O torneio acontece no México, EUA e Canadá a partir de junho. Os dados comprometidos costumam aparecer semanas depois em tentativas de onboarding fraudulento em bancos e carteiras digitais." , titles: { es: "Mundial 2026: 79 dominios falsos imitan a FIFA antes del torneo", en: "World Cup 2026: 79 fake domains impersonating FIFA ahead of the tournament", pt: "Copa do Mundo 2026: 79 domínios falsos imitam a FIFA antes do torneio" } },
  "samsung-clear-digital-id-wallet-may27": { es: "Samsung se une a Apple y Google al integrar pasaportes digitales en su wallet mediante alianza con CLEAR, permitiendo a usuarios estadounidenses verificar su identidad en más de 250 checkpoints TSA con su teléfono Galaxy. El sistema requiere autenticación biométrica (huella o PIN) y cifra los datos localmente vía Samsung Knox, sin transmitir el documento original al punto de verificación. Con los tres ecosistemas móviles dominantes adoptando credenciales derivadas de pasaportes, la infraestructura de identidad digital se consolida como estándar de facto para viajes domésticos en EE.UU.", en: "Samsung joins Apple and Google in integrating digital passports into its wallet through a partnership with CLEAR, enabling US users to verify their identity at more than 250 TSA checkpoints with their Galaxy phone. The system requires biometric authentication (fingerprint or PIN) and encrypts data locally via Samsung Knox, without transmitting the original document to the verification point. With all three dominant mobile ecosystems adopting passport-derived credentials, digital identity infrastructure is consolidating as the de facto standard for domestic travel in the US.", pt: "A Samsung se junta à Apple e ao Google ao integrar passaportes digitais em sua wallet por meio de parceria com a CLEAR, permitindo que usuários americanos verifiquem sua identidade em mais de 250 checkpoints da TSA com seu telefone Galaxy. O sistema exige autenticação biométrica (impressão digital ou PIN) e cifra os dados localmente via Samsung Knox, sem transmitir o documento original ao ponto de verificação. Com os três ecossistemas móveis dominantes adotando credenciais derivadas de passaportes, a infraestrutura de identidade digital se consolida como padrão de fato para viagens domésticas nos EUA." , titles: { es: "Samsung completa la tríada móvil: pasaportes digitales en Samsung Wallet con verificación CLEAR para TSA", en: "Samsung Completes the Mobile Triad: Digital Passports in Samsung Wallet with CLEAR Verification for TSA", pt: "Samsung completa a tríade móvel: passaportes digitais na Samsung Wallet com verificação CLEAR para a TSA" } },
  "argentina-banda-chino-app-fraude-may28": { es: "La Ufeic del Departamento Judicial San Isidro ejecutó 90 allanamientos simultáneos y detuvo a 24 personas lideradas por un ciudadano chino. La organización creó aplicaciones que simulaban ser herramientas de productividad o inversión pero robaban credenciales bancarias, cuentas de redes sociales, billeteras virtuales y códigos de autenticación. El daño total estimado alcanza los $3.000 millones de pesos; se incautaron US$8 millones en criptoactivos y la red operaba también en Chile, Perú, Colombia y México.", en: "The Ufeic unit of the San Isidro Judicial Department carried out 90 simultaneous raids and arrested 24 individuals led by a Chinese national. The organization created apps disguised as productivity or investment tools that stole banking credentials, social media accounts, digital wallets, and authentication codes. Estimated total damage reached 3 billion Argentine pesos; US$8 million in crypto assets were seized, and the network also operated in Chile, Peru, Colombia, and Mexico.", pt: "A Ufeic do Departamento Judicial de San Isidro realizou 90 buscas simultâneas e prendeu 24 pessoas lideradas por um cidadão chinês. A organização criava aplicativos que simulavam ser ferramentas de produtividade ou investimento, mas roubavam credenciais bancárias, contas de redes sociais, carteiras digitais e códigos de autenticação. O dano total estimado chega a 3 bilhões de pesos argentinos; foram apreendidos US$ 8 milhões em criptoativos, e a rede também operava no Chile, Peru, Colômbia e México." , titles: { es: "Argentina: desbaratan red criminal con apps falsas que robó 3.000M en pesos y 8M en cripto", en: "Argentina: Authorities Bust Criminal Network Using Fake Apps That Stole 3B Pesos and 8M in Crypto", pt: "Argentina: autoridades desarticulam rede criminosa com apps falsos que roubou 3 bilhões em pesos e 8M em cripto" } },
  "facia-deepliveness-launch-may13": { es: "Facia presentó DeepLiveness, solución que combina detección de liveness activo 3D con motor de detección de deepfakes en una única sesión de verificación. El sistema corre más de 10 modelos en paralelo, detecta 53+ tipos de ataques (deepfakes, máscaras 3D, ataques de inyección) y alcanzó precisión del 100% en el benchmark estándar de deepfakes de Meta con latencia subsegundo. Disponible vía API y SDK para integraciones bancarias y de onboarding — señal de la aceleración competitiva en el segmento anti-deepfake que VU Deepfense habita.", en: "Facia launched DeepLiveness, a solution combining 3D active liveness detection with a deepfake detection engine in a single verification session. The system runs over 10 models in parallel, detects 53+ attack types (deepfakes, 3D masks, injection attacks), and achieved 100% accuracy on Meta's standard deepfake benchmark with sub-second latency. Available via API and SDK for banking and onboarding integrations — a signal of accelerating competition in the anti-deepfake segment where VU Deepfense operates.", pt: "A Facia lançou o DeepLiveness, solução que combina detecção de liveness ativo 3D com motor de detecção de deepfakes em uma única sessão de verificação. O sistema executa mais de 10 modelos em paralelo, detecta mais de 53 tipos de ataques (deepfakes, máscaras 3D, ataques de injeção) e atingiu 100% de precisão no benchmark padrão de deepfakes da Meta com latência subsegundo. Disponível via API e SDK para integrações bancárias e de onboarding — sinal da aceleração competitiva no segmento anti-deepfake onde o VU Deepfense atua." , titles: { es: "Facia lanza DeepLiveness: liveness 3D y detección de deepfakes en una sola verificación con 100% de precisión en benchmark Meta", en: "Facia Launches DeepLiveness: 3D Liveness and Deepfake Detection in a Single Check with 100% Accuracy on Meta Benchmark", pt: "Facia lança DeepLiveness: liveness 3D e detecção de deepfakes em uma única verificação com 100% de precisão no benchmark Meta" } },
  "unico-84pct-growth-latam-idv-jun02": { es: "La firma brasileña de identidad digital Unico registró un aumento del 84% interanual en transacciones de verificación de identidad durante el primer trimestre de 2026, con ingresos internacionales creciendo un 130%. México triplicó volúmenes con un salto del 204% trimestre a trimestre, y la empresa planea expansión a Argentina. Unico procesó más de 1.500 millones de checks de identidad en 2025 y opera en más de 20 países.", en: "Brazilian digital identity firm Unico posted an 84% year-over-year increase in identity verification transactions during Q1 2026, with international revenue growing 130%. Mexico tripled volumes with a 204% quarter-over-quarter jump, and the company plans expansion into Argentina. Unico processed over 1.5 billion identity checks in 2025 and operates in more than 20 countries.", pt: "A firma brasileira de identidade digital Unico registrou um aumento de 84% ano a ano nas transações de verificação de identidade no primeiro trimestre de 2026, com receitas internacionais crescendo 130%. O México triplicou os volumes com um salto de 204% trimestre a trimestre, e a empresa planeja expansão para a Argentina. A Unico processou mais de 1,5 bilhão de verificações de identidade em 2025 e opera em mais de 20 países." , titles: { es: "Unico reporta crecimiento del 84% en verificación de identidad en Q1 2026 y acelera expansión LATAM", en: "Unico Reports 84% Growth in Identity Verification in Q1 2026, Accelerates LATAM Expansion", pt: "Unico reporta crescimento de 84% em verificação de identidade no Q1 2026 e acelera expansão na LATAM" } },
  "india-uidai-aadhaar-privacy-app-may18": { es: "La Autoridad de Identificación Única de India (UIDAI) discontinuó la app mAadhaar y desplegó una nueva versión centrada en privacidad selectiva: los usuarios divulgan solo los atributos necesarios para cada transacción —nombre, foto, edad o dirección— sin exponer el número Aadhaar completo. La app soporta autenticación facial, bloqueo biométrico, verificación offline y hasta cinco perfiles por dispositivo. El modelo indio —la mayor infraestructura de identidad biométrica del mundo con más de 1.400 millones de registros— señala el siguiente paso evolutivo para los sistemas nacionales de LATAM que están pasando del enrolamiento masivo a la utilidad cotidiana con controles de privacidad.", en: "India's Unique Identification Authority (UIDAI) discontinued the mAadhaar app and deployed a new version focused on selective disclosure: users share only the attributes required for each transaction — name, photo, age, or address — without exposing the full Aadhaar number. The app supports facial authentication, biometric lock, offline verification, and up to five profiles per device. The Indian model — the world's largest biometric identity infrastructure with over 1.4 billion records — points to the next evolutionary step for national systems in LATAM that are transitioning from mass enrollment to everyday utility with privacy controls.", pt: "A Autoridade de Identificação Única da Índia (UIDAI) descontinuou o app mAadhaar e lançou uma nova versão com foco em privacidade seletiva: os usuários divulgam apenas os atributos necessários para cada transação — nome, foto, idade ou endereço — sem expor o número Aadhaar completo. O app suporta autenticação facial, bloqueio biométrico, verificação offline e até cinco perfis por dispositivo. O modelo indiano — a maior infraestrutura de identidade biométrica do mundo, com mais de 1,4 bilhão de registros — aponta o próximo passo evolutivo para os sistemas nacionais da LATAM que estão migrando do cadastramento em massa para a utilidade cotidiana com controles de privacidade." , titles: { es: "India retira mAadhaar y lanza app rediseñada con compartición selectiva de datos: el modelo post-enrolamiento masivo", en: "India Retires mAadhaar and Launches Redesigned App with Selective Data Sharing: The Post-Mass Enrollment Model", pt: "Índia descontinua mAadhaar e lança app redesenhado com compartilhamento seletivo de dados: o modelo pós-cadastro em massa" } },
  "microsoft-entra-agent-id": { es: "Con Agent 365 disponible desde el 4 de mayo, Microsoft convierte a cada agente autónomo en una identidad verificable con nombre, email y acceso revocable. Es la primera plataforma de identidad corporativa que incluye agentes de IA en el mismo registro que empleados humanos. Disponible a USD 15/usuario/mes como parte de M365 E7.", en: "With Agent 365 available since May 4, Microsoft turns every autonomous agent into a verifiable identity with a name, email, and revocable access. It is the first corporate identity platform to include AI agents in the same directory as human employees. Available at USD 15/user/month as part of M365 E7.", pt: "Com o Agent 365 disponível desde 4 de maio, a Microsoft transforma cada agente autônomo em uma identidade verificável com nome, e-mail e acesso revogável. É a primeira plataforma de identidade corporativa a incluir agentes de IA no mesmo registro que os funcionários humanos. Disponível a USD 15/usuário/mês como parte do M365 E7." , titles: { es: "Microsoft Entra Agent ID: cuando los agentes de IA necesitan pasaporte corporativo", en: "Microsoft Entra Agent ID: When AI Agents Need a Corporate Passport", pt: "Microsoft Entra Agent ID: quando os agentes de IA precisam de um passaporte corporativo" } },
  "lexisnexis-identidad-sintetica-latam": { es: "El \"Informe sobre Ciberdelitos 2026\" de LexisNexis Risk Solutions documenta +450% en ataques de bots durante 2025 (wallets, pagos, apuestas) y +216% en intentos de ATO interanual. El patrón LATAM no se parece al global: gaming +76%, e-commerce +64%, fraude global +8%. Bots-agente con IA generativa imitan comportamiento humano.", en: "LexisNexis Risk Solutions' \"2026 Cybercrime Report\" documents a +450% surge in bot attacks during 2025 (wallets, payments, gambling) and a +216% year-over-year increase in ATO attempts. The LATAM pattern diverges from the global trend: gaming +76%, e-commerce +64%, global fraud +8%. Agent bots powered by generative AI mimic human behavior.", pt: "O \"Relatório sobre Crimes Cibernéticos 2026\" da LexisNexis Risk Solutions documenta +450% em ataques de bots durante 2025 (wallets, pagamentos, apostas) e +216% em tentativas de ATO em relação ao ano anterior. O padrão LATAM difere do global: gaming +76%, e-commerce +64%, fraude global +8%. Bots-agente com IA generativa imitam o comportamento humano." , titles: { es: "LexisNexis: el 48,3% del fraude en LATAM ya involucra identidades sinteticas", en: "LexisNexis: 48.3% of Fraud in LATAM Already Involves Synthetic Identities", pt: "LexisNexis: 48,3% das fraudes na America Latina ja envolvem identidades sinteticas" } },
  "gripid-v10-biometric-id4africa-may18": { es: "GripID presentó en la cumbre ID4Africa 2026 (Abidján) el dispositivo V10, una estación biométrica portable y plegable que integra captura de iris dual, reconocimiento facial, escaneo de huellas, lectura de documentos, captura de firma y pantalla táctil de 10 pulgadas en un único equipo. El sistema está diseñado para programas de inscripción de identidad nacional, control fronterizo, servicios consulares y enrolamiento masivo en terreno. La tendencia hacia dispositivos biométricos portátiles all-in-one responde directamente a las necesidades de los registros civiles de LATAM que buscan extender el enrolamiento a zonas rurales y de difícil acceso.", en: "GripID unveiled the V10 device at the ID4Africa 2026 summit (Abidjan), a portable, foldable biometric workstation that integrates dual iris capture, facial recognition, fingerprint scanning, document reading, signature capture, and a 10-inch touchscreen in a single unit. The system is designed for national identity enrollment programs, border control, consular services, and mass field enrollment. The trend toward all-in-one portable biometric devices directly addresses the needs of civil registries in LATAM seeking to extend enrollment to rural and hard-to-reach areas.", pt: "A GripID apresentou na cúpula ID4Africa 2026 (Abidjan) o dispositivo V10, uma estação biométrica portátil e dobrável que integra captura de íris dupla, reconhecimento facial, leitura de impressões digitais, leitura de documentos, captura de assinatura e tela touch de 10 polegadas em um único equipamento. O sistema foi projetado para programas de inscrição de identidade nacional, controle de fronteiras, serviços consulares e cadastramento em massa no campo. A tendência em direção a dispositivos biométricos portáteis all-in-one responde diretamente às necessidades dos registros civis da LATAM que buscam expandir o cadastramento para zonas rurais e de difícil acesso." , titles: { es: "GripID lanza el V10 en ID4Africa 2026: estación biométrica portátil con iris dual, reconocimiento facial y lectura de documentos en un solo equipo de campo", en: "GripID Launches V10 at ID4Africa 2026: Portable Biometric Station with Dual Iris, Facial Recognition and Document Reading in a Single Field Device", pt: "GripID lança o V10 na ID4Africa 2026: estação biométrica portátil com íris dual, reconhecimento facial e leitura de documentos em um único equipamento de campo" } },
  "nyc-health-breach-biometrics-1-8m-may21": { es: "Una brecha en un proveedor externo de NYC Health + Hospitals comprometió datos de 1,8 millones de personas entre noviembre de 2025 y el 2 de febrero de 2026, incluyendo historial médico, documentos gubernamentales (SSN, pasaportes) y biometría: huellas dactilares y marcas palmares. La alerta pública fue emitida recién el 18 de mayo de 2026. A diferencia de contraseñas o números de cuenta, las huellas son permanentes —\"una vez comprometidas, los afectados cargan esa exposición para siempre\". El incidente expone la asimetría crítica del dato biométrico en sistemas de salud: la misma característica que lo convierte en autenticador de alta garantía lo transforma en el dato más irreversible de todos.", en: "A breach at a third-party vendor for NYC Health + Hospitals compromised data of 1.8 million people between November 2025 and February 2, 2026, including medical history, government documents (SSN, passports), and biometrics: fingerprints and palm prints. The public alert was not issued until May 18, 2026. Unlike passwords or account numbers, fingerprints are permanent — \"once compromised, those affected carry that exposure forever.\" The incident exposes the critical asymmetry of biometric data in healthcare systems: the same characteristic that makes it a high-assurance authenticator also makes it the most irreversible data point of all.", pt: "Uma violação em um fornecedor externo do NYC Health + Hospitals comprometeu dados de 1,8 milhão de pessoas entre novembro de 2025 e 2 de fevereiro de 2026, incluindo histórico médico, documentos governamentais (SSN, passaportes) e biometria: impressões digitais e marcas palmares. O alerta público foi emitido somente em 18 de maio de 2026. Ao contrário de senhas ou números de conta, as impressões digitais são permanentes — \"uma vez comprometidas, os afetados carregam essa exposição para sempre\". O incidente expõe a assimetria crítica do dado biométrico em sistemas de saúde: a mesma característica que o torna um autenticador de alta garantia o transforma no dado mais irreversível de todos." , titles: { es: "Brecha en NYC Health expone huellas dactilares y palmares de 1,8 millones: los datos biométricos no se pueden resetear", en: "NYC Health Breach Exposes Fingerprints and Palm Prints of 1.8 Million: Biometric Data Cannot Be Reset", pt: "Vazamento no NYC Health expõe impressões digitais e palmares de 1,8 milhão: dados biométricos não podem ser redefinidos" } },
  "ftc-take-it-down-act-deepfake-deadline": { es: "La Comisión Federal de Comercio de EE.UU. notificó a las principales plataformas tecnológicas su obligación de implementar mecanismos de denuncia y remoción de contenido sintético no consentido —incluyendo deepfakes sexuales— bajo el Take It Down Act. La ley consolida el estándar regulatorio de que la verificación de liveness sin deepfake no es solo una buena práctica sino un requisito emergente; su influencia normativa tiende a moldear marcos en LATAM que se alinean con estándares estadounidenses y europeos.", en: "The U.S. Federal Trade Commission notified major tech platforms of their obligation to implement reporting and removal mechanisms for non-consensual synthetic content — including sexual deepfakes — under the Take It Down Act. The law consolidates the regulatory standard that deepfake-resistant liveness verification is not merely a best practice but an emerging requirement; its normative influence tends to shape frameworks in LATAM that align with U.S. and European standards.", pt: "A Comissão Federal de Comércio dos EUA notificou as principais plataformas tecnológicas sobre sua obrigação de implementar mecanismos de denúncia e remoção de conteúdo sintético não consentido — incluindo deepfakes sexuais — sob o Take It Down Act. A lei consolida o padrão regulatório de que a verificação de liveness resistente a deepfakes não é apenas uma boa prática, mas um requisito emergente; sua influência normativa tende a moldar marcos na América Latina que se alinham com os padrões norte-americanos e europeus." , titles: { es: "FTC advierte a plataformas tech: plazo inminente para cumplir el Take It Down Act sobre contenido sintético no consentido", en: "FTC warns tech platforms: imminent deadline to comply with the Take It Down Act on non-consensual synthetic content", pt: "FTC alerta plataformas de tecnologia: prazo iminente para cumprir o Take It Down Act sobre conteúdo sintético não consensual" } },
  "infobae-mx-fraude-madres-cdmx-may26": { es: "Las autoridades de la Ciudad de México activaron un operativo con 4.697 cámaras en 562 puntos comerciales — cobertura 29,2% mayor que hace dos años — para contrarrestar fraudes en el Día de las Madres. Campaña de phishing con cupones falsos de Soriana, Liverpool y Starbucks circula en WhatsApp con logos generados por IA que imitan tiendas reales. El Consejo Ciudadano alerta: los enlaces redirigen a encuestas de robo de datos bancarios y de identidad.", en: "Mexico City authorities activated an operation with 4,697 cameras across 562 commercial locations — 29.2% greater coverage than two years ago — to counter fraud during Mother's Day. A phishing campaign featuring fake coupons from Soriana, Liverpool, and Starbucks is circulating on WhatsApp with AI-generated logos mimicking real stores. The Consejo Ciudadano warns: the links redirect to surveys designed to steal banking and identity data.", pt: "As autoridades da Cidade do México ativaram uma operação com 4.697 câmeras em 562 pontos comerciais — cobertura 29,2% maior do que há dois anos — para combater fraudes no Dia das Mães. Uma campanha de phishing com cupons falsos de Soriana, Liverpool e Starbucks circula no WhatsApp com logotipos gerados por IA que imitam lojas reais. O Consejo Ciudadano alerta: os links redirecionam para pesquisas de roubo de dados bancários e de identidade." , titles: { es: "Día de las Madres 2026: fraude digital al alza y vigilancia récord en CDMX", en: "Mothers Day 2026: Rising Digital Fraud and Record Surveillance in Mexico City", pt: "Dia das Mães 2026: fraude digital em alta e vigilância recorde na CDMX" } },
  "eu-ees-biometric-border-delays-may19": { es: "La Comisión Europea confirmó que Grecia suspendió unilateralmente la recopilación de datos biométricos de viajeros británicos sin autorización comunitaria, violando las reglas del sistema de Entrada/Salida (EES) europeo. El aeropuerto de Amsterdam registró tiempos de espera que aumentaron de 5 a 7,7 minutos tras el despliegue del EES; París instala 90 quioscos biométricos adicionales para amortiguar la presión de la temporada alta. Las fracturas en la gobernanza europea de identidad biométrica revelan los retos de implementación uniforme que los marcos regulatorios de LATAM también enfrentarán al escalar.", en: "The European Commission confirmed that Greece unilaterally suspended biometric data collection from British travelers without EU authorization, violating the rules of the European Entry/Exit System (EES). Amsterdam Airport recorded wait times rising from 5 to 7.7 minutes following EES deployment; Paris is installing 90 additional biometric kiosks to buffer peak-season pressure. Fractures in European biometric identity governance reveal the uniform implementation challenges that LATAM regulatory frameworks will also face as they scale.", pt: "A Comissão Europeia confirmou que a Grécia suspendeu unilateralmente a coleta de dados biométricos de viajantes britânicos sem autorização comunitária, violando as regras do Sistema de Entrada/Saída (EES) europeu. O aeroporto de Amsterdã registrou tempos de espera que aumentaram de 5 para 7,7 minutos após a implantação do EES; Paris está instalando 90 quiosques biométricos adicionais para amortecer a pressão da alta temporada. As fraturas na governança europeia de identidade biométrica revelam os desafios de implementação uniforme que os marcos regulatórios da LATAM também enfrentarão ao escalar." , titles: { es: "La UE defiende el EES biométrico ante el caos fronterizo: Grecia suspendió datos sin autorización y Amsterdam reporta esperas 52% más largas", en: "EU Defends EES Biometric Border Rules Amid Chaos: Greece Suspended Data Unauthorized, Amsterdam Waits 52% Longer", pt: "UE defende regras biométricas do EES diante do caos nas fronteiras: Grécia suspendeu dados sem autorização e Amsterdam registra filas 52% mais longas" } },
  "aws-connect-voice-id-eol-may28": { es: "Amazon Connect Voice ID cerrará definitivamente en mayo de 2026, marcando la salida de AWS del mercado de biometría de voz. Amazon redirige a sus clientes hacia la plataforma de Pindrop con autenticación multifactor de voz y detección de liveness. El retiro se atribuye a desafíos técnicos persistentes con ruido de fondo, variaciones de acento y la creciente amenaza del speech sintético y deepfakes de audio.", en: "Amazon Connect Voice ID will shut down permanently in May 2026, marking AWS's exit from the voice biometrics market. Amazon is redirecting customers to Pindrop's platform, which offers multifactor voice authentication and liveness detection. The retirement is attributed to persistent technical challenges with background noise, accent variation, and the growing threat of synthetic speech and audio deepfakes.", pt: "O Amazon Connect Voice ID será encerrado definitivamente em maio de 2026, marcando a saída da AWS do mercado de biometria de voz. A Amazon está redirecionando seus clientes para a plataforma da Pindrop, com autenticação multifator de voz e detecção de liveness. A descontinuação é atribuída a desafios técnicos persistentes com ruído de fundo, variações de sotaque e a crescente ameaça do speech sintético e deepfakes de áudio." , titles: { es: "AWS elimina Amazon Connect Voice ID y recomienda Pindrop como alternativa", en: "AWS discontinues Amazon Connect Voice ID and recommends Pindrop as alternative", pt: "AWS descontinua o Amazon Connect Voice ID e recomenda Pindrop como alternativa" } },
  "interac-incode-liveness-ibeta3-canada-may26": { es: "Interac, la red de pagos más grande de Canadá, eligió a Incode como proveedor exclusivo de verificación de documentos e identidad, incorporando detección pasiva de liveness certificada iBeta Nivel 3 \"con cero errores\" —primera solución en alcanzar ese estándar en iOS y Android. Las capacidades incluyen detección de deepfakes y protección contra ataques de inyección, con lanzamiento escalonado en Q3 2026. El acuerdo posiciona a Incode como referente de seguridad biométrica de alta certificación para ecosistemas de pagos en Norteamérica.", en: "Interac, Canada's largest payments network, selected Incode as its exclusive document and identity verification provider, incorporating passive liveness detection certified at iBeta Level 3 with \"zero errors\" — the first solution to achieve that standard on both iOS and Android. Capabilities include deepfake detection and injection attack protection, with a staged rollout in Q3 2026. The agreement positions Incode as a high-certification biometric security reference for payments ecosystems in North America.", pt: "A Interac, maior rede de pagamentos do Canadá, escolheu a Incode como fornecedora exclusiva de verificação de documentos e identidade, incorporando detecção passiva de liveness certificada iBeta Nível 3 \"com zero erros\" — primeira solução a atingir esse padrão em iOS e Android. As capacidades incluem detecção de deepfakes e proteção contra ataques de injeção, com lançamento escalonado no Q3 2026. O acordo posiciona a Incode como referência de segurança biométrica de alta certificação para ecossistemas de pagamentos na América do Norte." , titles: { es: "Incode gana exclusividad en Canadá: Interac elige su liveness iBeta Nivel 3 — primera solución sin errores en iOS y Android", en: "Incode wins exclusivity in Canada: Interac selects its iBeta Level 3 liveness — first error-free solution on iOS and Android", pt: "Incode conquista exclusividade no Canadá: Interac escolhe seu liveness iBeta Nível 3 — primeira solução sem erros em iOS e Android" } },
  "clear-q1-2026-results-may21": { es: "CLEAR reportó ingresos de USD 253 millones en Q1 2026 (+19,7% interanual) con bookings de USD 291,7M (+40,8%) y EBITDA ajustado de USD 80,6M (margen 31,9%). Los miembros activos CLEAR+ alcanzaron 8,2 millones (+13%) dentro de un total de 41 millones; sus eGates biométricas operan en 43 aeropuertos con rollout completo planificado para 2026. La alianza con GDIT para llevar CLEAR1 —verificación sin contraseña combinando documento + selfie biométrica— a agencias federales de salud y civiles convierte a CLEAR en capa de infraestructura soberana de identidad, el mismo posicionamiento que VU persigue en LATAM. CEO Caryn Seidman Becker: \"la identidad ya no es una feature, es fundacional\".", en: "CLEAR reported revenue of USD 253 million in Q1 2026 (+19.7% YoY) with bookings of USD 291.7M (+40.8%) and adjusted EBITDA of USD 80.6M (31.9% margin). Active CLEAR+ members reached 8.2 million (+13%) within a total of 41 million; its biometric eGates operate at 43 airports with a full rollout planned for 2026. The alliance with GDIT to bring CLEAR1 — passwordless verification combining document + biometric selfie — to federal health and civilian agencies positions CLEAR as a sovereign identity infrastructure layer, the same positioning VU pursues in LATAM. CEO Caryn Seidman Becker: \"identity is no longer a feature, it is foundational\".", pt: "A CLEAR reportou receita de USD 253 milhões no Q1 2026 (+19,7% ano a ano) com bookings de USD 291,7M (+40,8%) e EBITDA ajustado de USD 80,6M (margem de 31,9%). Os membros ativos do CLEAR+ chegaram a 8,2 milhões (+13%) dentro de um total de 41 milhões; seus eGates biométricos operam em 43 aeroportos com rollout completo previsto para 2026. A aliança com a GDIT para levar o CLEAR1 — verificação sem senha combinando documento + selfie biométrica — a agências federais de saúde e civis posiciona a CLEAR como camada de infraestrutura soberana de identidade, o mesmo posicionamento que a VU persegue na LATAM. CEO Caryn Seidman Becker: \"a identidade não é mais uma feature, é fundacional\"." , titles: { es: "CLEAR supera USD 253M en ingresos en Q1 2026 con 41 millones de miembros y presencia federal via GDIT", en: "CLEAR Surpasses USD 253M in Q1 2026 Revenue with 41 Million Members and Federal Presence via GDIT", pt: "CLEAR ultrapassa USD 253M em receita no Q1 2026 com 41 milhões de membros e presença federal via GDIT" } },
  "grafana-github-token-breach-extorsion-may17": { es: "Grafana Labs confirmó que un actor no autorizado explotó una vulnerabilidad \"Pwn Request\" en un GitHub Action para extraer tokens de producción y descargar la totalidad del repositorio de código fuente. El grupo CoinbaseCartel —activo desde septiembre 2025 con 170 víctimas— exigió pago para no publicar el código; Grafana rechazó el rescate siguiendo directrices del FBI y descartó que datos de clientes hayan sido comprometidos.", en: "Grafana Labs confirmed that an unauthorized actor exploited a \"Pwn Request\" vulnerability in a GitHub Action to extract production tokens and download the entire source code repository. The CoinbaseCartel group — active since September 2025 with 170 known victims — demanded payment to avoid publishing the code; Grafana refused the ransom following FBI guidance and confirmed that no customer data was compromised.", pt: "A Grafana Labs confirmou que um agente não autorizado explorou uma vulnerabilidade \"Pwn Request\" em um GitHub Action para extrair tokens de produção e baixar a totalidade do repositório de código-fonte. O grupo CoinbaseCartel — ativo desde setembro de 2025 com 170 vítimas conhecidas — exigiu pagamento para não publicar o código; a Grafana recusou o resgate seguindo as diretrizes do FBI e descartou que dados de clientes tenham sido comprometidos." , titles: { es: "Grafana Labs: robo del código fuente vía token GitHub y extorsión rechazada — el grupo CoinbaseCartel acumula 170 víctimas", en: "Grafana Labs: Source Code Stolen via GitHub Token, Extortion Rejected — CoinbaseCartel Group Accumulates 170 Victims", pt: "Grafana Labs: roubo de código-fonte via token GitHub e extorsão rejeitada — o grupo CoinbaseCartel acumula 170 vítimas" } },
  "disney-facial-recognition-bipa-may20": { es: "Una demanda colectiva presentada el 15 de mayo alega que Disney capturó, analizó y almacenó datos biométricos faciales de visitantes de Disneyland en abril de 2026 sin la notificación ni el consentimiento explícito requeridos por BIPA (Illinois), Washington y Nueva Jersey; la empresa afirma que los datos se eliminan dentro de 30 días. La demandante solicita más de USD 5 millones en daños colectivos. El caso establece que la biometría en espacios físicos sin consentimiento explícito es el próximo frente regulatorio en EE.UU. —referente de riesgo legal para empresas de LATAM que despliegan reconocimiento facial en retail, gaming o control de acceso físico.", en: "A class-action lawsuit filed on May 15 alleges that Disney captured, analyzed, and stored facial biometric data from Disneyland visitors in April 2026 without the notification or explicit consent required by BIPA (Illinois), Washington, and New Jersey; the company states that data is deleted within 30 days. The plaintiff seeks over USD 5 million in class damages. The case establishes that biometrics in physical spaces without explicit consent is the next regulatory frontier in the US — a legal risk benchmark for LATAM companies deploying facial recognition in retail, gaming, or physical access control.", pt: "Uma ação coletiva apresentada em 15 de maio alega que a Disney capturou, analisou e armazenou dados biométricos faciais de visitantes da Disneyland em abril de 2026 sem a notificação nem o consentimento explícito exigidos pela BIPA (Illinois), Washington e Nova Jersey; a empresa afirma que os dados são eliminados dentro de 30 dias. A autora solicita mais de USD 5 milhões em danos coletivos. O caso estabelece que a biometria em espaços físicos sem consentimento explícito é a próxima fronteira regulatória nos EUA — referência de risco legal para empresas da LATAM que implantam reconhecimento facial em varejo, gaming ou controle de acesso físico." , titles: { es: "Disney enfrenta demanda colectiva por reconocimiento facial en Disneyland sin consentimiento: más de USD 5M bajo BIPA", en: "Disney Faces Class Action Over Non-Consensual Facial Recognition at Disneyland: Over USD 5M at Stake Under BIPA", pt: "Disney enfrenta ação coletiva por reconhecimento facial sem consentimento na Disneyland: mais de USD 5M sob a BIPA" } },
  "biometricupdate-digital-id-infraestructura-critica-may14": { es: "Expertos en la cumbre ID4Africa 2026 (Abidján) declararon que los sistemas de identidad digital deben tratarse como infraestructura crítica nacional bajo un marco de ciberdefensa soberana. Un informe presentado advierte que ataques de ransomware contra sistemas de ID pueden costar hasta el 2,4% del PIB en economías en desarrollo, y que la UE invertirá USD 1,4 mil millones en ciberseguridad de identidad. Los modelos de referencia citados son Estonia y Singapur (SingPass: 4,5 millones de usuarios sin brechas reportadas en 5 años), basados en \"security-by-design\" — el mismo marco que LATAM debe adoptar al escalar sus registros biométricos nacionales.", en: "Experts at the ID4Africa 2026 summit (Abidjan) declared that digital identity systems must be treated as national critical infrastructure under a sovereign cyber-defense framework. A report presented warns that ransomware attacks against ID systems can cost up to 2.4% of GDP in developing economies, and that the EU will invest USD 1.4 billion in identity cybersecurity. The cited reference models are Estonia and Singapore (SingPass: 4.5 million users with no reported breaches in 5 years), built on security-by-design — the same framework LATAM must adopt as it scales its national biometric registries.", pt: "Especialistas na cúpula ID4Africa 2026 (Abidjan) declararam que os sistemas de identidade digital devem ser tratados como infraestrutura crítica nacional sob um marco de ciberdefesa soberana. Um relatório apresentado alerta que ataques de ransomware contra sistemas de ID podem custar até 2,4% do PIB em economias em desenvolvimento, e que a UE investirá USD 1,4 bilhão em cibersegurança de identidade. Os modelos de referência citados são Estônia e Singapura (SingPass: 4,5 milhões de usuários sem violações reportadas em 5 anos), baseados em \"security-by-design\" — o mesmo marco que a LATAM deve adotar ao escalar seus registros biométricos nacionais." , titles: { es: "ID4Africa 2026: los sistemas de identidad digital son infraestructura crítica soberana — el ransomware puede costar hasta 2,4% del PIB", en: "ID4Africa 2026: Digital Identity Systems Are Sovereign Critical Infrastructure — Ransomware Could Cost Up to 2.4% of GDP", pt: "ID4Africa 2026: sistemas de identidade digital são infraestrutura crítica soberana — ransomware pode custar até 2,4% do PIB" } },
  "signicat-austria-eudi-wallet-may27": { es: "Signicat añade el sistema eID de Austria a su hub unificado, alcanzando soporte para más de 35 identidades nacionales europeas y habilitando verificación para el 60% de la población austriaca (6,8 millones de usuarios). La integración responde al período de coexistencia forzosa: los estados miembros deben ofrecer EUDI Wallets antes de fin de 2026, pero muchos coexistirán con eIDs nacionales durante años. Para empresas de servicios financieros, seguros y telecomunicaciones en UE, el soporte simultáneo de eIDs legacy y wallets eIDAS 2.0 se vuelve un requisito operativo inmediato.", en: "Signicat adds Austria's eID system to its unified hub, reaching support for more than 35 European national identities and enabling verification for 60% of the Austrian population (6.8 million users). The integration responds to the forced coexistence period: member states must offer EUDI Wallets before end of 2026, but many will coexist with national eIDs for years. For financial services, insurance, and telecom companies in the EU, simultaneous support for legacy eIDs and eIDAS 2.0 wallets becomes an immediate operational requirement.", pt: "A Signicat adiciona o sistema eID da Áustria ao seu hub unificado, alcançando suporte para mais de 35 identidades nacionais europeias e habilitando a verificação para 60% da população austríaca (6,8 milhões de usuários). A integração responde ao período de coexistência forçada: os estados-membros devem oferecer EUDI Wallets antes do fim de 2026, mas muitos coexistirão com eIDs nacionais por anos. Para empresas de serviços financeiros, seguros e telecomunicações na UE, o suporte simultâneo a eIDs legados e wallets eIDAS 2.0 torna-se um requisito operacional imediato." , titles: { es: "Signicat integra el eID de Austria y supera 35 identidades nacionales ante el plazo EUDI Wallet 2026", en: "Signicat Integrates Austria's eID and Surpasses 35 National Identities Ahead of EUDI Wallet 2026 Deadline", pt: "Signicat integra o eID da Áustria e supera 35 identidades nacionais antes do prazo da EUDI Wallet 2026" } },
  "nequi-hackeo-cuenta-x-may13": { es: "La cuenta verificada de Nequi en X (149.000+ seguidores), billetera digital de Bancolombia con más de 20 millones de usuarios en Colombia, fue comprometida el 13 de mayo y utilizada para publicar esquemas fraudulentos de inversión en TRON/USDT. Nequi confirmó que la aplicación y los fondos de los usuarios no fueron afectados, pero el incidente ilustra un vector en expansión: el account takeover de identidad de marca digital. Cuando una fintech pierde el control de su canal oficial verificado, ese canal se convierte en vector de fraude para los usuarios que confían en él — un riesgo de reputación e identidad que los equipos de seguridad deben gestionar como parte del perímetro.", en: "Nequi's verified account on X (149,000+ followers) — Bancolombia's digital wallet with over 20 million users in Colombia — was compromised on May 13 and used to post fraudulent TRON/USDT investment schemes. Nequi confirmed the app and user funds were unaffected, but the incident highlights a growing vector: digital brand identity account takeover. When a fintech loses control of its verified official channel, that channel becomes a fraud vector for users who trust it — a reputational and identity risk that security teams must manage as part of their perimeter.", pt: "A conta verificada da Nequi no X (149.000+ seguidores) — carteira digital do Bancolombia com mais de 20 milhões de usuários na Colômbia — foi comprometida em 13 de maio e utilizada para publicar esquemas fraudulentos de investimento em TRON/USDT. A Nequi confirmou que o aplicativo e os fundos dos usuários não foram afetados, mas o incidente ilustra um vetor em expansão: o account takeover de identidade de marca digital. Quando uma fintech perde o controle de seu canal oficial verificado, esse canal se torna um vetor de fraude para os usuários que nele confiam — um risco de reputação e identidade que as equipes de segurança devem gerenciar como parte do perímetro." , titles: { es: "Hackearon la cuenta de X de Nequi: 149.000 seguidores expuestos a fraude cripto durante el incidente", en: "Nequi's X Account Hacked: 149,000 Followers Exposed to Crypto Fraud During the Incident", pt: "Conta X da Nequi é hackeada: 149.000 seguidores expostos a fraude com cripto durante o incidente" } },
  "worst-hacks-breaches-2026-techcrunch": { es: "TechCrunch documentó los incidentes de ciberseguridad más graves del año: la brecha de Instructure Canvas comprometió datos de más de 30 millones de estudiantes y empleados, una brecha expuso pasaportes y selfies de miles de solicitantes de visa del Reino Unido, y un servidor desprotegido contuvo 1 millón de escaneos de documentos de identidad de huéspedes de hoteles. El ataque de ShinyHunters a la fintech Figure expuso datos de identidad de 967.200 clientes incluyendo nombres, fechas de nacimiento y teléfonos. El patrón común: captura masiva de datos de identidad sin controles de protección post-onboarding.", en: "TechCrunch documented the most serious cybersecurity incidents of the year: the Instructure Canvas breach compromised data of over 30 million students and employees, a breach exposed passports and selfies of thousands of UK visa applicants, and an unprotected server held 1 million identity document scans of hotel guests. The ShinyHunters attack on fintech Figure exposed identity data of 967,200 customers including names, dates of birth, and phone numbers. The common pattern: mass capture of identity data with no post-onboarding protection controls.", pt: "A TechCrunch documentou os incidentes de cibersegurança mais graves do ano: a brecha no Instructure Canvas comprometeu dados de mais de 30 milhões de estudantes e funcionários, uma brecha expôs passaportes e selfies de milhares de solicitantes de visto do Reino Unido, e um servidor desprotegido armazenou 1 milhão de digitalizações de documentos de identidade de hóspedes de hotéis. O ataque do ShinyHunters à fintech Figure expôs dados de identidade de 967.200 clientes, incluindo nomes, datas de nascimento e telefones. O padrão comum: captura massiva de dados de identidade sem controles de proteção pós-onboarding." , titles: { es: "Los peores hacks de 2026: 30 millones de estudiantes, pasaportes expuestos y 967.000 clientes de fintech", en: "The Worst Hacks of 2026: 30M Students, Exposed Passports and 967K Fintech Customers", pt: "Os piores hacks de 2026: 30 milhões de estudantes, passaportes expostos e 967 mil clientes de fintech" } },
  "sumsub-300pct-document-fraud-jun01": { es: "Sumsub publicó datos de su plataforma correspondientes al Q1 2025 mostrando que el fraude de documentos sintéticos creció 311% en Norteamérica respecto del Q1 2024, mientras que el deepfake fraud aumentó 1.100%. El CEO Andrew Sever advirtió que la IA generativa permite crear documentos falsos a escala industrial que eluden controles KYC básicos. El reporte —publicado el 1 de junio— cubre millones de verificaciones en fintech, ecommerce, healthtech y edtech, y posiciona a Sumsub como fuente de datos de referencia del sector.", en: "Sumsub released Q1 2025 platform data showing that synthetic document fraud grew 311% in North America compared to Q1 2024, while deepfake fraud surged 1,100%. CEO Andrew Sever warned that generative AI enables the creation of fake documents at industrial scale that bypass basic KYC controls. The report — published June 1 — covers millions of verifications across fintech, ecommerce, healthtech, and edtech, positioning Sumsub as a benchmark data source for the industry.", pt: "A Sumsub divulgou dados de sua plataforma referentes ao Q1 2025, mostrando que o fraude de documentos sintéticos cresceu 311% na América do Norte em relação ao Q1 2024, enquanto o deepfake fraud aumentou 1.100%. O CEO Andrew Sever alertou que a IA generativa permite criar documentos falsos em escala industrial, contornando controles KYC básicos. O relatório — publicado em 1º de junho — abrange milhões de verificações em fintech, ecommerce, healthtech e edtech, posicionando a Sumsub como fonte de dados de referência do setor." , titles: { es: "Sumsub reporta aumento del 311% en fraude de documentos sintéticos y 1.100% en deepfakes — alerta para KYC en LATAM", en: "Sumsub Reports 311% Surge in Synthetic Document Fraud and 1,100% Rise in Deepfakes — A KYC Alert for LATAM", pt: "Sumsub reporta aumento de 311% em fraude de documentos sintéticos e 1.100% em deepfakes — alerta para KYC na LATAM" } },
  "facebook-30k-appsheet-phishing-may28": { es: "Una operación de origen vietnamita denominada AccountDumpling usó la dirección legítima noreply@appsheet.com para enviar correos de phishing a titulares de Facebook Business, eludiendo filtros de spam. Aproximadamente 30.000 cuentas fueron comprometidas y revendidas en un storefront criminal con paneles en tiempo real. El investigador Shaked Chen describió la operación como un ciclo criminal-comercial continuo que roba y vende acceso a las mismas cuentas.", en: "A Vietnamese-origin operation called AccountDumpling used the legitimate address noreply@appsheet.com to send phishing emails to Facebook Business account holders, bypassing spam filters. Approximately 30,000 accounts were compromised and resold through a criminal storefront with real-time dashboards. Researcher Shaked Chen described the operation as a continuous criminal-commercial cycle that steals and resells access to the same accounts.", pt: "Uma operação de origem vietnamita denominada AccountDumpling usou o endereço legítimo noreply@appsheet.com para enviar e-mails de phishing a titulares de contas do Facebook Business, contornando filtros de spam. Aproximadamente 30.000 contas foram comprometidas e revendidas em um storefront criminoso com painéis em tempo real. O pesquisador Shaked Chen descreveu a operação como um ciclo criminal-comercial contínuo que rouba e vende acesso às mesmas contas." , titles: { es: "30.000 cuentas de Facebook comprometidas mediante phishing vía Google AppSheet", en: "30,000 Facebook Accounts Compromised via Phishing Using Google AppSheet", pt: "30.000 contas do Facebook comprometidas por phishing via Google AppSheet" } },
  "forbes-stranieri-mythos-vercel": { es: "El CEO de VU analizó para Forbes Argentina las brechas Mythos (Anthropic) y Vercel: dos casos donde IA aceleró ataques contra plataformas con credenciales estáticas. Tesis: las defensas tradicionales basadas en perímetro no alcanzan. CIO Report 2026 (Logicalis): 70% de ejecutivos argentinos preocupados por uso no autorizado de IA en sus organizaciones.", en: "VU's CEO analyzed for Forbes Argentina the Mythos (Anthropic) and Vercel breaches: two cases where AI accelerated attacks against platforms relying on static credentials. The thesis: traditional perimeter-based defenses are no longer enough. CIO Report 2026 (Logicalis): 70% of Argentine executives are concerned about unauthorized AI use within their organizations.", pt: "O CEO da VU analisou para a Forbes Argentina as brechas Mythos (Anthropic) e Vercel: dois casos em que a IA acelerou ataques contra plataformas com credenciais estáticas. A tese: as defesas tradicionais baseadas em perímetro não são suficientes. CIO Report 2026 (Logicalis): 70% dos executivos argentinos estão preocupados com o uso não autorizado de IA em suas organizações." , titles: { es: "Stranieri en Forbes: "El foco debe estar en la identidad de cada componente, no solo en el perímetro"", en: "Stranieri in Forbes: "The focus must be on each component's identity, not just the perimeter"", pt: "Stranieri na Forbes: "O foco deve estar na identidade de cada componente, não só no perímetro"" } },
  "argentina-ciberdelitos-50k-2026-jun02": { es: "Datos del Sistema Nacional de Información Criminal revelan que las estafas y defraudaciones asistidas virtualmente llegaron a 50.155 hechos en 2025, con la Provincia de Buenos Aires anotando un alza del 52,2% y Corrientes del 91,1%. En paralelo, los ciberdelitos contra menores escalaron un 74,1%, de 848 a 1.476 víctimas. El gobierno aprobó en marzo de 2026 el Plan Federal de Lucha contra el Fraude Ciberasistido 2026-2027 con coordinación entre nación, provincias y entidades financieras.", en: "Data from Argentina's National Criminal Information System reveal that virtually assisted fraud and scams reached 50,155 incidents in 2025, with Buenos Aires Province posting a 52.2% increase and Corrientes 91.1%. Simultaneously, cybercrimes against minors rose 74.1%, from 848 to 1,476 victims. In March 2026, the government approved the Federal Plan Against Cyber-Assisted Fraud 2026-2027, coordinating national, provincial, and financial entities.", pt: "Dados do Sistema Nacional de Informação Criminal revelam que as fraudes e golpes assistidos virtualmente chegaram a 50.155 ocorrências em 2025, com a Província de Buenos Aires registrando alta de 52,2% e Corrientes de 91,1%. Em paralelo, os crimes cibernéticos contra menores escalaram 74,1%, de 848 para 1.476 vítimas. Em março de 2026, o governo aprovou o Plano Federal de Combate à Fraude Ciberassistida 2026-2027, com coordenação entre a nação, as províncias e as entidades financeiras." , titles: { es: "Argentina: estafas virtuales alcanzaron 50.155 casos en 2025 mientras el delito físico cae un 21%", en: "Argentina: online fraud reached 50,155 cases in 2025 as physical crime drops 21%", pt: "Argentina: fraudes virtuais chegaram a 50.155 casos em 2025 enquanto crimes físicos caem 21%" } },
  "mini-shai-hulud-npm-supply-chain-may19": { es: "El grupo TeamPCP comprometió una cuenta de mantenedor de npm y publicó 639 versiones maliciosas en 323 paquetes —incluyendo 279 del ecosistema @antv de Alibaba con hasta 1,1 millón de descargas semanales— en apenas 20 minutos. El payload ofuscado extrae más de 20 tipos de credenciales: tokens AWS, Google Cloud, GitHub, npm y claves SSH, exfiltrándolos a servidores controlados por el atacante; StepSecurity, SafeDep y JFrog emitieron alertas urgentes. El ataque extiende una cadena de incidentes similares contra TanStack y paquetes SAP, y refuerza que la cadena de suministro de software es un vector prioritario de compromiso de credenciales en entornos bancarios y fintech.", en: "The TeamPCP group compromised an npm maintainer account and published 639 malicious versions across 323 packages — including 279 from Alibaba's @antv ecosystem with up to 1.1 million weekly downloads — in just 20 minutes. The obfuscated payload extracts over 20 credential types: AWS, Google Cloud, GitHub, npm tokens, and SSH keys, exfiltrating them to attacker-controlled servers; StepSecurity, SafeDep, and JFrog issued urgent alerts. The attack extends a chain of similar incidents against TanStack and SAP packages, reinforcing that the software supply chain is a priority vector for credential compromise in banking and fintech environments.", pt: "O grupo TeamPCP comprometeu uma conta de mantenedor do npm e publicou 639 versões maliciosas em 323 pacotes — incluindo 279 do ecossistema @antv da Alibaba com até 1,1 milhão de downloads semanais — em apenas 20 minutos. O payload ofuscado extrai mais de 20 tipos de credenciais: tokens AWS, Google Cloud, GitHub, npm e chaves SSH, exfiltrando-os para servidores controlados pelo atacante; StepSecurity, SafeDep e JFrog emitiram alertas urgentes. O ataque estende uma cadeia de incidentes similares contra pacotes TanStack e SAP, e reforça que a cadeia de suprimentos de software é um vetor prioritário de comprometimento de credenciais em ambientes bancários e fintech." , titles: { es: "Ataque supply chain vía npm: paquete malicioso apunta a billeteras cripto y datos sensibles", en: "NPM Supply Chain Attack Targets Crypto Wallets and Sensitive Data", pt: "Ataque à cadeia de suprimentos via npm mira carteiras cripto e dados sensíveis" } },
  "youtube-ai-likeness-detection-creators-may18": { es: "YouTube extendió a todos los creadores mayores de 18 años su herramienta de emparejamiento facial que detecta videos generados por IA usando la semejanza del creador sin su consentimiento. La activación requiere verificación de identidad con documento gubernamental oficial y un video selfie de corta duración —el mismo flujo básico de KYC— para poder reportar y solicitar remoción o reclamo de derechos de autor. El movimiento convierte a YouTube en uno de los primeros grandes players de contenido en implementar biometría de identidad como requisito operativo para creators, anticipando las obligaciones del Take It Down Act en EE.UU.", en: "YouTube extended its facial matching tool — which detects AI-generated videos using a creator's likeness without their consent — to all creators over 18. Activation requires identity verification with an official government-issued document and a short selfie video, the same basic KYC flow, enabling creators to report and request removal or assert copyright claims. The move makes YouTube one of the first major content platforms to implement identity biometrics as an operational requirement for creators, anticipating obligations under the Take It Down Act in the US.", pt: "O YouTube estendeu a todos os criadores maiores de 18 anos sua ferramenta de correspondência facial, que detecta vídeos gerados por IA utilizando a semelhança do criador sem o seu consentimento. A ativação exige verificação de identidade com documento oficial emitido pelo governo e um curto vídeo selfie — o mesmo fluxo básico de KYC — para permitir denúncias e solicitações de remoção ou reivindicação de direitos autorais. O movimento coloca o YouTube entre as primeiras grandes plataformas de conteúdo a implementar biometria de identidade como requisito operacional para criadores, antecipando as obrigações do Take It Down Act nos EUA." , titles: { es: "YouTube abre detector de semejanza por IA a todos los creadores adultos: verificación de identidad con documento oficial y selfie biométrica", en: "YouTube Opens AI Likeness Detector to All Adult Creators: Identity Verification with Official ID and Biometric Selfie", pt: "YouTube abre detector de semelhança por IA a todos os criadores adultos: verificação de identidade com documento oficial e selfie biométrica" } },
  "malaysia-age-verification-social-media-jun01": { es: "Desde el 1 de junio de 2026, Malasia exige que los usuarios de redes sociales verifiquen su edad mediante el documento nacional MyKad y biometría facial a través de MyDigital ID, con 12 millones de usuarios activos. El Código de Gestión de Riesgos bajo la Online Safety Act 2025 también obliga a anunciantes a verificar identidad contra documentos emitidos por el gobierno. Entre enero y abril de 2026 se registraron 23.367 casos de fraude online con pérdidas de 680,3 millones de ringgits (~USD 171,5 millones).", en: "As of June 1, 2026, Malaysia requires social media users to verify their age using the national MyKad document and facial biometrics through MyDigital ID, which has 12 million active users. The Risk Management Code under the Online Safety Act 2025 also mandates that advertisers verify identity against government-issued documents. Between January and April 2026, 23,367 online fraud cases were recorded with losses of 680.3 million ringgits (~USD 171.5 million).", pt: "A partir de 1 de junho de 2026, a Malásia exige que os usuários de redes sociais verifiquem sua idade por meio do documento nacional MyKad e biometria facial pelo MyDigital ID, com 12 milhões de usuários ativos. O Código de Gestão de Riscos sob a Online Safety Act 2025 também obriga os anunciantes a verificar identidade contra documentos emitidos pelo governo. Entre janeiro e abril de 2026, foram registrados 23.367 casos de fraude online com perdas de 680,3 milhões de ringgits (~USD 171,5 milhões)." , titles: { es: "Malasia impone verificación biométrica obligatoria en redes sociales y registra 23.367 casos de fraude online en cuatro meses", en: "Malaysia Mandates Biometric Age Verification on Social Media, Records 23,367 Online Fraud Cases in Four Months", pt: "Malásia impõe verificação biométrica obrigatória em redes sociais e registra 23.367 casos de fraude online em quatro meses" } },
  "next-biometrics-divestment-may19": { es: "Next Biometrics anunció una revisión estratégica de su negocio de sensores de huellas dactilares, considerando opciones de venta, asociación o licenciamiento, y un posible deslistado de Euronext Oslo. La presión financiera es crítica: ingresos operativos de Q1 2026 de solo 1,8 millones de coronas noruegas (~USD 190.000) y pérdidas EBITDA de 30 millones NOK (~USD 3,2 millones), con liquidez extendida solo hasta el tercer trimestre. La situación refleja la consolidación acelerada en el segmento de sensores biométricos de hardware, donde actores especializados sin escala propia están siendo expulsados del mercado.", en: "Next Biometrics announced a strategic review of its fingerprint sensor business, considering options including sale, partnership, or licensing, as well as a potential delisting from Euronext Oslo. Financial pressure is critical: Q1 2026 operating revenues of just 1.8 million Norwegian kroner (~USD 190,000) and EBITDA losses of 30 million NOK (~USD 3.2 million), with liquidity extended only through the third quarter. The situation reflects accelerating consolidation in the hardware biometric sensor segment, where specialized players without their own scale are being pushed out of the market.", pt: "A Next Biometrics anunciou uma revisão estratégica de seu negócio de sensores de impressão digital, considerando opções de venda, parceria ou licenciamento, além de um possível cancelamento de listagem na Euronext Oslo. A pressão financeira é crítica: receitas operacionais do Q1 2026 de apenas 1,8 milhão de coroas norueguesas (~USD 190.000) e perdas de EBITDA de 30 milhões NOK (~USD 3,2 milhões), com liquidez estendida apenas até o terceiro trimestre. A situação reflete a consolidação acelerada no segmento de sensores biométricos de hardware, onde players especializados sem escala própria estão sendo expulsos do mercado." , titles: { es: "Next Biometrics evalúa vender su cartera de sensores de huella y deslistarse de Euronext: ingresos Q1 de solo USD 190.000", en: "Next Biometrics Explores Selling Fingerprint Sensor Portfolio and Delisting from Euronext: Q1 Revenue Only USD 190K", pt: "Next Biometrics avalia vender carteira de sensores de impressão digital e sair da Euronext: receita no Q1 foi de apenas USD 190 mil" } },
  "sophos-state-identity-security-2026-may14": { es: "El reporte \"State of Identity Security 2026\" de Sophos, basado en 5.000 líderes de TI en 17 países, revela que el 71% de las organizaciones sufrió al menos una brecha de identidad en los últimos 12 meses, con costo medio de recuperación de USD 1,64 millones. México aparece como el segundo país con mayor tasa de brechas a nivel global (83%), superado solo por Suiza (89%). El vector en crecimiento son las identidades no humanas (NHIs): API keys, cuentas de servicio y agentes IA que superan en ratios de 100:1 a las identidades humanas y figuran como causa raíz en el 41% de los incidentes.", en: "Sophos' \"State of Identity Security 2026\" report, based on 5,000 IT leaders across 17 countries, reveals that 71% of organizations suffered at least one identity breach in the past 12 months, with an average recovery cost of USD 1.64 million. Mexico ranks as the second country with the highest breach rate globally (83%), surpassed only by Switzerland (89%). The fastest-growing attack vector is non-human identities (NHIs): API keys, service accounts, and AI agents that outnumber human identities at 100:1 ratios and appear as the root cause in 41% of incidents.", pt: "O relatório \"State of Identity Security 2026\" da Sophos, baseado em 5.000 líderes de TI em 17 países, revela que 71% das organizações sofreram ao menos uma violação de identidade nos últimos 12 meses, com custo médio de recuperação de USD 1,64 milhão. O México aparece como o segundo país com maior taxa de violações globalmente (83%), superado apenas pela Suíça (89%). O vetor em crescimento são as identidades não humanas (NHIs): API keys, contas de serviço e agentes de IA que superam as identidades humanas em proporções de 100:1 e figuram como causa raiz em 41% dos incidentes." , titles: { es: "71% de las organizaciones sufrió al menos una brecha de identidad en el último año — México es el 2.° país más afectado", en: "71% of Organizations Suffered at Least One Identity Breach in the Past Year — Mexico Is the 2nd Most Affected Country", pt: "71% das organizações sofreram ao menos uma violação de identidade no último ano — México é o 2.° país mais afetado" } },
  "clear-gdit-federal-identity-may20": { es: "CLEAR designó a General Dynamics Information Technology (GDIT) como integrador federal preferido para desplegar CLEAR1 —verificación biométrica sin contraseña que combina documento gubernamental y selfie biométrica— en agencias federales de EE.UU.; CLEAR1 alcanzó el estado FedRAMP In Process (nivel Moderate) y ya está disponible en Medicare.gov junto a Login.gov e ID.me. La alianza apunta a casos de uso en salud federal y agencias civiles, donde GDIT tiene presencia establecida en soluciones multi-cloud. El movimiento de CLEAR hacia infraestructura soberana de gobierno es análogo al posicionamiento de VU en RENAPER y entidades gubernamentales de LATAM: la identidad como capa crítica del Estado.", en: "CLEAR designated General Dynamics Information Technology (GDIT) as its preferred federal integrator to deploy CLEAR1 — passwordless biometric verification combining a government document and biometric selfie — across US federal agencies; CLEAR1 achieved FedRAMP In Process status (Moderate level) and is already available on Medicare.gov alongside Login.gov and ID.me. The partnership targets use cases in federal health and civilian agencies, where GDIT has an established presence in multi-cloud solutions. CLEAR's move toward sovereign government infrastructure is analogous to VU's positioning with RENAPER and LATAM government entities: identity as a critical layer of the State.", pt: "A CLEAR designou a General Dynamics Information Technology (GDIT) como integradora federal preferida para implantar o CLEAR1 — verificação biométrica sem senha que combina documento governamental e selfie biométrica — em agências federais dos EUA; o CLEAR1 atingiu o status FedRAMP In Process (nível Moderate) e já está disponível no Medicare.gov ao lado do Login.gov e ID.me. A parceria mira casos de uso em saúde federal e agências civis, onde a GDIT tem presença consolidada em soluções multi-cloud. O movimento da CLEAR em direção à infraestrutura soberana de governo é análogo ao posicionamento da VU no RENAPER e em entidades governamentais da LATAM: a identidade como camada crítica do Estado." , titles: { es: "CLEAR y GDIT llevan identidad biométrica sin contraseña a agencias federales de EE.UU.: FedRAMP, Medicare.gov y el modelo soberano", en: "CLEAR and GDIT Bring Passwordless Biometric Identity to U.S. Federal Agencies: FedRAMP, Medicare.gov, and the Sovereign Model", pt: "CLEAR e GDIT levam identidade biométrica sem senha a agências federais dos EUA: FedRAMP, Medicare.gov e o modelo soberano" } },
  "ai-agent-credentials-1password-keycard-may21": { es: "1Password anunció un servidor MCP que inyecta secretos cifrados en runtime sin escribirlos en disco ni exponerlos al contexto del modelo, en integración con el agente de coding OpenAI Codex; Keycard lanzó una plataforma multi-agente que asigna identidad verificable a cada agente mediante OAuth 2.0 Token Exchange sin API keys estáticas de larga vida. Las soluciones responden a un vacío crítico: los agentes IA autónomos actuales operan con credenciales diseñadas para humanos, lo que amplía masivamente la superficie de ataque. La formalización de estándares de identidad para agentes IA es el próximo frente técnico de la industria y define el espacio donde VU ONE —como plataforma de autenticación de agentes— tiene posición relevante.", en: "1Password announced an MCP server that injects encrypted secrets at runtime without writing them to disk or exposing them to the model's context, integrated with the OpenAI Codex coding agent; Keycard launched a multi-agent platform that assigns verifiable identity to each agent via OAuth 2.0 Token Exchange without long-lived static API keys. Both solutions address a critical gap: current autonomous AI agents operate with credentials designed for humans, massively expanding the attack surface. The formalization of identity standards for AI agents is the industry's next technical frontier and defines the space where VU ONE — as an agent authentication platform — holds a relevant position.", pt: "A 1Password anunciou um servidor MCP que injeta segredos criptografados em runtime sem gravá-los em disco nem expô-los ao contexto do modelo, em integração com o agente de coding OpenAI Codex; a Keycard lançou uma plataforma multi-agente que atribui identidade verificável a cada agente via OAuth 2.0 Token Exchange sem API keys estáticas de longa duração. As soluções respondem a uma lacuna crítica: os agentes de IA autônomos atuais operam com credenciais projetadas para humanos, ampliando massivamente a superfície de ataque. A formalização de padrões de identidade para agentes de IA é a próxima fronteira técnica da indústria e define o espaço onde o VU ONE — como plataforma de autenticação de agentes — tem posição relevante." , titles: { es: "1Password y Keycard presentan el primer estándar de delegación de credenciales para agentes IA autónomos: identidad verificable y mínimo privilegio", en: "1Password and Keycard Launch First Credential Delegation Standard for Autonomous AI Agents: Verifiable Identity and Least Privilege", pt: "1Password e Keycard lançam primeiro padrão de delegação de credenciais para agentes de IA autônomos: identidade verificável e privilégio mínimo" } },
  "infobae-colombia-elecciones-fraude-may27": { es: "Con las elecciones presidenciales colombianas a cuatro días, expertos en ciberseguridad documentan campañas masivas que combinan sitios institucionales clonados, mensajes falsos de subsidios vía WhatsApp y Telegram, y deepfakes de figuras públicas para robar datos personales y bancarios. El Ministerio TIC activó un plan especial de ciberseguridad con monitoreo de desinformación e IA, mientras Kaspersky registró ataques automatizados a escala masiva contra dispositivos móviles y cuentas en redes sociales. Los métodos más frecuentes incluyen encuestas electorales falsas, citaciones apócrifas a jurados de votación y páginas que imitan la Registraduría para capturar credenciales.", en: "With Colombia's presidential elections four days away, cybersecurity experts documented large-scale campaigns combining cloned institutional websites, fake subsidy messages via WhatsApp and Telegram, and deepfakes of public figures to steal personal and banking data. The Ministry of ICT activated a special cybersecurity plan with disinformation and AI monitoring, while Kaspersky recorded automated attacks at massive scale against mobile devices and social media accounts. The most common methods include fake electoral surveys, fabricated jury summons, and pages impersonating the Registraduría to harvest credentials.", pt: "Com as eleições presidenciais colombianas a quatro dias, especialistas em cibersegurança documentaram campanhas massivas combinando sites institucionais clonados, mensagens falsas de subsídios via WhatsApp e Telegram, e deepfakes de figuras públicas para roubar dados pessoais e bancários. O Ministério de TIC ativou um plano especial de cibersegurança com monitoramento de desinformação e IA, enquanto a Kaspersky registrou ataques automatizados em larga escala contra dispositivos móveis e contas em redes sociais. Os métodos mais frequentes incluem pesquisas eleitorais falsas, convocações apócrifas para mesários e páginas que imitam a Registraduría para capturar credenciais." , titles: { es: "Colombia: expertos alertan por phishing, deepfakes y robo de datos en vísperas de las elecciones presidenciales del 31 de mayo", en: "Colombia: experts warn of phishing, deepfakes and data theft ahead of the May 31 presidential election", pt: "Colômbia: especialistas alertam para phishing, deepfakes e roubo de dados às vésperas das eleições presidenciais de 31 de maio" } },
  "nec-nz-biometric-age-credential-govtnz-may26": { es: "Nueva Zelanda avanza en la Digital Kiwi Access Card —credencial biométrica de verificación de edad— para integrarla a la wallet digital Govt.nz, usando NEC Identity Cloud y estándares de verifiable credentials. El sistema permite a mayores de 18 años mostrar su tarjeta digital al ingresar a bares o eventos, confirmando elegibilidad sin exponer datos adicionales. El lanzamiento se espera en meses, con Hospitality New Zealand resolviendo los detalles finales.", en: "New Zealand is advancing the Digital Kiwi Access Card — a biometric age verification credential — for integration into the Govt.nz digital wallet, using NEC Identity Cloud and verifiable credentials standards. The system allows adults over 18 to present their digital card when entering bars or events, confirming eligibility without exposing additional data. The launch is expected within months, with Hospitality New Zealand finalizing the remaining details.", pt: "A Nova Zelândia avança com o Digital Kiwi Access Card — credencial biométrica de verificação de idade — para integrá-lo à carteira digital Govt.nz, utilizando o NEC Identity Cloud e padrões de verifiable credentials. O sistema permite que maiores de 18 anos apresentem seu cartão digital ao entrar em bares ou eventos, confirmando a elegibilidade sem expor dados adicionais. O lançamento é esperado em meses, com a Hospitality New Zealand finalizando os últimos detalhes." , titles: { es: "Nueva Zelanda prepara credencial biométrica de mayoría de edad para wallet digital Govt.nz con tecnología NEC", en: "New Zealand prepares biometric age credential for Govt.nz digital wallet powered by NEC", pt: "Nova Zelândia prepara credencial biométrica de maioridade para carteira digital Govt.nz com tecnologia NEC" } },
  "microsoft-phishing-35k-users-aitm-may28": { es: "Microsoft Threat Intelligence documentó una campaña de robo de credenciales que apuntó a más de 35.000 usuarios en 13.000 organizaciones en 26 países, con el 92% de los objetivos en EE.UU. La campaña usó plantillas HTML enterprise-style con adversary-in-the-middle para capturar tokens y credenciales de Microsoft en tiempo real, bypaseando MFA. Los sectores más afectados fueron salud y ciencias de la vida (19%), servicios financieros (18%) y tecnología (11%).", en: "Microsoft Threat Intelligence documented a credential theft campaign targeting over 35,000 users across 13,000 organizations in 26 countries, with 92% of targets based in the United States. The campaign used enterprise-style HTML templates with adversary-in-the-middle techniques to capture Microsoft tokens and credentials in real time, bypassing MFA. The most affected sectors were healthcare and life sciences (19%), financial services (18%), and technology (11%).", pt: "O Microsoft Threat Intelligence documentou uma campanha de roubo de credenciais que teve como alvo mais de 35.000 usuários em 13.000 organizações em 26 países, com 92% dos alvos nos Estados Unidos. A campanha utilizou templates HTML de estilo corporativo com técnicas adversary-in-the-middle para capturar tokens e credenciais Microsoft em tempo real, contornando o MFA. Os setores mais afetados foram saúde e ciências da vida (19%), serviços financeiros (18%) e tecnologia (11%)." , titles: { es: "Microsoft revela campaña de phishing AiTM que comprometió 35.000 usuarios en 26 países bypasseando MFA", en: "Microsoft Uncovers AiTM Phishing Campaign That Bypassed MFA and Compromised 35,000 Users Across 26 Countries", pt: "Microsoft revela campanha de phishing AiTM que comprometeu 35.000 usuários em 26 países burlando MFA" } },
  "gbg-foresight-identity-decisioning-jun26": { es: "GBG presentó Foresight, una plataforma de inteligencia impulsada por IA que aprovecha datos de millones de verificaciones de identidad para ofrecer benchmarking de desempeño sectorial, alertas automáticas de fraude y recomendaciones de configuración. La herramienta no requiere integración activa y se posiciona como evolución de la verificación puntual hacia la decisión contextual de identidad. El movimiento consolida la estrategia de GBG de migrar de proveedor de IDV puntual hacia plataforma integral de identity decisioning.", en: "GBG launched Foresight, an AI-powered intelligence platform that leverages data from millions of identity verifications to deliver sector-level performance benchmarking, automated fraud alerts, and configuration recommendations. The tool requires no active integration and positions itself as the evolution from point-in-time verification toward contextual identity decisioning. The move consolidates GBG's strategy of transitioning from a point IDV provider to a comprehensive identity decisioning platform.", pt: "A GBG lançou o Foresight, uma plataforma de inteligência impulsionada por IA que utiliza dados de milhões de verificações de identidade para oferecer benchmarking de desempenho setorial, alertas automáticos de fraude e recomendações de configuração. A ferramenta não exige integração ativa e se posiciona como evolução da verificação pontual para a tomada de decisão contextual de identidade. O movimento consolida a estratégia da GBG de migrar de provedor de IDV pontual para plataforma integral de identity decisioning." , titles: { es: "GBG lanza Foresight: plataforma de inteligencia IA para decisiones de identidad más allá del IDV tradicional", en: "GBG Launches Foresight: AI Intelligence Platform for Identity Decisioning Beyond Traditional IDV", pt: "GBG lança Foresight: plataforma de inteligência IA para decisões de identidade além do IDV tradicional" } },
